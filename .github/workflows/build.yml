name: "Build"

on:
  pull_request:
  push:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install xvfb (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: sudo apt-get install -y xvfb

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build tree-sitter grammar
        run: pnpm build:grammar

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate packaging
        run: pnpm exec tsx scripts/test-package-deps.ts

      - name: E2E tests (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm test:e2e

      - name: Package
        run: |
          pnpm i --global @vscode/vsce
          pnpm package
          echo "VSIX_PATH=$(ls *.vsix)" >> "$GITHUB_ENV"

      - name: Upload build
        uses: actions/upload-artifact@v7
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: bgforge-mls
          path: "*.vsix"

      # Use pre-built VSIX for publishing: pnpm package (scripts/package.sh)
      # dereferences pnpm symlinks that vsce can't follow.
      - name: Publish to Open VSX Registry
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: HaaLeo/publish-vscode-extension@v2
        id: publishToOpenVSX
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ env.VSIX_PATH }}

      - name: Publish to Visual Studio Marketplace
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.publishToOpenVSX.outputs.vsixPath }}

      - name: GitHub Release
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ steps.publishToOpenVSX.outputs.vsixPath }}
