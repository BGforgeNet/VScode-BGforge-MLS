name: "Build"

on:
  pull_request:
  push:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install xvfb (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: sudo apt-get install -y xvfb

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build tree-sitter grammar
        run: pnpm build:grammar

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: E2E tests (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm test:e2e

      - name: Package
        run: |
          pnpm i --global @vscode/vsce
          pnpm package
          echo "VSIX_PATH=$(ls *.vsix)" >> "$GITHUB_ENV"

      - name: Build editor bundles (TextMate, Kate, Notepad++, Geany)
        run: pnpm build:editors

      - name: Upload build
        uses: actions/upload-artifact@v7
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: bgforge-mls
          path: |
            *.vsix
            bgforge-mls-*.tmbundle.zip
            bgforge-mls-notepadpp-udl-*.zip
            bgforge-mls-kate-ksh-*.zip

      # Use pre-built VSIX for publishing: pnpm package (scripts/package.sh)
      # dereferences pnpm symlinks that vsce can't follow.
      - name: Publish to Open VSX Registry
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: HaaLeo/publish-vscode-extension@v2
        id: publishToOpenVSX
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ env.VSIX_PATH }}

      - name: Publish to Visual Studio Marketplace
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.publishToOpenVSX.outputs.vsixPath }}

      - name: Debug git status before npm publish
        if: startsWith(github.ref, 'refs/tags/')
        run: git status

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: SKIP_BUILD=1 ./scripts/publish-server.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: GitHub Release
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.publishToOpenVSX.outputs.vsixPath }}
            bgforge-mls-*.tmbundle.zip
            bgforge-mls-notepadpp-udl-*.zip
            bgforge-mls-kate-ksh-*.zip
