# Geany filetype definition for WeiDU translation files (.tra).
# Hand-written (not generated) because TRA has no YAML keyword data.
# Install to: ~/.config/geany/filedefs/

[styling=C]

[keywords]

[settings]
lexer_filetype=C
extension=tra
comment_single=//
comment_open=/*
comment_close=*/

[indentation]
type=0
width=4
