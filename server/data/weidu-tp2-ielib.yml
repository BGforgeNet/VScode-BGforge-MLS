    - name: OPCODE_monster_summoning
      detail: int OPCODE_monster_summoning = 127
      doc: |-
        [Summon: Monster Summoning](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op127)
        Summons a number of monsters.
        Each CRE file has a [`Creature Power Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x18) number. The amount of monsters summoned by this effect depends on this value, the `special` parameter and if it's used in [SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Feature_Block) / [ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Feature_Block) or from an external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm).
        When used in [SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Feature_Block)/[ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Feature_Block) files, known value for `Mode` are:
        - 0 ⟶ Summon until [`Creature Power Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x18) equals/exceeds `Number`
        - 1 ⟶ Summon amount equal to `Number`
        - 2 ⟶ Summon until [`Creature Power Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x18) equals/exceeds Caster's Level
        When used in external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files, known value for `Mode` are:
        - 0 ⟶ Summon until [`Creature Power Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x18) equals/exceeds `Number`
        - 1 ⟶ Summon amount equal to `'Number' + Dice rolls`
        - 2 ⟶ Summon until [`Creature Power Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x18) equals/exceeds [`Caster Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xC8) field
        The `Type` field sets which [2DA](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/2da.htm) file to pick the creatures to summon from. The 2da files are `monsumX` and `anisumX`, where `X = 'Type' + 1`. `0–4` are allied , `5–9` are hostile. The specific 2da files used are:
        - 0 ⟶ MONSUM01: Monster Summon 1
        - 1 ⟶ MONSUM02: Monster Summon 2
        - 2 ⟶ MONSUM03: Monster Summon 3
        - 3 ⟶ ANISUM01: Animal Summon 1
        - 4 ⟶ ANISUM02: Animal Summon 2
        - 5 ⟶ MONSUM01: Monster Summon 1 Hostile
        - 6 ⟶ MONSUM02: Monster Summon 2 Hostile
        - 7 ⟶ MONSUM03: Monster Summon 3 Hostile
        - 8 ⟶ ANISUM01: Animal Summon 1 Hostile
        - 9 ⟶ ANISUM02: Animal Summon 2 Hostile
        A custom .2da file can be entered in the resource field (untested in bg1).
        If used from an external effect (.eff), the [`vvc`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70) field controls the bam file played when summoning.
    - name: OPCODE_morale_break_mod
      detail: int OPCODE_morale_break_mod = 106
      doc: |-
        [Stat: Morale Break Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op106)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Morale Break = Morale Break + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Morale Break = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Morale Break = (Morale Break * 'Statistic Modifier' value) / 100`
        The effect modifies [MORALEBREAK](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#46).
    - name: OPCODE_morale_mod
      detail: int OPCODE_morale_mod = 23
      doc: |-
        [Stat: Morale Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op23)
        Sets the Morale stat of the targeted creature(s) to 10.
        this is a gimped effect in bg2, unlike the rest of the games!
    - name: OPCODE_movement_mod
      detail: int OPCODE_movement_mod = 126
      doc: |-
        [Stat: Movement Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op126)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        The engine allows values for `Statistic Modifier` from `0` (immobile) to `255` (instantaneous), though behaviour is only consistent in the range `0 – 30`.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Movement = Movement + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Movement = 'Statistic Modifier' value`
        - 2 ⟶ Non-stacking Percentage Modifier: `Movement = (Movement * 'Statistic Modifier' value) / 100`
        - 5 ⟶ Multiplicative Stacking Percentage Modifier: `Movement = (Movement * 'Statistic Modifier' value) / 100` (EE only)
        BG1 does not support the cumulative modifier and will behave as if in flat modifier mode.
        A couple of examples about Multiplicative Stacking Percentage Modifier:
        - `50% * 50% = 25%`
        - `150% * 150% = 225%`
    - name: OPCODE_movement_mod_ii
      detail: int OPCODE_movement_mod_ii = 176
      doc: |-
        [Stat: Movement Modifier (II)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op176)
        (As [opcode #126](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op126), but unaffected by [Free Action](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op163)).
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        The engine allows values for `Statistic Modifier` from `0` (immobile) to `255` (instantaneous), though behaviour is only consistent in the range `0 – 30`.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Movement = Movement + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Movement = 'Statistic Modifier' value`
        - 2 ⟶ Non-stacking Percentage Modifier: `Movement = (Movement * 'Statistic Modifier' value) / 100`
        - 5 ⟶ Multiplicative Stacking Percentage Modifier: `Movement = (Movement * 'Statistic Modifier' value) / 100` (EE only)
        PST: This effect doesn't exist and always crashes the game.
        A couple of examples about `Multiplicative Stacking Percentage Modifier`:
        - `50% * 50% = 25%`
        - `150% * 150% = 225%`
    - name: OPCODE_negative_chant
      detail: int OPCODE_negative_chant = 137
      doc: |-
        [State: Negative Chant](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op137)
        Applies the chant effect to the targeted creature(s).
        This opcode has the same effects as [opcode #22](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op22), but maintains its own separate [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT28).
        This opcode modifies [LUCK](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#32).
        This opcode works as the reverse of [Chant](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op131) (positive values decrease Luck, negative values increase Luck).
        - While this opcode is "Non-Cumulative" (it sets values rather than increment), what it really does is stack in reverse standard order.
        - The base [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT28) set on the [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file will override any effect applied to them (defaulting to a value of zero).
        - The oldest equipped effect will override newer equipped effects, and any equipped effect will override a non-equipped effect.
        - The oldest non-equipped effect will override newer non-equipped effects.
        `Statistic Modifier` only reads the first byte for its value, the last 3 bytes are ignored.
    - name: OPCODE_npcbump
      detail: int OPCODE_npcbump = 300
      doc: |-
        [Spell Effect: NPCBump](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op300)
        This effect allows the targetted creature(s) to push other creatures out of the way while moving.
        The effect modifies [NPC_BUMP](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#190) to `Stat Value`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_open_locks_mod
      detail: int OPCODE_open_locks_mod = 90
      doc: |-
        [Stat: Open Locks Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op90)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Skill = Skill + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Skill = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Skill = (Skill * 'Statistic Modifier' value) / 100`
        `Timing Mode`s `1/4/7` permanently alters the creature's [`Open Locks`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x67) score, leaving no removable effect.
        (EE only) When `Type = 0` and `Timing Mode = 9`, it modifies [LOCKPICKINGMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#176). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm), capped to the range `[0,255]`, before being included in the creature's [`Open Locks`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x67) score.
    - name: OPCODE_overlay_blur
      detail: int OPCODE_overlay_blur = 65
      doc: |-
        [Overlay: Blur](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op65)
        Applies the blur effect to the targeted creature(s) and sets [STATE_BLUR](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT29). Graphical displacement is affected by movement rate.
        Both parameters should be `0` (zero).
        - [STATE_BLUR](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT29) will maintain the effects of this opcode, once this opcode expires, but only until you save & reload.
        - If you set [STATE_BLUR](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT29) on a [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file, it won't do anything by itself.
        - If you later apply [opcode #65](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op65) to the creature, once it expires, the blur visual will remain until you save & reload, but will no longer update based on your movement rate (it will remain stuck at whatever it was when the opcode expired).
