        (EE only) When `Type = 0` and `Timing Mode = 9`, it modifies [PICKPOCKETMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#179). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm), capped to the range `[0,255]`, before being included in the creature's [`Pick Pockets`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x6A) score.
