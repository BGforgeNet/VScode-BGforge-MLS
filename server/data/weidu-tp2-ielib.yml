    - name: OPCODE_dither
      detail: int OPCODE_dither = 114
      doc: |-
        [Graphics: Dither](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op114)
        Sets [IDENTIFYMODE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#61) to `1`.
        Affected creature will be visible, targetable, and if controlled, selectable and orderable within the semi-transparent fog of war, but not within the black shroud.
    - name: OPCODE_drain_item_charges
      detail: int OPCODE_drain_item_charges = 243
      doc: |-
        [Item: Drain Item Charges](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op243)
        Items matching the 'Item Type' value on the targeted creature(s) will have their charges drained.
        Known values for 'Item Type' are:
        0   Magical items excluding weapons
        1   Magical items including weapons
        This effect works in SoA but not ToB
    - name: OPCODE_drain_wizard_spell
      detail: int OPCODE_drain_wizard_spell = 244
      doc: |-
        [Spell: Drain Wizard Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op244)
        Drains spells from a wizards memory. This effect always drains the highest level possible spell first and drains the number set by the `Number to Drain` parameter.
    - name: OPCODE_drop_weapons_in_panic
      detail: int OPCODE_drop_weapons_in_panic = 264
      doc: |-
        [Spell Effect: Drop Weapons in Panic](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op264)
        Applies the drop weapons effect to the targeted creature(s), in the style specified by the 'Type' field.
        This effect causes the targeted creature(s) to drop a piece of equipment.
        It won't affect items marked as 'critical'
        Known values for 'Type' are:
        0   Drop random equipment
        1   Drop a quickslot item (won't drop the left-hand weapon).
    - name: OPCODE_drunkenness_mod
      detail: int OPCODE_drunkenness_mod = 94
      doc: |-
        [Stat: Drunkenness Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op94)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Drunkenness = Drunkenness + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Drunkenness = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Drunkenness = (Drunkenness * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [INTOXICATION](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#31).
    - name: OPCODE_duration_mod
      detail: int OPCODE_duration_mod = 99
      doc: |-
        [Spell Effect: Duration Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op99)
        Alters spell durations of the targeted creature(s), to the percentage specified by the `Duration Modifier` field, affecting the spell type specified by the `Type` field. `Timing mode 0` is the only timing mode reliably affected. Timings handled through [PRO](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm) files are ignored.
        For instance:
        - `Duration Modifier = 0` ⟶ Spells have no duration
        - `Duration Modifier = 100` ⟶ Spells have normal duration
        - `Duration Modifier = 200` ⟶ Spells have double duration
        Known values for `Type` are:
        - 0 ⟶ Mage
        - 1 ⟶ Priest
        - 2 ⟶ Bard Song (EE only)
        The effect modifies [SPELLDURATIONMODMAGE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#53) and [SPELLDURATIONMODPRIEST](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#54).
        Durations handled by [Static Charge](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op333) are unaffected (EE only).
        Not seen to work in BG1.
    - name: OPCODE_electricity_resist_mod
      detail: int OPCODE_electricity_resist_mod = 29
      doc: |-
        [Stat: Electricity Resistance Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op29)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Resistance = Resistance + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Resistance = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Resistance = (Resistance * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [RESISTELECTRICITY](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#16).
    - name: OPCODE_exceptional_strength_mod
      detail: int OPCODE_exceptional_strength_mod = 97
      doc: |-
        [Stat: Exceptional Strength Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op97)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Exceptional Strength = Exceptional Strength + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Exceptional Strength = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Exceptional Strength = (Exceptional Strength * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [STREXTRA](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#37).
    - name: OPCODE_execute_script_cut250a
      detail: int OPCODE_execute_script_cut250a = 298
      doc: |-
        [Spell Effect: Execute Script cut250a](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op298)
        Executes script cut250a.bcs. By default this script teleports the party to the Pocket Plane area (AR4500).
        The Constant Value parameter should be set to 1.
    - name: OPCODE_existance_delay_override
      detail: int OPCODE_existance_delay_override = 294
      doc: |-
        [Spell Effect: Existance Delay Override](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op294)
        Existance is the verbal constant group from `69` to `74` (or `70–74`). These sounds are randomly played (for non global, alive characters, when not in cutscene or dialog). This stat tunes the frequency of these random strings.
        Known values for `Constant Value` are:
        - -1 ⟶ no existance sounds
        - 0 ⟶ standard existance sound frequency
        - Other values ⟶ random existance sound frequency (the higher the rarer)
        The effect modifies [EXISTANCE_DELAY_OVERRIDE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#184), unless `Constant Value` is set to `1`.
    - name: OPCODE_experience_points
      detail: int OPCODE_experience_points = 104
      doc: |-
        [Stat: Experience Points](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op104)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `XP = XP + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `XP = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `XP = (XP * 'Statistic Modifier' value) / 100`
        The effect modifies [XP](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#44).
    - name: OPCODE_extra_damage_mod
      detail: int OPCODE_extra_damage_mod = 73
      doc: |-
        [Stat: Extra Damage Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op73)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field. The effect is an additive modifier, like adding `+10` damage.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Damage = Damage + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Damage = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Damage = (Damage * 'Statistic Modifier' value) / 100`
        PST treats all Type values above `1` as `1` – it does not support the percentage modifier.
    - name: OPCODE_familiar_block
      detail: int OPCODE_familiar_block = 196
      doc: |-
        [Spell Effect: Familiar Block](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op196)
        If this effect is found on any creature in the [GAM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm) file, the engine will block summoning of more familiars.
        The effect should be set with a `Timing Mode` of `9`.
    - name: OPCODE_farsight
      detail: int OPCODE_farsight = 239
      doc: |-
        [Spell Effect: Farsight](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op239)
        Allows viewing of the current area, based on the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ View explored sections only
        - 1 ⟶ View explored section and unexplored sections
        Effect needs to target a creature. Opcode still non-functional in SoD v2.5.
    - name: OPCODE_fatigue_mod
      detail: int OPCODE_fatigue_mod = 93
      doc: |-
        [Stat: Fatigue Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op93)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Fatigue = Fatigue + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Fatigue = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Fatigue = (Fatigue * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [FATIGUE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#30).
    - name: OPCODE_feeblemindedness
      detail: int OPCODE_feeblemindedness = 76
      doc: |-
        [State: Feeblemindedness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op76)
        Applies the feeblemind effect to the targeted creature(s) – creatures are unselectable, immobile and do not respond to combat. Maintains the target's Intelligence to 3 (stacks normally with [opcode #19](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op19)).
        A creature's scripts do not run while the creature is feebleminded.
    - name: OPCODE_find_familiar
      detail: int OPCODE_find_familiar = 192
      doc: |-
        [Spell Effect: Find Familiar](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op192)
        Applies [opcode #195](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op195), [opcode #196](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op196), and [opcode #268](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op268) to the summoned familiar.
        The Familiar summoned is based on the alignment of the Protagonist and values stored in the [GAM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Familiar) file (non-EE games) or [FAMILIAR.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/familiar.htm) (EE games).
        On non-EE games, the `Upgrade Marker` field is used internally to indicate the familiar has received the ToB upgrades.
        - On EE games, if there is an `Upgrade Marker`, it isn't on [opcode #192](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op192) (needs researching...).
        On non-EE games, default creatures for familiars are:
        - Lawful Good ⟶ Pseudo Dragon (`FAMPSD`)
        - Lawful Neutral ⟶ Ferret (`FAMFER`)
        - Lawful Evil ⟶ Imp (`FAMIMP`)
        - Neutral Good ⟶ Pseudo Dragon (`FAMPSD`)
        - True Neutral ⟶ Rabbit (`FAMRAB`)
        - Neutral Evil ⟶ Dust Mephit (`FAMDUST`)
        - Chaotic Good ⟶ Fairy Dragon (`FAMFAIR`)
        - Chaotic Neutral ⟶ Cat (`FAMCAT`)
        - Chaotic Evil ⟶ Quasit (`FAMQUAS`)
        The familiars ([CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm)) available are locked in once a new game begins (any changes to [FAMILIAR.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/familiar.htm) must occur before starting a new game).
        Max HP boost for summoning a familiar (and eventually loss when it dies) is ½ the familiar's Max HP (including any CON bonus) at the time of summoning.
        The familiar restriction to `<CHARNAME>` is game-specific. IWDEE has no such restriction, but still only allows a single character to have a familiar at a time. It's unclear if it's a specific flag in the [GAM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm) file or if it's engine-side.
    - name: OPCODE_find_traps
      detail: int OPCODE_find_traps = 150
      doc: |-
        [Spell Effect: Find Traps](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op150)
        Applies the find traps effect to the targeted creature(s).
        Both parameters should be `0` (zero).
        This effect is automatically successful, but can only find traps that are normally detectable by the Find Traps skill.
    - name: OPCODE_find_traps_mod
      detail: int OPCODE_find_traps_mod = 91
      doc: |-
        [Stat: Find Traps Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op91)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Skill = Skill + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Skill = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Skill = (Skill * 'Statistic Modifier' value) / 100`
        `Timing Mode`s `1/4/7` permanently alters the creature's [`Find Traps`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x69) score, leaving no removable effect.
        (EE only) When `Type = 0` and `Timing Mode = 9`, it modifies [TRAPSMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#178). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm), capped to the range `[0,255]`, before being included in the creature's [`Find Traps`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x69) score.
    - name: OPCODE_fire_resist_mod
      detail: int OPCODE_fire_resist_mod = 30
      doc: |-
        [Stat: Fire Resistance Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op30)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Resistance = Resistance + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Resistance = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Resistance = (Resistance * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [RESISTFIRE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#14).
    - name: OPCODE_fist_damage_mod
      detail: int OPCODE_fist_damage_mod = 289
      doc: |-
        [Stat: Fist Damage Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op289)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Damage = Damage + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Damage = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Damage = (Damage * 'Statistic Modifier' value) / 100`
        The effect modifies [FIST_DAMAGE_BONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#171).
    - name: OPCODE_fist_thac0_mod
      detail: int OPCODE_fist_thac0_mod = 288
      doc: |-
        [Stat: Fist THAC0 Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op288)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `THAC0 = THAC0 + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `THAC0 = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `THAC0 = (THAC0 * 'Statistic Modifier' value) / 100`
        The effect modifies [FIST_THACO_BONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#170).
    - name: OPCODE_force_visible
      detail: int OPCODE_force_visible = 136
      doc: |-
        [State: Force Visible](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op136)
        Renders the targeted creature(s) partially visible: removes normal invisibility, but not the improved invisibility state; the targeted is visible and attackable, but not targetable by spells.
        The effect has no meaning on visible targets.
        This effect has no duration.
        Leave both parameters at zero for this effect to work.
    - name: OPCODE_give_ability
      detail: int OPCODE_give_ability = 171
      doc: |-
        [Spell: Give Ability](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op171)
        Gives the [`SPL`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm) specified by the `resource` key to the targeted creature(s).
        - [`Wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1) spell type can be [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x34) `1–9` if gained.
        - [`Priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2) spell type can be [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x34) `1–7` if gained.
        - Other [`Spell type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C)s can be [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x34) `1–32767` if gained.
    - name: OPCODE_gold
      detail: int OPCODE_gold = 105
      doc: |-
        [Stat: Gold](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op105)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Gold = Gold + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Gold = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Gold = (Gold * 'Statistic Modifier' value) / 100`
        The effect modifies party gold or [GOLD](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#45) for everyone else.
        `Type=0` can only remove gold for party members, the passed value is used negative. Gold amount has a lower bound of `0`.
    - name: OPCODE_golem_stoneskin
      detail: int OPCODE_golem_stoneskin = 314
      doc: |-
        [Spell: Golem Stoneskin](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op314)
        Gives the targeted creature(s) a number of protections from physical attacks, as specified by the `Amount` field.
        This opcode maintains [STONESKINSGOLEM](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#199) to the amount of skins left.
        Do not use this effect in conjunction with the Juggernaut Golem Manual as it will corrupt the use of that item.
        In particular, the Juggernaut Golem `"TOMEGOL4.CRE"` is scripted by `"TOMEGOL4.BCS"` to [`Kill()`](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#131) itself if its Summoner and no Party Members have [STONESKINSGOLEM](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#199) set to a non-zero value.
    - name: OPCODE_haste
      detail: int OPCODE_haste = 16
      doc: |-
        [State: Haste](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op16)
        Applies the Haste effect, in the style specified by the `Type` value.
        Known values for `Type` are:
        - 0 ⟶ Normal Haste – double the movement rate and grants an additional Attack Per Round (APR), rounded down (capped at `6`)
        - 1 ⟶ Improved Haste – double the movement rate and doubles APR (capped at `10`)
        - 2 ⟶ Weak Haste – Speed haste without attack bonuses, round APR up (capped at `5`)
        All of them set [STATE_HASTED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT15). `Improved/Weak` function by setting an additional `STAT` value, which modifies the behavior of [STATE_HASTED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT15):
        - [IMPROVEDHASTE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#155).
        - [ANIMATION_ONLY_HASTE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#185).
        The `Normal` and `Improved` haste types grant a `-2` initiative (Weapon Speed) bonus. All types:
        - grant portrait icons ([`Haste`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#38) / [`Improved Haste`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#110))
        - increase the creature's animation speed and the animation speed of [opcode 140](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op140) effects
        - halve the creature's round timer used by attacks, modal abilities and "Auto-Pause: End of Round"
        - increase frequency of application of [poison](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op25), [disease](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op78), [regeneration](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op98), [Cast on Condition](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op232) and [Use EFF File (at Frequency)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op272), but not below `1s`
        This effect will cancel out the [slow opcode](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op40).
        BG1 only supports haste type `0`.
        This opcode will set the [`STATE_HASTED`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT15) flag and nothing else when applied with `Timing Mode 1`, and cannot be removed within the game by any means, only suppressed by [Slow](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op40).
        This only works when applying `Normal/Improved` haste (there's no difference, since the `STAT` for `Improved` haste doesn't get set this way), `Weak` haste does not do anything with `Timing Mode 1`.
    - name: OPCODE_haste_2
      detail: int OPCODE_haste_2 = 317
      doc: |-
        [State: Haste 2](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op317)
        This effect is functionally identical to [opcode #16](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op16). The only difference between the two is that some ITMs/SPLs/abilities will specifically block/remove [opcode #16](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op16) but not [opcode #317](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op317) (e.g., Monks are immune to [opcode #16](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op16) but not [opcode #317](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op317)).
    - name: OPCODE_hide_in_shadows_mod
      detail: int OPCODE_hide_in_shadows_mod = 275
      doc: |-
        [Stat: Hide in Shadows Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op275)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Skill = Skill + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Skill = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Skill = (Skill * 'Statistic Modifier' value) / 100`
        When `Type = 0` and `Timing Mode = 9`, it modifies [HIDEINSHADOWSMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#180). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm) capped to the range [0,255], before being included in the creature's Hide in Shadows score.
    - name: OPCODE_hold
      detail: int OPCODE_hold = 109
      doc: |-
        [State: Hold](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op109)
        Applies the hold effect to the targeted creature(s), if the targeted creature(s) match the value specified by the 'IDS Entry' field, in the specified 'IDS File'.
        Known values for 'IDS File' are:
        2   EA.ids
        3   General.ids
        4   Race.ids
        5   Class.ids
        6   Specific.ids
        7   Gender.ids
        8   Align.ids
        The affected creature becomes immobile and its AI scripts stop running.
        This effect sets stat #58 (HELD) to 1. It also sets the STATE_HELPLESS flag.
    - name: OPCODE_hold_graphic
      detail: int OPCODE_hold_graphic = 175
      doc: |-
        [State: Hold](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op175)
        Applies a yellow fade in graphic effect to the targeted creature(s), and shows the 'Held' icon, if the targeted creature(s) match the value specified by the `IDS Entry` field, in the specified `IDS File`. The affected creature becomes immobile and its AI scripts stop running.
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE only)
        This effect sets [HELD](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#58) to `1`. It also sets the [STATE_HELPLESS](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5) flag.
        At least in EEs, this opcode automatically displays string [`STRREF_EFFECT_HOLD`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#35) in the combat log.
        It even overrides the entries in [EFFTEXT.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/efftext.htm).
    - name: OPCODE_hold_ii
      detail: int OPCODE_hold_ii = 185
      doc: |-
        [State: Hold (II)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op185)
        Applies a yellow fade in graphic effect to the targeted creature(s), and shows the 'Held' icon, if the targeted creature(s) match the value specified by the `IDS Entry` field, in the specified `IDS File`. The affected creature becomes immobile and its AI scripts stop running.
        This effect is not removed by [opcode #162](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op162).
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE only)
        This effect sets [HELD](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#58) to `1`. It also sets the [STATE_HELPLESS](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5) flag.
        At least in EEs, this opcode automatically displays string [`STRREF_EFFECT_HOLD`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#35) in the combat log.
        It even overrides the entries in [EFFTEXT.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/efftext.htm).
    - name: OPCODE_horror
      detail: int OPCODE_horror = 24
      doc: |-
        [State: Horror](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op24)
        Applies the horror effect to the targeted creature(s) in the style specified by the `Type` field, which is suspected to be an EE extension. It sets the STATE_PANIC state.
        Known values for `Type` are:
        - 0 ⟶ Default
        - Non-zero ⟶ Bypass [opcode #101](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101) (Immunity to effect)
    - name: OPCODE_hp_current_hp_mod
      detail: int OPCODE_hp_current_hp_mod = 17
      doc: |-
        [HP: Current HP Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op17)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `HP = HP + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `HP = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `HP = (HP * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        If `Statistic Modifier` and the Dice values are both non-zero, the total HP change is: `'Statistic Modifier' + Dice value`.
        The upper word of the `Type` field can further control the style.
        Known values for the upper word of `Type` are:
        - BIT0 ⟶ Raise dead
        - BIT1 ⟶ Remove all effects with a limited Timing Mode (`not equipped(2)` or `permanent(9)`), but also any [ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm) in the [`Magical Weapon Slot`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34).
        Unlike [opcode #12](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op12), this opcode does not apply any death effect ([opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13)) to the creature if it reduces their hit points to zero or less. The creature will remain in a bugged state (no HP but not dead) until they take further damage, or the game is saved & reloaded, at which point they will die properly.
    - name: OPCODE_hp_damage
      detail: int OPCODE_hp_damage = 12
      doc: |-
        [HP: Damage](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op12)
        Damages the target by the value specified by the 'Damage Amount' field, with the damage type specified by the 'Type' field.
        Known values for 'Type' are:
        0           Crushing
        1           Crushing Set to Value
        2           Crushing Set to Percentage
        3           Crushing Reduce by Percentage
        65536       Acid
        65537       Acid Set to Value
        65538       Acid Set to Percentage
        65539       Acid Reduce by Percentage
        131072      Cold
        131073      Cold Set to Value
        131074      Cold Set to Percentage
        131075      Cold Reduce by Percentage
        262144      Electricity
        262145      Electricity Set to Value
        262146      Electricity Set to Percentage
        262147      Electricity Reduce by Percentage
        524288      Fire
        524289      Fire Set to Value
        524290      Fire Set to Percentage
        524291      Fire Reduce by Percentage
        1048576     Piercing
        1048577     Piercing Set to Value
        1048578     Piercing Set to Percentage
        1048579     Piercing Reduce by Percentage
        2097152     Poison
        2097153     Poison Set to Value
        2097154     Poison Set to Percentage
        2097155     Poison Reduce by Percentage
        4194304     Magic
        4194305     Magic Set to Value
        4194306     Magic Set to Percentage
        4194307     Magic Reduce by Percentage
        8388608     Missile
        8388609     Missile Set to Value
        8388610     Missile Set to Percentage
        8388611     Missile Reduce by Percentage
        16777216    Slashing
        16777217    Slashing Set to Value
        16777218    Slashing Set to Percentage
        16777219    Slashing Reduce by Percentage
        33554432    Magic Fire
        33554433    Magic Fire Set to Value
        33554434    Magic Fire Set to Percentage
        33554435    Magic Fire Reduce by Percentage
        67108864    Magic Cold
        67108865    Magic Cold Set to Value
        67108866    Magic Cold Set to Percentage
        67108867    Magic Cold Reduce by Percentage
        134217728   Stunning
        134217729   Stunning Set to Value
        134217730   Stunning Set to Percentage
        134217731   Stunning Reduce by Percentage
        268435456   Soul Eater
        268435457   Soul Eater Set to Value
        268435458   Soul Eater Set to Percentage
        268435459   Soul Eater Reduce by Percentage
        1073741824  Disease
        1073741825  Disease Set to Value
        1073741826  Disease Set to Percentage
        1073741827  Disease Reduce by Percentage
        The Dice values can be used to inflict varying damage amounts - e.g. 2d6 would do 2-12 damage (Damage type is still specified by the 'Type' value).
        If 'Damage Amount' and the Dice values are both non-zero, the total damage inflicted is: 'Damage Amount' + Dice value.
        'Damage Amount' can be positive or negative (though the damage sound will play in either case).
        'Stunning' damage does not stun the target. Stunning damage cannot kill a creature, creatures are reduced to 1 HP and are knocked unconscious.
        Using 'Magic Fire' or 'Magic Cold' as a damage type will result the game to crash if the damage kills the target.
    - name: OPCODE_hp_maximum_hp_mod
      detail: int OPCODE_hp_maximum_hp_mod = 18
      doc: |-
        [HP: Maximum HP Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op18)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `HP = HP + 'Statistic Modifier' value` (affects current and max HP)
        - 1 ⟶ Flat Value Modifier: `HP = 'Statistic Modifier' value` (affects current and max HP)
        - 2 ⟶ Percentage Modifier: `HP = (HP * 'Statistic Modifier' value) / 100` (affects current and max HP)
        - 3 ⟶ As `0` (does not affect current HP)
        - 4 ⟶ As `1` (does not affect current HP)
        - 5 ⟶ As `2` (does not affect current HP)
        - 6 ⟶ Non-cumulative Modifier: `HP = HP + 'Statistic Modifier' value` (affects current and max HP) (EE only)
        `Statistic Modifier` can be positive or negative.
        Known values for `Mode` are:
        - 0 ⟶ Normal: Effect functions as dictated by the `Type` field.
        - 1 ⟶ Do not update current HP.
          - This value is set automatically once the effect has been initially processed on a creature.
          - For normal operation, the special field MUST be zero.
        To differentiate non-cumulative HP gain from other forms of HP gain, `Type` is set internally to `6`. As mentioned [here](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op12_flags), multiple effects of `Type=6` can be carried by the creature at the same time and only the largest value is used when calculating extra HP. Hence the term "noncumulative coexisting". This functionality doesn't interact with other forms (`Type != 6`) of HP gain, and cumulative HP drain doesn't use `Type=6`.
        For non-permanent timing modes of `Type` `2` or `5` use the base maximum HP value, and therefore override other `Type` `2` or `5` modifiers.
        If `Statistic Modifier` and the Dice values are both non-zero, the total HP change is: `'Statistic Modifier' + Dice value`.
        - Maximum HP cannot be reduced below a creature's level/HD (average level rounded up for multiclasses).
        - It is still able to reduce current HP below the creature's level/HD, and has the same bugged death as [opcode #17](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op17) if it reduces a creature to zero or less HP.
    - name: OPCODE_hp_minimum_limit
      detail: int OPCODE_hp_minimum_limit = 208
      doc: |-
        [HP: Minimum Limit](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op208)
        The targeted creature(s) HP value will not drop below the value specified by the `Minimum Value` field.
        This effect sets [MINHITPOINTS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#83) to `Minimum Value`.
        - `Minimum Value` values `65536` to `98303` will set an only allowed hit point value (HP can't be higher or lower), each representing `'Minimum Value' value - 65536`, so `0` to `32767`.
        - Values `32768` to `65535` do this as well, but all result in negative HP amounts, so not usable, as they will result in the same bugged non-death as [opcode #17](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op17) reducing HP to 0.
        - All values higher than `98303` just repeat loop over from `-32768` to `32767`.
        - Any positive value will also grant the creature immunity to directly applied [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13) effects. Those applied indirectly will still kill the creature, notably by opcodes [#55](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op55), [#134](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op134), [#151](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op151), [#209](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op209), and [#238](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op238).
    - name: OPCODE_hp_regeneration
      detail: int OPCODE_hp_regeneration = 98
      doc: |-
        [HP: Regeneration](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op98)
        Restores HP to the value of 'Regeneration Amount' in the style specified by the 'Type' field, to the targeted creature(s).
        Known values for 'Type' are:
        0   Restore 'Regeneration Amount' per second
        1   Restore 'Regeneration Amount' as a percentage of total HP
        2   Restore 'Regeneration Amount' HP every second
        3   Restore 1HP every 'Regeneration Amount' seconds
        4   Restore Param 3 HP every Param 1 seconds
        'Type' values greater or equal to 5 will crash the game!
        Permanent timing modes require a duration for this effect to work.
    - name: OPCODE_identify
      detail: int OPCODE_identify = 149
      doc: |-
        [(Identify)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op149)
        The use of this effect is unknown, and effect of its parameters are undefined.
        It is still processed, so it will still interact with [Spell Turning](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op200)/[Deflection](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op201)/etc... just like any other effect.
    - name: OPCODE_ids_set_ids_state
      detail: int OPCODE_ids_set_ids_state = 72
      doc: |-
        [IDS: Set IDS State](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op72)
        Alters the IDS state of the targeted creature(s) specified by the `IDS File` field, to the value specified by the `IDS Entry` field.
        Known values for `IDS File` are:
        - 0 ⟶ [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 1 ⟶ [Generic / General](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 2 ⟶ [Race](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 3 ⟶ [Class](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 4 ⟶ [Specific](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 5 ⟶ [Gender](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 6 ⟶ [Align / Alignmen](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm) (iwd1, pst)
        - Only reliable timing mode is `Timing Mode 1` (all others are bugged and can convert to this timing mode under various circumstances).
        - `Timing Mode`s `1/4/7` will permanently set the creature(s) IDS value, leaving no removable effect.
    - name: OPCODE_ids_sex_change
      detail: int OPCODE_ids_sex_change = 71
      doc: |-
        [IDS: Sex Change](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op71)
        Alters the gender of the targetted creature(s) to the value specified by the `Gender Modifier` field, in the style specified by the `Type` value.
        Known values for `Type` are:
        - 0 ⟶ Reverse Gender
        - 1 ⟶ Flat Value Modifier: `Gender = 'Statistic Modifier' value` (values from [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm))
        The effect modifies [SEX_CHANGED](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#193).
        - `Reverse Gender` also switches the second BIT of the lower BYTE of the creature's animation, which (for `PC` races), will switch between their male/female animations (`0x6000` ⟷ `0x6010`).
        - Other races can be setup this way, but do not occupy the necessary animation slots by default.
         For instance, `VAMPIRE` is `0x7F12`, `VAMPIRE_FEMALE` is `0x7F22` (Male should be `0x7F02` and female `0x7F12` for it to work).
    - name: OPCODE_ignore_dialog_pause
      detail: int OPCODE_ignore_dialog_pause = 194
      doc: |-
        [Ignore Dialog Pause](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op194)
        Allows the targeted creature(s) to carry on their actions during dialogs which pause action.
        The effect modifies [IGNOREDIALOGPAUSE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#82) to `Stat Value`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_image_projection
      detail: int OPCODE_image_projection = 236
      doc: |-
        [Spell Effect: Image Projection](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op236)
        Creates an image (duplicate) of the caster, in the style specified by the `Type` field.
        In particular:
        - The Image inherits any/only effects attached to the creature using `Timing Mode 9`
        - The Image has duplicates of all of the targeted creature(s) items that are flagged with `DROPPABLE` and not flagged with `NONDROPABLE`
        - All items on the Image are flagged with `NONDROPABLE`, so an image created by another image will have no items
        - If the targeted creature(s) is not a party memeber, saving is disabled so long as the image exists
        Known values for `Type` are:
        - 0 ⟶ Clone — Image created with the targeted creature(s) Current Hit Points and the following (in order)
          - All AI scripts and Dialogues are set to `""` (empty string, i.e. they will be cleared)
          - `Script Name` (Death Variable) set to `"COPY"`
          - [Opcode #68](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op68) based on effect `duration`
          - The creature is not immediately controllable, but will become controllable (if allied) after saving & reloading
        - 1 ⟶ Mislead — Image created with the targeted creature(s) Maximum Hit Points and the following (in order)
          - Allegiance set to `ALLY`, `NEUTRAL`, or `ENEMY`, depending on target allegiance
          - `Gender` set to `ILLUSIONARY`
          - All AI scripts and Dialogues are set to `""` (empty string, i.e. they will be cleared)
          - If the clone's allegiance is not `ALLY`, `Class Script` is set to `'Original Class Script' + 'M'`. The script has to already exist (as a separate `BCS` file).
            - And the `Class Script` is only set if it wasn't originally null/empty — it will never be just `"M"`
            - If original `Class Script` is 8 characters long, the last letter will be replaced with `"M"`
            - If you look in BG2EE, you will see these files:
              - `MAGE18A.BCS → MAGE18AM.BCS`
              - `MAGE18B.BCS → MAGE18BM.BCS`
              - `MAGE18C.BCS → MAGE18CM.BCS`
              - `MAGE18D.BCS → MAGE18DM.BCS`  The caster uses the first one, their Mislead clone uses the second one
          - `Script Name` (Death Variable) set to `"COPY"`
          - [Opcode #68](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op68) based on effect `duration`
          - [Opcode #237](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op237)`*p2=1`: Puppet Stats, Mislead
          - [Opcode #145](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op145)`*p2=0`: Disable Spell Casting, Wizard
          - [Opcode #145](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op145)`*p2=1`: Disable Spell Casting, Priest
          - [Opcode #145](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op145)`*p2=2`: Disable Spell Casting, Innate
          - [Opcode #144](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op144)`*p2=8`: Disable Button (Use Item)
          - [Opcode #144](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op144)`*p2=9`: Disable Button (Quick Item 1)
          - [Opcode #144](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op144)`*p2=11`: Disable Button (Quick Item 2)
          - [Opcode #144](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op144)`*p2=12`: Disable Button (Quick Item 3)
          - [Opcode #144](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op144)`*p2=13`: Disable Button (Special Ability)
          - Applies `"MISLEAD.SPL"`
        - 2 ⟶ Project Image — Image is created with the targeted creature(s) Current Hit Points and the following (in order)
          - Allegiance set to `ALLY`, `NEUTRAL`, or `ENEMY`, depending on target allegiance
          - `Gender` set to `ILLUSIONARY`
          - All AI scripts and Dialogues are set to `""` (empty string, i.e. they will be cleared)
          - `Script Name` (Death Variable) set to `"COPY"`
          - [Opcode #68](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op68) based on effect `duration`
          - [Opcode #237](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op237)`*p2=2`: Puppet Stats, Project Image
          - Applies `"PROJIMAG.SPL"`
        - 3 ⟶ Simulacrum — Image is created with the targeted creature(s) Current Hit Points and the following (in order)
          - Allegiance set to `ALLY`, `NEUTRAL`, or `ENEMY`, depending on target allegiance
          - All AI scripts and Dialogues are set to `""` (empty string, i.e. they will be cleared)
          - `Script Name` (Death Variable) set to `"COPY"`
          - [Opcode #68](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op68) based on effect `duration`
          - [Opcode #216](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op216)
          - [Opcode #237](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op237)`*p2=3`: Puppet Stats, Simulacrum
          - Applies `"SIMULACR.SPL"`
        - 4+ ⟶ As `0`
        `Simulacrum` is supposed to apply a [level-drain](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op216) effect to the clone equal to `floor(ceil(average of ``LEVEL``, ``LEVEL2``, ``LEVEL3``) * factor)`. The `factor` appears to be 50% in original games and 40% in EEs. However in EEs, the code is bugged for dual class characters — instead of using the character's average level it uses the level count of the first class in the dual class name.
        This means dual class mages usually end up with Simulacrums that are substantially more powerful than intended.
        Keep in mind that if the caster is equipped with an irremovable item (e.g., Edwin's Amulet), then its images will not inherit any bonuses/maluses from that specific item.
    - name: OPCODE_immunity_by_power_level
      detail: int OPCODE_immunity_by_power_level = 102
      doc: |-
        [Spell: Immunity (by Power Level)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op102)
        Gives the targeted creature(s) protection from effects (opcodes) whose `Power` attribute is equal to `Spell Level` (`range: 0 – 9`).
        - Each application of this opcode only protects against its specified `Spell Level`, not "up to" it.
        - Each effect in a spell/item is checked separately by this opcode.
        - CAN block effects of Secondary Type [`MagicAttack`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm#4).
          - [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their Secondary Type from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        - CAN block EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode can deflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT block non-hostile effects from self.
          - [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their non-hostile behavior from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Flags_BIT10)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#ExtHeader_Flags_BIT10)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x9C_BIT10) specify it manually.
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Deflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is deflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_immunity_by_power_level_decrementing
      detail: int OPCODE_immunity_by_power_level_decrementing = 201
      doc: |-
        [Spell: Immunity (by Power Level, decrementing)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op201)
        The targeted creature(s) will absorb a number of effects (specified by the `Total Amount` field) whose `Power` attribute is equal to the one specified by the `Power Level` field (`range: 0 – 9`).
        The `Power` level of the first effect to trigger any instance of this opcode's deflection will determine how much this opcode's `Total Amount` is decremented. Every instance of this opcode on the creature will be decremented by this amount.
        On EE games, `resource` field ⟶ Spell cast when this effect self-terminates, `default = Parent + "B"`.
        - CANNOT block effects of Secondary Type [`MagicAttack`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm#4).
          - [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their Secondary Type from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        - CANNOT block EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode cannot deflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT block effects from self.
        - Maintains portrait icon [`Spell Deflection`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#67) on the target.
        - Maintains animation `SPMAGGLO` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Deflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is deflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_immunity_by_school_decrementing
      detail: int OPCODE_immunity_by_school_decrementing = 223
      doc: |-
        [Spell: Immunity (by School, decrementing)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op223)
        The targeted creature(s) will absorb a number of effects (specified by the `Total Amount` field) whose `Primary Type (School)` is equal to the one specified by the `School` field.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Primary Type (School)` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x25)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x17)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x4C) specify it manually.
