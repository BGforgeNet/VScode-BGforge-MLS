iesdp_word:
  type: 21
  items:
    - name: EFF2_probability1
      detail: word offset EFF2_probability1 = 0x2c
      doc: |-
        **[Probability 1](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x2C)**
        If called via [opcode #183](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op183), this field is ignored.
    - name: EFF2_probability2
      detail: word offset EFF2_probability2 = 0x2e
      doc: |-
        **[Probability 2](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x2E)**
        See [here](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x13) for further details.
        If called via [opcode #183](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op183), this field is ignored.
    - name: EFF2_timing
      detail: word offset EFF2_timing = 0x24
      doc: |-
        [**Timing mode**](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24)
        - 0 ⟶ [Instant/Limited](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_0)
        - 1 ⟶ [Instant/Permanent](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_1)
        - 2 ⟶ [Instant/While equipped](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_2)
        - 3 ⟶ [Delay/Limited](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_3)
        - 4 ⟶ [Delay/Permanent](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_4)
        - 5 ⟶ [Delay/While equipped](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_5)
        - 6 ⟶ [Limited after duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_6)
        - 7 ⟶ [Permanent after duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_7)
        - 8 ⟶ [Equipped after duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_8)
        - 9 ⟶ [Instant/Permanent](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_9) (after Death)
        - 10 ⟶ [Instant/Limited](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_10)
        - 4096 ⟶ [**Absolute duration**](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096)
          - Effect is applied instantly.
          - This timing mode treats the [Duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28) field as the effect's expiration time (in ticks). Expires at [Gametime](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime)`(ticks) >= `[Duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28)`(ticks)`.
          If the [Duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28) field is `108000`, the effect will expire when the game timer reaches 24 hours, or instantly if the game timer has already passed that point. `108000 = 300(1 hour) * 24 * 15 (ticks ➔ seconds)`.
        If called via [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #183](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op183)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283), this field is ignored.
    - name: EFF_effect_type
      detail: word offset EFF_effect_type = 0x0
      doc: Effect type
    - name: FX_opcode
      detail: word offset FX_opcode = 0x0
      doc: Opcode Number
    - name: ITM_HEAD_damage_bonus
      detail: word offset ITM_HEAD_damage_bonus = 0x1a
      doc: "**[Damage bonus](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1A)**"
    - name: ITM_HEAD_damage_type
      detail: word offset ITM_HEAD_damage_type = 0x1c
      doc: |-
        **[Damage type](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C)**
        - 0 ⟶ **[None](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_0)**
          - Deals Crushing damage, uses base AC (ignores all 4 specific AC).
            - If [`#dice`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x18): Deals damage as normal, just no dice amount.
            - If [`#dice`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x18): Sets target's HP to `Damage Dealt`, ignores crushing resistance.
        - 1 ⟶ **[Piercing](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_1)**
        - 2 ⟶ **[Crushing](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_2)**
        - 3 ⟶ **[Slashing](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_3)**
        - 4 ⟶ **[Missile](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_4)**
        - 5 ⟶ **[Fist](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_5)**
          - Deals non-lethal damage, but uses Crushing AC.
        - 6 ⟶ **[Piercing/Crushing](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_6)** (Better)
          - Uses whichever damage type and AC the creature has the worst damage resistance against (regardless if its AC is better or worse). Uses `Piercing` if equal resistance.
        - 7 ⟶ **[Piercing/Slashing](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_7)** (Better)
          - Uses whichever damage type and AC the creature has the worst damage resistance against (regardless if its AC is better or worse). Uses `Piercing` if equal resistance.
        - 8 ⟶ **[Crushing/Slashing](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_8)** (Worse)
          - Uses whichever damage type and AC the creature has the better damage resistance against (regardless if its AC is better or worse). Uses `Slashing` if equal resistance.
        - 9 ⟶ **[Blunt Missile](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_9)**
          - Same as [`None`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_0)
            - Either it's bugged or [`Blunt Missile`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_9) has always been an IWD2-only feature.
            - It's probably meant to deal crushing damage while using Missile AC.
        - 10+ ⟶ Same as [`None`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_0)
        - ALL values:
          - If [`Dice thrown`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x18), [`Dice size`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x16), and [`Damage bonus`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1A) are all `0`: Always deals zero damage (ignores all modifiers, like Weapon Proficiency).
            - If you want zero base damage + modifiers, you can use `1d1 - 1`.
          - Some edge cases:
            - [`Dice thrown`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x18): Deals `X` damage, regardless of other modifiers.
            - [`Dice thrown`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x18): Deals `X + modifiers` damage.
            - [`Dice thrown`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x18): Also deals `0` damage.
        - Values `1–4` don't have any other quirks ([`Piercing`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_1), [`Crushing`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_2), [`Slashing`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_3), [`Missile`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x1C_4)), just each a different damage type.
    - name: ITM_HEAD_depletion
      detail: word offset ITM_HEAD_depletion = 0x24
      doc: |-
        **[Charge depletion behaviour](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24)**
        - 0 ⟶ **[Item remains](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24_0)**
          - Item becomes unusable (except as a weapon) when [`Max Charges`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x22) reaches zero. Can be recharged by selling or by resting if it has the [`Recharge after resting`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#ExtHeader_Flags_BIT11) flag.
        - 1 ⟶ **[Item vanishes](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24_1)**
          - Item disappears when [`Max Charges`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x22) reaches zero. Can be recharged prior to reaching zero (through either method).
        - 2 ⟶ **[Replace with used up](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24_2)**
          - When [`Max Charges`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x22) reaches zero, item is replaced with the item specified at offset [`0x10`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Header_0x10). Can be recharged prior to reaching zero (through either method).
        - 3 ⟶ **[Item recharges](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24_3)**
          - This is very likely no different from [`Item remains`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24_0) or `4+`, i.e. defaults to [`0`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x24_0).
        - This field is irrelevant when the [`Max Charges`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x22) field is zero. Item can be used infinitely.
        - If the item has a [`Max Stack Size`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Header_0x38), this behavior will instead occur when the stack is depleted, not the charges (but still requires a non-zero [`Max Charges`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x22)).
    - name: ITM_HEAD_feature_block_count
      detail: word offset ITM_HEAD_feature_block_count = 0x1e
      doc: Count of feature blocks
    - name: ITM_HEAD_feature_block_index
      detail: word offset ITM_HEAD_feature_block_index = 0x20
      doc: Index into feature blocks
    - name: ITM_HEAD_is_arrow
      detail: word offset ITM_HEAD_is_arrow = 0x32
      doc: |-
        **[Arrow qualifier / Is arrow?](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x32)**
        - 0 ⟶ No
        - 1 ⟶ Yes
        It controls which firing animation the ability will use.
        It needs to be set on any launcher and/or ammo, but the launcher will override the ammo.
    - name: ITM_HEAD_is_bolt
      detail: word offset ITM_HEAD_is_bolt = 0x34
      doc: |-
        **[Bolt qualifier / Is bolt?](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x34)**
        - 0 ⟶ No
        - 1 ⟶ Yes
        It controls which firing animation the ability will use.
        It needs to be set on any launcher and/or ammo, but the launcher will override the ammo.
    - name: ITM_HEAD_is_bullet
      detail: word offset ITM_HEAD_is_bullet = 0x36
      doc: |-
        **[Bullet qualifier / Is bullet?](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x36)**
        - 0 ⟶ No
        - 1 ⟶ Yes
        It controls which firing animation the ability will use.
        It needs to be set on any launcher and/or ammo, but the launcher will override the ammo.
    - name: ITM_HEAD_max_charges
      detail: word offset ITM_HEAD_max_charges = 0x22
      doc: "**[Max Charges](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x22)**"
    - name: ITM_HEAD_melee_animation
      detail: word offset ITM_HEAD_melee_animation = 0x2c
      doc: |-
        **[Melee animation](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#ExtendedHeader_MeleeAnimation)**
        - It should total 100, but not mandatory on EE games.
        - Not needed if [`Arrow`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x32)/[`Bolt`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x34)/[`Bullet`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x36) is used.
        - It should work as such:
          Engine rolls `0 – 99`.
          - `overhand range = 0 to (overhand - 1)`
          - `backhand range = overhand to (overhand + backhand - 1)`
          - `thrust range = (overhand + backhand) to (overhand + backhand + thrust - 1)`
          A couple of examples:
          - With values `34`, `33`, and `33`:
            - `0 – 33`: Overhand
            - `34 – 66`: Backhand
            - `67 – 99`: Thrust
          - With values `100`, `100`, `100`:
            - `0 – 99`: Overhand
            - `100 – 199`: Backhand (never used)
            - `200 – 299`: Thrust (never used)
        - Along with [`Is arrow?`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x32)/[`Is bolt?`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x34)/[`Is bullet?`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x36), it is only used for attack animations. If all are zero, no animation will be used for attacking. Activated [`Item`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x2_3) abilities can leave them all `0`, as they are not used.
    - name: ITM_HEAD_projectile_animation
      detail: word offset ITM_HEAD_projectile_animation = 0x2a
      doc: "**[Projectile Animation](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x2A)** (projectl.ids/missile.ids)"
    - name: ITM_HEAD_range
      detail: word offset ITM_HEAD_range = 0xe
      doc: "**[Range](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0xE)**"
    - name: ITM_HEAD_thac0_bonus
      detail: word offset ITM_HEAD_thac0_bonus = 0x14
      doc: |-
        THAC0 bonus
        A successful hit will always occur if any of the conditions below is true
        - This field is set to `32767`.
        - The target creature(s) is `STATE_HELPLESS`.
        - The target is affected by [Time Stop](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op231).
    - name: ITM_extended_headers_count
      detail: word offset ITM_extended_headers_count = 0x68
      doc: Count of extended headers
    - name: ITM_feature_blocks_count
      detail: word offset ITM_feature_blocks_count = 0x70
      doc: Count of equipping feature blocks
    - name: ITM_feature_blocks_index
      detail: word offset ITM_feature_blocks_index = 0x6e
      doc: Index into equipping feature blocks
    - name: ITM_lore_to_id
      detail: word offset ITM_lore_to_id = 0x42
      doc: Lore to ID
    - name: ITM_min_charisma
      detail: word offset ITM_min_charisma = 0x32
      doc: Min Charisma
    - name: ITM_min_level
      detail: word offset ITM_min_level = 0x24
      doc: |-
        **[Min Level](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Header_0x24)**
        - Treated as average of all active class levels, rounded up.
        - This field is basically the ITM counterpart of [`Level Required`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x10).
        - The only difference is that ITM [abilities](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header) cannot have separate level requirements.
    - name: ITM_min_strength
      detail: word offset ITM_min_strength = 0x26
      doc: Min Strength (unused in BG1)
    - name: ITM_stack_amount
      detail: word offset ITM_stack_amount = 0x38
      doc: "**[Stack amount](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Header_0x38)**"
    - name: ITM_type
      detail: word offset ITM_type = 0x1c
      doc: "[Item type](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#Header_ItemType)"
    - name: SPL_HEAD_casting_time
      detail: word offset SPL_HEAD_casting_time = 0x12
      doc: |-
        **[Casting Time](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x12)**
        - This value represents the number of tenths of rounds that it takes to cast the spell.
        - Combat scripting in the IE gets very dumb when [`Casting Time`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x12)s start matching or exceeding `10` (one full round). The engine assumes any spell is cast within a round, and can sometimes just go to the next round's action (f.i. the mage sits there casting for six seconds, then throws the spell away to use a sling).
          - As a result, you might want to use maximum [`Casting Time`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x12)s of `9` (i.e. 9⁄10ths of a round) even for spells which are supposed to have a [`Casting Time`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x12) of a full round.
        - As far as subspells are concerned, their speed is only used if cast through [opcode #146](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op146)/[opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148) with the `Cast normally` option.
    - name: SPL_HEAD_feature_blocks_count
      detail: word offset SPL_HEAD_feature_blocks_count = 0x1e
      doc: Count of feature blocks
    - name: SPL_HEAD_feature_blocks_offset
      detail: word offset SPL_HEAD_feature_blocks_offset = 0x20
      doc: Offset to feature blocks
    - name: SPL_HEAD_level_required
      detail: word offset SPL_HEAD_level_required = 0x10
      doc: |-
        **[Level Required](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x10)**
        Standard spellcasting only utilizes the first byte (`0 – 255`), but opcodes that specify Casting Level ([`146`](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op146)/[`326`](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op326)/[`333`](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op333)) have access to the entire range (`0 – 65535`).
    - name: SPL_HEAD_location
      detail: word offset SPL_HEAD_location = 0x2
      doc: |-
        **[Location](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2)**
        - 0 ⟶ None
          - Ability will not be selectable through the UI (but still available to scripts and spell-casting opcodes).
        - 1 ⟶ Weapon
          - [`ITM`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x2_1) only.
        - 2 ⟶ **[Spell](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2_2)**
          - Ability can be selected from "Cast Spell (F7)" button, and from Quick-spell buttons.
        - 3 ⟶ Item
          - [`ITM`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x2_3) only.
        - 4 ⟶ **[Innate](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2_4)**
          - Ability can be selected from "Special Abilities (F12)" button.
        - 5+ ⟶ As `0`.
        Subspells don't require an [`Ability Location`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2).
    - name: SPL_HEAD_projectile
      detail: word offset SPL_HEAD_projectile = 0x26
      doc: "**[Projectile](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x26)** (BG2: [projectl.ids](https://gibberlings3.github.io/iesdp/ids/bg2/projectl.htm). **Note:** in BG2, this value is off-by-one from projectl.ids value. I.e. binary value of `2` corresponds to `0x1 - ARROW`)"
    - name: SPL_HEAD_range
      detail: word offset SPL_HEAD_range = 0xe
      doc: |-
        **[Range](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0xE)**
        As far as subspells are concerned, their [`Range`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0xE) is only checked if cast through [opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148), [opcode #232](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op232), [opcode #258](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op258), or [opcode #260](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op260).
    - name: SPL_HEAD_times_per_day
      detail: word offset SPL_HEAD_times_per_day = 0x14
      doc: Times per day
    - name: SPL_casting_feature_blocks_count
      detail: word offset SPL_casting_feature_blocks_count = 0x70
      doc: Casting Feature Block count
    - name: SPL_casting_feature_blocks_offset
      detail: word offset SPL_casting_feature_blocks_offset = 0x6e
      doc: Casting Feature Block offset (these feature blocks may not use target type 2)
    - name: SPL_casting_graphics
      detail: word offset SPL_casting_graphics = 0x22
      doc: "[Casting Graphics](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Casting_Graphics)"
    - name: SPL_extended_headers_count
      detail: word offset SPL_extended_headers_count = 0x68
      doc: Extended Header count
    - name: SPL_type
      detail: word offset SPL_type = 0x1c
      doc: |-
        **[Spell type](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C)**:
        - 0 ⟶ **[Special](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_0)**
        - 1 ⟶ **[Wizard](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1)**
        - 2 ⟶ **[Priest](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2)**
        - 3 ⟶ **[Psionic](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_3)**
        - 4 ⟶ **[Innate](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4)**
        - 5 ⟶ **[Bard song](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_5)**
        - [`Special`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_0), [`Psionic`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_3), [`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4), and [`Bard song`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_5) differ only by the string displayed when you cast them. They are all treated as [`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4) abilities, even by [opcode #145](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op145) and the [`SpellCastInnate()`](https://gibberlings3.github.io/iesdp/scripting/triggers/bgeetriggers.htm#0x00A7) trigger.
        - [`Special`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_0) and [`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4) will display [`spell name`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x8).
        - [`Psionic`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_3) and [`Bard song`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_5) will display [`spell name`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x8) (which can be misleading).
        - [`Wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1) and [`Priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2) will also display [`spell name`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x8).
        - Any spell cast by one of the [`ForceSpell()`](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#113) script actions will instead display [`Special`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_0)/[`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4) casting message.
        - Any spell cast by the "BattleSong" (Bard Song/Shaman Dance) or [`ApplySpell()`](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#160) script actions will display [`Special`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_0)/[`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4) casting message.
        - For any spell cast by another opcode, its casting message will depend on that opcode, but is usually the same as the [`Special`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_0)/[`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4) casting message.
        - All other values (`6 – 65535`) functions the same as [`Psionic`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_3)/[`Bard song`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_5).
        - [`SPELLFAILUREMAGE`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#51) is related to Spell type [`Wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1).
        - [`SPELLFAILUREPRIEST`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#52) is related to Spell type [`Priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2).
        - [`SPELL_FAILURE_INNATE`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#194) is related to Spell type [`Psionic`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_3)/[`Innate`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_4)/[`Bard song`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_5).
        - Normally, any subspells that scale with [`Level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x10) should be of the same [`Type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C) as the spell casting them.
          - If they don't scale, it doesn't really matter.
          - It also doesn't matter when they are applied through [opcode #146](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op146)`*p2=2`/[opcode #326](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op326)/[opcode #333](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op333).
    - name: STO_ITEM_charges1
      detail: word offset STO_ITEM_charges1 = 0xa
      doc: Quantity/Charges 1
    - name: STO_ITEM_charges2
      detail: word offset STO_ITEM_charges2 = 0xc
      doc: Quantity/Charges 2
    - name: STO_ITEM_charges3
      detail: word offset STO_ITEM_charges3 = 0xe
      doc: Quantity/Charges 3
    - name: STO_ITEM_expiration_time
      detail: word offset STO_ITEM_expiration_time = 0x8
      doc: Item expiration time (replace with drained item)
    - name: STO_capacity
      detail: word offset STO_capacity = 0x22
      doc: Capacity (0=unlimited)
    - name: STO_chance_of_steal_failure
      detail: word offset STO_chance_of_steal_failure = 0x20
      doc: "% chance of steal failure"
iesdp_byte:
  type: 21
  items:
    - name: EFF_power
      detail: byte offset EFF_power = 0x3
      doc: Power
    - name: EFF_probability1
      detail: byte offset EFF_probability1 = 0x12
      doc: "**[Probability 1](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x12)**"
    - name: EFF_probability2
      detail: byte offset EFF_probability2 = 0x13
      doc: |-
        **[Probability 2](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x13)**
        - The `BG1` engine treats probability as a single word, effects are applied in the range `0–probability`.
        - Other engines treat probability as two values. When an event fires, a random number (let us denote it by `x`) in the `0–99` range is generated. If [`Probability1`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x12), the event fires.
          - Some counter-intuitive cases:
            - if you set both [`Probability1`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x12) and [`Probability2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x13) to `0`, you get an effect with a 1％ chance of firing (it fires whenever the random number generator spits out zero).
            - if you set [`Probability1`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x12) to `1` and [`Probability2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x13) to `0` (as, e.g., happens in BGT/BGEE's implementation of the iron crisis), you don't get an effect with a 1％ chance of firing, but one with a 2％ chance of firing.
        - An effect's probabilities are rolled on the sprite the effect is applied to. This means that an effect targeting [`Projectile Target`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2) will have the target roll that effect's probabilities, not the attacker or caster. This decouples the split probability roll and allows both to occur at the same time, since each sprite rolls separately. As a consequence it is not directly possible to synchronize effects with partial probabilities that are applied to different targets (e.g. [`Projectile Target`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2) and [`Self`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_1)).
    - name: EFF_resistance
      detail: byte offset EFF_resistance = 0xd
      doc: |-
        **[Dispel / Resistance](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xD)**
        The default behaviour is that effects cannot be dispelled and ignore magic resistance.
        - bit 0 ⟶ Can be dispelled, affected by magic resistance
        - bit 1 ⟶ Ignores magic resistance (when used in combination with bit 0)
        This can also be presented in the more traditional way:
        - 0 ⟶ Natural/Nonmagical
        - 1 ⟶ Can be dispelled/Affected by resistance
        - 2 ⟶ Cannot be dispelled/Ignores resistance
        - 3 ⟶ Can be dispelled/Ignores resistance
        The only difference between `0` and `2` is that `0` will automatically convert to `2` when targeting yourself.
    - name: EFF_target
      detail: byte offset EFF_target = 0x2
      doc: |-
        **[Target type](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2)**
        - 0 ⟶ None
        - 1 ⟶ **[Self](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_1)**
        - 2 ⟶ **[Projectile target](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2)**
          - Affects each target of the specified projectile, as it impacts them.
        - 3 ⟶ **[Party](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_3)**
        - 4 ⟶ **[Everyone](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_4)**
        - 5 ⟶ **[Everyone except party](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_5)**
        - 6 ⟶ **[Caster group](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_6)**
          - Everyone matching [`specific`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x274) value of caster.
          - If cast by a party member, then it functions as [`Party`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_3).
          - Ability target ([`ITM`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0xC)) doesn't matter.
        - 7 ⟶ **[Target group](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_7)**
          - Everyone matching [`specific`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x274) value of target.
          - Ability ([`ITM`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0xC)) must target a [creature](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/are_v1.htm#formAREAV1_0_Actor), not a location, [container](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/are_v1.htm#formAREAV1_0_Container), [door](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/are_v1.htm#formAREAV1_0_Door), etc...
        - 8 ⟶ **[Everyone except self](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_8)**
        - 9 ⟶ **[Original caster](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_9)**
          - Affects Caster, as the specified projectile impacts its target(s), once or for each target depending on the projectile's flags (see [here](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#ExtFlags_BIT31)). The specified projectile only determines when/if it's applied.
        - `ITM` global (equipped) effects: Target is always the wearer, this field isn't relevant.
        - `SPL` global (casting) effects: Will not work with [`Projectile Target`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2).
        - `Everyone` stands for "in current area".
        - Excluding [`Target type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2) [`2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2), all other [`Target type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2)s apply the effect using projectile `#1|None`.
        - [`Target type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2)s [`2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2) and [`9`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_9) are applied in effect order, but always after the others, even when using projectile `#1|None`.
          - [`Target type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2)s (`1`, `3–8`) are applied in effect order.
            - If a spell/item has effects listed in this order:
              - `op(1), target = 2`
              - `op(2), target = 3`
              - `op(3), target = 1`
              - `op(4), target = 9`
              - `op(5), target = 2`
              - `op(6), target = 6`
              They will be applied in this order:
              op(2), op(3), op(6), op(1), op(4), op(5).
        - Similar to Melee Weapon Attacks, when [`Target type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2)s other than [`1`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_1), [`2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2), [`9`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_9) apply the effect, they are subjected to [opcode #197](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op197) (`parameter2=0`) but not to [opcode #83](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op83). (Excluding when they're affecting the caster).
        - Be aware that [opcode #146](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op146)`*p2=2`, [opcode #326](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op326), and [opcode #333](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op333) might behave differently when it comes to [`Self`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_1)/[`Projectile Target`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_2)/[`Original Caster`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x2_9).
    - name: EFF_timing_mode
      detail: byte offset EFF_timing_mode = 0xc
      doc: |-
        **[Timing mode](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC)**
        - 0 ⟶ **[Instant/Limited](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_0)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in seconds.
          - Instantly converts to [`Absolute duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
        - 1 ⟶ **[Instant/Permanent](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_1)**
          - If the opcode doesn't directly modify a [`STAT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm) in the target's [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file, then it will last until removed (or it self-terminates). [`New duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28) (mostly unused).
        - 2 ⟶ **[Instant/While equipped](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_2)**
          - As global `ITM` effect: Applied when item is equipped, lasts until item is unequipped (or [polymorph](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op135) bug).
            - "Equipping" also occurs when game loads, and for weapons whenever they are selected from quickbar (even if it's already the active weapon). Never expires, and not considered a "Limited" effect.
          - As `SPL` or header `ITM` effect: applies instantly, lasts until game is reloaded.
          - [`New duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28) (mostly unused).
        - 3 ⟶ **[Delay/Limited](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_3)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in seconds.
          - Instantly converts to [`Limited after duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_6), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
        - 4 ⟶ **[Delay/Permanent](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_4)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in seconds.
          - Instantly converts to [`Permanent after duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_7), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
        - 5 ⟶ **[Delay/While equipped](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_5)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in seconds.
          - Instantly converts to [`Equipped after duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_8), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
        - 6 ⟶ **[Limited after duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_6)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in ticks (1⁄15 second).
          - At [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) converts to [`Absolute duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
            - (If previously converted from [`Delay/Limited`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_3))
          - At [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) converts to [`Absolute duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
            - (If effect applied directly with [`Limited after duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_6))
            - `16 x Duration(ticks) = Duration(ticks) + 15 * Duration(seconds)` (Yes, it calculates a new duration using its current [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) field as both ticks and seconds).
            - It will convert to [`Absolute duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096) at the same [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) (ticks) no matter when the effect was applied.
            - That [`Absolute duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096) will expire at the same [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) (ticks) no matter when the effect was applied.
        - 7 ⟶ **[Permanent after duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_7)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in ticks (1⁄15 second).
          - At [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) converts to [`Instant/Permanent`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_1), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
            - (If previously converted from [`Delay/Permanent`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_4))
          - At [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) converts to [`Instant/Permanent`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_1), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
            - (If effect applied directly with [`Permanent after duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_7))
            - It will convert to [`Instant/Permanent`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_1) at the same [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) (ticks) no matter when the effect was applied.
        - 8 ⟶ **[Equipped after duration](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_8)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in ticks (1⁄15 second).
          - At [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) converts to [`Instant/While equipped`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_2), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
        - 9 ⟶ **[Instant/Permanent](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_9)** (after Death)
          - Effect is applied instantly.
          - Never expires, but can terminate or be removed. [`New duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
        - 10 ⟶ **[Instant/Limited](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_10)**
          - This timing mode measures [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE) in ticks (1⁄15 second).
          - Instantly converts to [`Absolute duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x24_4096), [`new duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x28).
          - If [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE), it won't function any differently from timing mode [`0`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_0).
        - All effects except those with Timing mode [`9`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xC_9) are removed by death.
        - Some effects use a measurement of [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) in seconds, and multiply it by 15, rather than taking the exact [`Gametime`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/gam_v2.0.htm#GAMEV2_0_Header_GameTime) in ticks.
          - This results in them lasting longer/shorter than they should (by up to 14 ticks).
            - One of such effects is [Time Stop](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op231) (this is in addition to lasting half its specified [`Duration`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0xE)).
