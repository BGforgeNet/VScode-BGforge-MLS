    - name: EFF2_parameter1
      detail: dword offset EFF2_parameter1 = 0x1c
      doc: Parameter 1
    - name: EFF2_parameter2
      detail: dword offset EFF2_parameter2 = 0x20
      doc: Parameter 2
    - name: EFF2_parameter3
      detail: dword offset EFF2_parameter3 = 0x60
      doc: "**[Parameter 3](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x60)**"
    - name: EFF2_parameter4
      detail: dword offset EFF2_parameter4 = 0x64
      doc: "**[Parameter 4](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x64)**"
    - name: EFF2_parameter5
      detail: dword offset EFF2_parameter5 = 0x68
      doc: Parameter 5
    - name: EFF2_parent_resource_flags
      detail: dword offset EFF2_parent_resource_flags = 0x9c
      doc: |-
        **[Parent resource flags](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x9C)**
        - bit 10 ⟶ **[Hostile](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x9C_BIT10)**
        - bit 11 ⟶ No LOS required
        - bit 12 ⟶ Allow spotting
        - bit 13 ⟶ Outdoors only
        - bit 14 ⟶ Non-magical ability
        - bit 15 ⟶ Ignore Wild Surge
        - bit 16 ⟶ Non-combat ability
    - name: EFF2_parent_resource_type
      detail: dword offset EFF2_parent_resource_type = 0x90
      doc: |-
        **[Parent resource type](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x90)**
        - 0 ⟶ **[None](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x90_0)**
        - 1 ⟶ **[Spell](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x90_1)**
        - 2 ⟶ **[Item](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x90_2)**
    - name: EFF2_power
      detail: dword offset EFF2_power = 0x18
      doc: Power
    - name: EFF2_projectile
      detail: dword offset EFF2_projectile = 0xa0
      doc: "**[Projectile](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xA0)**"
    - name: EFF2_resistance
      detail: dword offset EFF2_resistance = 0x5c
      doc: |-
        **[Dispel/Resistance](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C)**
        The default behaviour is that effects cannot be dispelled and ignore resistance.
        - bit 0 ⟶ **[Dispel](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT0)**
          - Can be dispelled, affected by Magic Resistance.
        - bit 1 ⟶ **[Bypass resistance](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT1)**
          - Ignores Magic Resistance.
        - bit 2 ⟶
          **Bypasses
            opcode #199,
            opcode #200,
            opcode #201,
            and opcode #259
          ** (only in EE games patched to v2.0+)
        Set automatically by the engine in the following circumstances:
        - An effect has one of the following `Target type` values:
          - `Party (3)`
          - `Everyone (4)`
          - `Everyone except party (5)`
          - `Caster group (6)`
          - `Target group (7)`
          - `Everyone except self (8)`
        - An effect is delivered via:
          - The hardcoded projectiles `25/26/189`
          - **or** a `PRO` file's `Secondary Projectile`
        **and** uses a non-`Original caster (9)` `Target type`.
        - bit 3 ⟶ **[Self-targeted](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT3)** (only in EE games patched to v2.6+)
          - Targeting yourself with an ability (Extended Header) will internally set this bit on all effects applied by that ability.
            - For the caster, it will allow a Magic Resistance check for any effect that has both [`Dispel`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT0) set and offers some saving throw.
              - The saving throw doesn't have to succeed, it just has to be offered.
            - For anyone else hit by the ability, it will allow a Magic Resistance check for any effect that also has [`Dispel`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT0) set.
          - Either way, this bit is still overridden by [`Bypass Resistance`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT1).
          - This feature should eliminate the bug/exploit of bypassing other's Magic Resistance by targeting yourself with an [`area-effect`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) ability.
        - bit 31 ⟶ **[Effect applied by item](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT31)**
          - Effect was applied by an [ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm) (only present in EE games patched to v2.0+).
          - It is set by the engine if the effect's source [ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm) is identified.
            - This bit is only used by [opcode #324](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op324) which checks it to determine whether it should set [`STRREF_FEEDBACK_IMMUNE_RESOURCE`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#128) to the ITM's general or identified name.
        This can also be presented in the more traditional way:
        - 0 ⟶ Nonmagical
        - 1 ⟶ Can be dispelled/Affected by resistance
        - 2 ⟶ Cannot be dispelled/Ignores resistance
        - 3 ⟶ Can be dispelled/Ignores resistance
        If called via [opcode #183](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op183), this field is ignored.
