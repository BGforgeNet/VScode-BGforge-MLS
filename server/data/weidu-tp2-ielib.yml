    - name: OPCODE_mass_raise_dead
      detail: int OPCODE_mass_raise_dead = 304
      doc: |-
        [Mass Raise Dead](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op304)
        This effect will raise multiple dead Party Members (PCs).
    - name: OPCODE_maze
      detail: int OPCODE_maze = 213
      doc: |-
        [Spell Effect: Maze](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op213)
        Applies the maze effect to the targeted creature(s).
        Suspends the creature in the same manner as [Imprisonment](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op211), disabling Inventory and removing all active Portrait Icons (except its own), but without kicking or granting exp. It actually removes itself with a delayed [opcode #212](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op212) effect (that it also applies), not by expiring. Blocking the [opcode #212](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op212) effect will prevent maze from ending.
        Known values for `Type` are:
        - 0 ⟶ Use intelligence based duration (via [INTMOD.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/intmod.htm))
        - 1 ⟶ Use `Duration` field
        The duration of the effect is set in [INTMOD.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/intmod.htm), default values are:
        - 0 to 2 int ⟶ 20d4 rounds
        - 3 to 5 int ⟶ 10d4 rounds
        - 6 to 8 int ⟶ 5d4 rounds
        - 9 to 11 int ⟶ 4d4 rounds
        - 12 to 14 int ⟶ 3d4 rounds
        - 15 to 17 int ⟶ 2d4 rounds
        - 18+ int ⟶ 1d4 rounds
        `Icon` defines the index from [STATDESC.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm) for custom portrait icons (EE only). Default value is [`Maze`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#78).
    - name: OPCODE_melee_thac0_mod
      detail: int OPCODE_melee_thac0_mod = 284
      doc: |-
        [Stat: Melee THAC0 Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op284)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `THAC0 = THAC0 + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `THAC0 = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `THAC0 = (THAC0 * 'Statistic Modifier' value) / 100`
        The effect modifies [MELEE_THACO_BONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#166).
    - name: OPCODE_melee_weapon_damage_mod
      detail: int OPCODE_melee_weapon_damage_mod = 285
