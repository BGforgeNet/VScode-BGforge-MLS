        - Maintains animation `SPTURNI2` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Reflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is reflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_button_disable_button
      detail: int OPCODE_button_disable_button = 144
      doc: |-
        [Button: Disable Button](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op144)
        Disabled the button specified by the `Button` field. The resource field acts as a matching key to the resource field of the Enable Button, allowing separate enable/disable reasons.
        Known values for `Button` are:
        - 0 ⟶ Stealth Button
        - 1 ⟶ Thieving Skill Button
        - 2 ⟶ Spell Select Button
        - 3 ⟶ First Quick Spell Button
        - 4 ⟶ Second Quick Spell Button
        - 5 ⟶ Third Quick Spell Button
        - 6 ⟶ Turn Undead Button
        - 7 ⟶ Talk Button
        - 8 ⟶ Use Item Button
        - 9 ⟶ First Quick Item Button
        - 10 ⟶ Bard Song Button (EE only)
        - 11 ⟶ Second Quick Item Button
        - 12 ⟶ Third Quick Item Button
        - 13 ⟶ Innate Ability Button
        - 14 ⟶ Find Traps Button
        - 15 ⟶ Inventory Button (EE only)
    - name: OPCODE_button_enable_button
      detail: int OPCODE_button_enable_button = 279
      doc: |-
        [Button: Enable Button](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op279)
        Enables the button specified by the `Button` field. The resource field acts as a matching key to the resource field of the Enable Button, allowing separate enable/disable reasons.
        Known values for `Button` are:
        - 0 ⟶ Stealth Button
        - 1 ⟶ Thieving Skill Button
        - 2 ⟶ Spell Select Button
        - 3 ⟶ First Quick Spell Button
        - 4 ⟶ Second Quick Spell Button
        - 5 ⟶ Third Quick Spell Button
        - 6 ⟶ Turn Undead Button
        - 7 ⟶ Talk Button
        - 8 ⟶ Use Item Button
        - 9 ⟶ First Quick Item Button
        - 10 ⟶ Bard Song Button (EE only)
        - 11 ⟶ Second Quick Item Button
        - 12 ⟶ Third Quick Item Button
        - 13 ⟶ Innate Ability Button
        - 14 ⟶ Find Traps Button
        - 15 ⟶ Inventory Button (EE only)
        Removing [opcode #144](https://gibberlings3.github.io/iesdp/opcodes/op144.html) is all it does, it cannot enable buttons disabled by other mechanics.
    - name: OPCODE_can_use_any_item
      detail: int OPCODE_can_use_any_item = 302
      doc: |-
        [Item: Can Use Any Item](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op302)
        The targeted creature(s) can use any item.
        The effect modifies STAT #191 (CANUSEANYITEM) to 'param2'.
        The 'Stat Value' parameter can take any value. If you set it to 0, you will disable the effect (for its duration).
    - name: OPCODE_cant_use_item
      detail: int OPCODE_cant_use_item = 180
      doc: |-
        [Item: Can't Use Item](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op180)
        The targeted creatures(s) cannot use the item specified by the `resource` key. The strref specified by the `String Reference` field is displayed when an attempt to use the item is made.
    - name: OPCODE_cant_use_itemtype
      detail: int OPCODE_cant_use_itemtype = 181
      doc: |-
        [Item: Can't Use Itemtype](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op181)
        The targeted creature(s) cannot use the item type specified by the 'Type' field. The strref specified by the 'String Reference' field is displayed when at attempt to use such an item is made.
        This effect only works with 'Type' set to 0.
    - name: OPCODE_cast_spell_at_creature
      detail: int OPCODE_cast_spell_at_creature = 146
      doc: |-
        [Spell: Cast Spell (at Creature)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op146)
        Casts the spell specified by the `resource` key at the level specified by the `Casting Level` field, in the style specified by the `Type` field. A `Casting Level` of `0` casts at the level of the casting creature.
        Known values for `Type` are:
        - 0 ⟶ Normal Casting at specified level (`0` for caster level), non-interruptible
        - 1 ⟶ Cast Instantly at caster level
        - 2 ⟶ Cast Instantly at specified level (EE-only)
        - When this opcode gets reflected using `Type=1`, the spell specified by the `resource` key is cast at the target's Casting Level, not the caster's.
        - When this opcode gets reflected ([opcode #197](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op197), [opcode #198](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op198), [opcode #199](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op199), [opcode #202](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op202), [opcode #203](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op203) and [opcode #207](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op207)) using `Type=2`, the spell specified by the `resource` key is cast at the specified `Casting Level`, and it will also affect the original target (as if it wasn't reflected).
        - When `Type=2`, effects in the `resource` will also bypass Magic Resistance, of every target, as if the caster targeted themselves, regardless of who they target with the spell or this effect.
          - Setting the [`Ignore Center`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#Behavior_BIT4) bit in the subspell's projectile will force its effects to check Magic Resistance on every target, even if the caster did target themselves. Though as its primary function is to cause the projectile to ignore the caster (not "center"), it still won't affect them if it's [`area-effect`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3).
        If the target is a container, the `Type` parameter is ignored and treated as `0`.
        See [opcode #326](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op326) for some peculiarities of projectile behaviour for `Type=2`.
    - name: OPCODE_cast_spell_at_point
      detail: int OPCODE_cast_spell_at_point = 148
      doc: |-
        [Spell: Cast Spell (at Point)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148)
        Casts the spell specified by the `resource` key, at the level specified by the `Casting Level` field, in the style specified by the `Type` field. A `Casting Level` of `0` casts at the level of the casting creature.
        Known values for `Type` are:
        - 0 ⟶ Normal Casting
        - 1 ⟶ Cast Instantly (ignore `Casting Level`)
        This opcode does not work if the target is a container in non-ee versions.
        This opcode should generally target `Self`. In particular:
        - The projectile of the subspell will originate from the target(s) of [opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148).
        - If the SPL/ITM with [opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148) targets a location, and doesn't have an [`area-effect`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectile, there will be no target to cast on.
        - If the SPL/ITM with [opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148) has an [`area-effect`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectile, the spell in [opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148) would be cast once for every valid target.
        - If this opcode uses the `Cast Instantly` option, then the target, not the caster, would cast the spell in [opcode #148](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op148).
    - name: OPCODE_cast_spell_on_condition
      detail: int OPCODE_cast_spell_on_condition = 232
      doc: |-
        [Spell Effect: Cast Spell on Condition](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op232)
        Casts the spell specified by the resource field on the target specified by the 'Target' field, when the condition from the 'Condition' field is true. The conditions are akin to various triggers.
        Known values for 'Target' are:
        0   Effect Target
        1   LastHitter
        2   NearestEnemyOf
        3   Nearest
        Known values for 'Condition' are:
        0   HitBy()
        1   See(NearestEnemyOf())
        2   HPPercentLT(Myself 50)
        3   HPPercentLT(Myself 25)
        4   HPPercentLT(Myself 10)
        5   StateCheck(Myself,STATE_HELPLESS) i.e. unconscious
        6   StateCheck(Myself,STATE_POISONED) i.e. poisoned
        7   AttackedBy('Target')
        8   PersonalSpaceDistance('Target',4)
        9   PersonalSpaceDistance('Target',10)
        10  Unknown - every round
        11  TookDamage()
        Parameter 3 (EFF) activates the portrait icon and immediately triggers the HitBy() trigger
    - name: OPCODE_casting_glow
      detail: int OPCODE_casting_glow = 140
      doc: |-
        [Graphics: Casting Glow](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op140)
        Creates a 2D animation for casting glow. These effects are usually used for casting glows based on the spell school.
        Known values for 'Type' are:
        0 .. 8 = Crash
        9   Casting Glow Aqua (Necromancy)
        10  Casting Glow Blue (Alteration)
        11  Casting Glow Gold (Enchantment)
        12  Casting Glow Green (Abjuration)
        13  Casting Glow Magenta (Illusion)
        14  Casting Glow Purple (Conjuration)
        15  Casting Glow Red (Invocation)
        16  Casting Glow White (Divination)
        17+ Crashes
    - name: OPCODE_casting_level_mod
      detail: int OPCODE_casting_level_mod = 191
      doc: |-
        [Spell: Casting Level Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op191)
        Applies the value specified by the 'Modifier' field as a bonus to casting spell levels, of a type specified by the 'Type' field.
        Known values for 'Type' are:
        0  Mage
        1  Cleric
        This effect modifies stats #79 (CASTINGLEVELBONUSMAGE) or #80 (CASTINGLEVELBONUSCLERIC) depending on param #2.
        This effect changes the casting level stat, but has no actual affect in-game.
    - name: OPCODE_casting_time_mod
      detail: int OPCODE_casting_time_mod = 189
      doc: |-
        [Stat: Casting Time Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op189)
        Alters the [`Casting Time`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x12) of spells by the value specified by the `Speed Modifier` field. This effect is cummulative.
        This effect sets [MENTALSPEED](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#77) to `Speed Modifier`. Known value for `Type` are:
        - 0 ⟶ Increment by `Speed Modifier`
          - Positive values decrease the casting time, negative values increase the casting time.
        - 1 ⟶ Set casting time of every spell to `Speed Modifier`
          - Negative values set casting time to `0`
        - 2 ⟶ Set casting time of spells with casting time higher than `Speed Modifier` to `Speed Modifier`
          - Other spells are unaffected.
        `Type=2` was tested only for BGEE and might not work on non-EE.
    - name: OPCODE_change_bard_song_effect
      detail: int OPCODE_change_bard_song_effect = 251
      doc: |-
        [Spell Effect: Change Bard Song Effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op251)
        Sets the Bard Song of the targeted creature to the spell specified by the `resource` key.
        On non-EE games, the default Bard Song applies the following effects:
        - All effects are added to the entire party with `Timing Mode 4096` (end at ticks) and `duration = nGameTime + 100`
        - [Display Special Effect Icon](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142)
          - `param2 (Icon) = 40 Bard Song`
        - [Morale Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op23) – Sets the Morale stat of the targetted creature(s) to `10`.
          - `param1 (Ignored) = 10`
          - `param2 (Ignored) = 0`
        - [Cure Horror](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op161)
          - `param1 (Irrelevant) = 1`
          - `param2 (Irrelevant) = 0`
        - [Protection from Opcode](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101)
          - `param1 (Irrelevant) = 1`
          - `param2 (Opcode) = 24 (State: Horror)`
        On EE games, the default bardsong has been externalized to `"BARDSONG.SPL"`.
    - name: OPCODE_chaos_shield
      detail: int OPCODE_chaos_shield = 299
      doc: |-
        [Spell Effect: Chaos Shield](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op299)
        This effect defends against wild surges and displays an associated icon as specified by the 'Icon' parameter.
        Known values for 'Icon' are:
        - 0 ⟶ Normal Chaos Shield
        - 1 ⟶ Improved Chaos Shield
        The effect modifies stat #189 (CHAOS_SHIELD).
    - name: OPCODE_character_animation_change
      detail: int OPCODE_character_animation_change = 138
      doc: |-
        [Graphics: Character Animation Change](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op138)
        The targeted creature(s) shows the animation sequence specified by the `Animation Sequence` field.
        Known values for `Animation Sequence` are (from [SEQ.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/seq.htm)):
        - 0 ⟶ Attack
        - 1 ⟶ Awake
        - 2 ⟶ Cast
        - 3 ⟶ Conjure
        - 4 ⟶ Damage
        - 5 ⟶ Die
        - 6 ⟶ Turn head
        - 7 ⟶ Ready
        - 8 ⟶ Shoot
        - 9 ⟶ Twitch
        - 10 ⟶ Walk
        - 11 ⟶ Attack (Slash)
        - 12 ⟶ Attack (Backslash)
        - 13 ⟶ Attack (Jab)
        - 14 ⟶ Emerge
        - 15 ⟶ Hide
        - 16 ⟶ Sleep
    - name: OPCODE_charisma_mod
      detail: int OPCODE_charisma_mod = 6
      doc: |-
        [Stat: Charisma Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op6)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Charisma = Charisma + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Charisma = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Charisma = (Charisma * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [CHR](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#42).
        All games but EEs:
        - With a Timing Modes of Permanent or Delayed, if `Type = 0` and `Statistic Modifier` is positive, the statistic will alter and remain shown in white text, and a message 'Charisma raised permanently' will be shown.
        - With a Timing Modes of Permanent or Delayed, if `Type` is `1` or `2`, or `Statistic Modifier` is negative, the statistic will alter and remain shown in white text, though no message is shown.
        - With all other Timing Modes, the statistic will alter and be shown in red text.
        On EEs:
        - There's no feedback message about stat being raised permanently in the EE's – it must be done separately with [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139).
        - The opcode itself provides no coloring anymore (it's been externalized through "UI.menu")
          - An effective value > base value ⟶ green.
          - An effective value < base value ⟶ red.
          - An effective value = base value ⟶ white/default.
        With `Timing Mode`s `1/4/7`, the creature's base [`Charisma`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x23E) is altered, leaving behind no removable effect.
        Final values are capped to the bound range `(0,25)` in game (`40` in IWD2).
    - name: OPCODE_charm_charm_specific_creature
      detail: int OPCODE_charm_charm_specific_creature = 5
      doc: |-
        [Charm: Charm Specific Creature](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op5)
        Charms the targeted creature(s) according to value in the `Charm Type` field, if the target is matched by the value in the `General Type` field. Values for `General Type` are from [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm).
        Known values for `Charm Type` are:
        - 0 ⟶ Neutral Charm
          - Does not alter targets allegiance stat.
          - Maintains [REALLYCHARMED](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) on the target if the caster is [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Maintains [CHARMED_PC](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#254) on the target if the caster is [NOTGOOD](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#31).
          - Maintains Portrait Icon [`Charm`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#0) on the target.
          - Effect ends if the creature is attacked by [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Target displays "charmed" string.
        - 1 ⟶ Hostile Charm
          - Sets targets allegiance to [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30) if the caster is [EVILCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#200).
          - Sets targets allegiance to [EVILCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#200) if the caster is [NOTEVIL](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#199).
          - Maintains [REALLYCHARMED](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) on the target if the caster is [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Maintains [CHARMED_PC](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#254) on the target if the caster is [NOTGOOD](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#31).
          - Maintains Portrait Icon [`Charm`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#0) on the target.
          - Effect ends if the creature is attacked by [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Target displays "Charmed" string.
        - 2 ⟶ Neutral Dire Charm
          - Does not alter targets allegiance stat.
          - Maintains [CONTROLLED](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#5) on the target if the caster is [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Maintains [ENEMY](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#255) on the target if the caster is [NOTGOOD](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#31).
          - Maintains Portrait Icon [`Dire Charm`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#1) on the target.
          - Effect ends if the creature is attacked by [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Target displays "dire charmed" string.
        - 3 ⟶ Hostile Dire Charm
          - Sets targets allegiance to [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30) if the caster is [EVILCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#200).
          - Sets targets allegiance to [EVILCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#200) if the caster is [NOTEVIL](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#199).
          - Maintains [CONTROLLED](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#5) on the target if the caster is [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Maintains [ENEMY](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#255) on the target if the caster is [NOTGOOD](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#31).
          - Maintains Portrait Icon [`Dire Charm`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#1) on the target.
          - Effect ends if the creature is attacked by [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Target displays "dire charmed" string.
        - 4 ⟶ Controlled by Cleric
          - Sets targets allegiance to [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30) if the caster is [EVILCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#200).
          - Sets targets allegiance to [EVILCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#200) if the caster is [NOTEVIL](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#199).
          - Maintains [CONTROLLED](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#5) on the target if the caster is [GOODCUTOFF](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#30).
          - Maintains [ENEMY](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#255) on the target if the caster is [NOTGOOD](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#31).
          - Target displays "turned" string.
        - 5 ⟶ Thrull Charm
          - Does not alter targets allegiance stat.
          - Maintains [ENEMY](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm#255) on the target (regardless of casters Allegience).
          - Sets [THRULLCHARM](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#149) to `1`.
          - Maintains Portrait Icon [`Charm`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#0) on the target.
          - Target displays "Charmed" string.
        - 1000 ⟶ Neutral Charm (no Feedback)
          - Same as `0`, but target does not display any string.
        - 1001 ⟶ Hostile Charm (no Feedback)
          - Same as `1`, but target does not display any string.
        - 1002 ⟶ Neutral Domination. Same as `2`, except:
          - Maintains Portrait Icon [`Domination`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#43) on the target.
          - Target does not display any string.
        - 1003 ⟶ Hostile Domination. Same as `3`, except:
          - Maintains Portrait Icon [`Domination`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#43) on the target.
          - Target does not display any string.
        - 1004 ⟶ Controlled by Cleric (no Feedback)
          - Same as `4`, but target does not display any string.
        - 1005 ⟶ Thrull Charm (no Feedback)
          - Same as `5`, but target does not display any string.
        If this effect turns a party member hostile, it will disable all of their scripts.
        In EEs, the `Dice Thrown` parameter can be used to override the maintained `EA` Value. It is used in all but the first application of the effect.
    - name: OPCODE_charm_control_creature
      detail: int OPCODE_charm_control_creature = 241
      doc: |-
        [Charm: Control Creature](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op241)
        As opcode [#5](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op5).
    - name: OPCODE_check_for_berserk
      detail: int OPCODE_check_for_berserk = 245
      doc: |-
        [Check For Berserk](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op245)
        This effect enables a 1% chance of the targetted creature(s) going berserk on each attack it makes. This affect sets the berserk stat changes and then attaches [opcode #246](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op246).
        It sets [CHECKFORBERSERK](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#142).
    - name: OPCODE_clear_fog_of_war_wizard_eye
      detail: int OPCODE_clear_fog_of_war_wizard_eye = 268
      doc: |-
        [Spell Effect: Clear Fog of War (Wizard Eye)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op268)
        Applies the clear fog of war effect on the targeted creature(s).
        The targeted creature(s) will be able to explore like a PC does.
        This effect sets [EXPLORE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#148) to `1`.
        Only 8 creatures in a given area can fully clear fog of war, with priority going to party members.
    - name: OPCODE_cold_resist_mod
      detail: int OPCODE_cold_resist_mod = 28
      doc: |-
        [Stat: Cold Resistance Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op28)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Resistance = Resistance + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Resistance = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Resistance = (Resistance * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [RESISTCOLD](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#15).
    - name: OPCODE_colour_change_by_rgb
      detail: int OPCODE_colour_change_by_rgb = 8
      doc: |-
        [Colour: Change by RGB](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op8)
        Alters the colour of the area specified by the `Location` field, to the colour specified by the `RGB Colour` field.
        The `RGB Colour` field is handled as follows:
        - Second byte = Red (`0–255`)
        - Third byte = Green (`0–255`)
        - Fourth byte = Blue (`0–255`)
        Known values for `Location` are:
        - 0 – 6: Avatar/Armor
          - 00 ⟶ Belt Buckle (on armour) or amulets (on robes) – entire body for some animations
          - 01 ⟶ Minor colour
          - 02 ⟶ Major colour
          - 03 ⟶ Skin colour
          - 04 ⟶ Strap colour (on armour) or minor trimming (on robes – the centre strip down a robe and the hem on some robes)
          - 05 ⟶ Armor colour (and major trimming on robe – cross trim and cape trim on Robe of Archmagi)
          - 06 ⟶ Hair colour
        - 16 – 22: Weapon
          - 16 ⟶ Quillons or Crossguard
          - 20 ⟶ Grip (usually not visible as it's in the characters hand)
          - 21 ⟶ Blade or major portion of weapon
        - 32 – 40: Shield
          - 32 ⟶ Shield hub
          - 33 ⟶ Shield interior
          - 34 ⟶ Shield panelling
          - 37 ⟶ Shield rim
        - 48 – 54: Helmet
          - 48 ⟶ Helm ornamentation – i.e. wings
          - 49 ⟶ Helm ornamentation – i.e. feathers/horsehair
          - 50 ⟶ Helm ornamentation – i.e. feathers/horsehair
          - 52 ⟶ Helm face
          - 53 ⟶ Helm – the main covering
        - 255 ⟶ Whole Body (at least in IWD2 and EEs)
        Other values crash immediately or when opening or manipulating Inventory.
        See [opcode #7](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op7) for further details about this topic.
    - name: OPCODE_colour_glow_by_rgb_brief
      detail: int OPCODE_colour_glow_by_rgb_brief = 50
      doc: |-
        [Colour: Glow by RGB (Brief)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op50)
        The targeted creature(s) entire animation glows the colour specified by the `RGB Colour` field, at the speed specified by the (3rd byte of the) `Speed` field.
        The `RGB Colour` field is handled as follows:
        - Second byte = Red (`0 — 255`)
        - Third byte = Green (`0 — 255`)
        - Fourth byte = Blue (`0 — 255`)
        The `Location and Speed` field is handled as follows:
        - First byte = Location (not implemented in 2.5)
        - Third byte = Speed (`0 — 255`)
        A speed of 0 does not pulsate. A speed of `1` is fastest, and a speed of `255` is slowest. The duration of the effect is controlled by the `Speed` field.
        Known values for `Location` are:
        - 0 — 6: Avatar/Armor
          - 00 ⟶ Belt Buckle (on armour) or amulets (on robes) — entire body for some animations
          - 01 ⟶ Minor colour
          - 02 ⟶ Major colour
          - 03 ⟶ Skin colour
          - 04 ⟶ Strap colour (on armour) or minor trimming (on robes — the centre strip down a robe and the hem on some robes)
          - 05 ⟶ Armor colour (and major trimming on robe — cross trim and cape trim on Robe of Archmagi)
          - 06 ⟶ Hair colour
        - 16 — 22: Weapon
          - 16 ⟶ Quillons or Crossguard
          - 20 ⟶ Grip (usually not visible as it's in the characters hand)
          - 21 ⟶ Blade or major portion of weapon
        - 32 — 40: Shield
          - 32 ⟶ Shield hub
          - 33 ⟶ Shield interior
          - 34 ⟶ Shield panelling
          - 37 ⟶ Shield rim
        - 48 — 54: Helmet
          - 48 ⟶ Helm ornamentation — i.e. wings
          - 49 ⟶ Helm ornamentation — i.e. feathers/horsehair
          - 50 ⟶ Helm ornamentation — i.e. feathers/horsehair
          - 52 ⟶ Helm face
          - 53 ⟶ Helm — the main covering
        - 255 ⟶ Whole Body (at least in IWD2 and EEs)
        Other values crash immediately or when opening or manipulating Inventory.
        See [opcode #7](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op7) for further details about this topic.
    - name: OPCODE_colour_glow_pulse
