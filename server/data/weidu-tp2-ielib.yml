        - 33 ⟶ MISC18
        - 34 ⟶ MISC19 – Magical Weapon slot
        - 35 ⟶ WEAPON0
        - 36 ⟶ WEAPON1
        - 37 ⟶ WEAPON2
        - 38 ⟶ WEAPON3
        The [`Magical Weapon Slot`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34) does not allow [`Item`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x2_3) Abilities.
        Moreover, unlike [opcode #111](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op111), this opcode will not "equip" the item that's created in this particular slot.
        When using a non-permanent `timing mode`, it applies a delayed [opcode #123](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op123) effect based on the duration, but with an empty `resource` field, resulting in nothing being removed.
    - name: OPCODE_create_magical_weapon
      detail: int OPCODE_create_magical_weapon = 111
      doc: |-
        [Item: Create Magical Weapon](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op111)
        Creates the item specified by the `resource` key. The number of items created is controlled by the `Amount` field. The item is created in the [`Magical Weapon Slot`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34).
        The [`Magical Weapon Slot`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34) does not allow [`Item`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x2_3) Abilities.
        The `resource` field should not be empty, or the game will crash (not consistently, but it happens).
        The dispel bit of [opcode #111](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op111) has no bearing on the [item](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm) it creates. Its only function comes up when the [opcode #111](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op111) effect is delayed — the effect can be dispelled before it triggers (see also [`undispellable`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#Header_Flags_BIT24) and [opcode #58](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op58)).
    - name: OPCODE_creature_summoning
      detail: int OPCODE_creature_summoning = 67
      doc: |-
        [Summon: Creature Summoning](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op67)
        Summons a creature, with position and [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) based on the `Mode` field. The `Resource` key should be set to the filename of the creature to summon.
        Known values for `Mode` are:
        | Mode    | Position        | [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) |
        | ------- | --------------- | ---------------------------------------------------------------- |
        | 0, 1    | effect          | align with target creature                                       |
        | 3       | target creature | align with target creature                                       |
        | 4       | target creature | CRE file                                                         |
        | 5       | effect          | align against target creature                                    |
        | 2, else | effect          | CRE file                                                         |
        `Mode` details:
        - Position:
          - 3, 4 ⟶ summon at target creature's position
          - else ⟶ summon at effect position
        - [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm):
          - 0, 1, 3 ⟶ align with target creature:
            - target creature [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) ≤ GOODCUTOFF (30) ⟶ summon as ALLY (4)
            - target creature [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) ≥ EVILCUTOFF (200) ⟶ summon as ENEMY (255)
            - else ⟶ summon as CRE file
          - 5 ⟶ align against target:
            - target creature [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) ≤ GOODCUTOFF (30) ⟶ summon as ENEMY (255)
            - target creature [EA](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm) ≥ EVILCUTOFF (200) ⟶ summon as ALLY (4)
            - else ⟶ summon as CRE file
        `Mode = 5` fails to make creatures summoned as ALLY (4) controllable. This is fixed upon reload.
        - (EE only) [`Resource 2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70) (external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm)s): Animation VVC/BAM file to be played at the summoned creature's location.
         Default is a hardcoded VVC using `"SPBOOM.BAM"` and palette `#65`. This is generally used as the "portal" animation.
        - (EE only) [`Resource 3`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x78) (external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm)s): Animation VVC/BAM file to be played at the location of the ability target.
        - Applies an [opcode #271](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op271) to the summoned creature based on the duration of the [`Resource 2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70) (not exact) and Mode set to 1 (tested only in EE). Creature will not appear/spawn until this animation finishes.
        - Applies a delayed [opcode #215](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op215) with `resource = "SPGFLSH1"` to the summoned creature, `delayed duration = 5 ticks less` than the [opcode #271](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op271).
        - Applies a delayed [opcode #68](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op68) to the summoned creature based on effect duration (unless permanent).
        - When summoned, any temporary changes (such as from equipped items) to the creature's [gender](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm) are made permanent.
    - name: OPCODE_critical_hit_mod
      detail: int OPCODE_critical_hit_mod = 301
      doc: |-
        [Stat: Critical Hit Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op301)
        This effect improves the Critical Hit chances.
        Critical hits will occur on a roll (on a 1d20) greater or equal to:
        20 - 'Statistic Modifier'
    - name: OPCODE_crushing_resist_mod
      detail: int OPCODE_crushing_resist_mod = 87
      doc: |-
        [Stat: Crushing Resistance Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op87)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Resistance = Resistance + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Resistance = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Resistance = (Resistance * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [RESISTCRUSHING](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#22).
    - name: OPCODE_cumulative_luck_bonus
      detail: int OPCODE_cumulative_luck_bonus = 22
      doc: |-
        [Stat: Cumulative Luck Bonus](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op22)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field. Luck affects the minimum damage caused by a weapon (up to the normal maximum damage of the weapon) and the attack roll modifier (up to a maximum of 20, excluding natural attack roll modifiers, e.g. high STR, invisibility etc) by `Statistic Modifier` amount. `Statistic Modifier` also affects the damge rolls of opponents (in feature blocks, not extension headers). The effect does not set [STATE_LUCK](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT26).
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Luck = Luck + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Luck = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Luck = (Luck * 'Statistic Modifier' value) / 100`
        Effects of Luck:
        - Modifies a creature's weapon damage die rolls (up/down to its maximum/minimum).
        - Modifies a creatures's attack roll `[1d20]` (up/down to its maximum/minimum).
        - Modifies non-weapon damage die rolls dealt to the creature (up/down to its maximum/minimum).
        - Modifies a creatures's initiative roll `[1d6 - 4]` for weapon attacks (up/down to its maximum/minimum). See [opcode #190](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op190) for further details about weapon/attack speed.
        - Modifies a creatures's initiative roll `[1d8 - 1]` for movement (up/down to its maximum/minimum).
        - Modifies a creatures's skill roll `[1d100]` for Hiding in Shadows (up/down to its maximum/minimum).
        - Modifies a creatures's skill roll `[1d100]` for Set Traps (up/down to its maximum/minimum).
        - Modifies a creatures's skill roll `[1d10]` for Open Locks (up/down to its maximum/minimum).
        - Modifies a creatures's skill roll `[1d10]` for Bash Doors (up/down to its maximum/minimum).
        - Modifies a creatures's skill roll `[1d10]` for Disarm Trap (up/down to its maximum/minimum).
        - Modifies the chance for a Mirror Image to be struck, `chance = ('number of images' + 'Statistic Modifier') / ('number of images' + 1)`.
        Here's more info about initiative roll for movement:
        - Apparently, there is intentionally a random wait time between when a creature attempts to move to another creature, and when they will actually start pathing. Luck helps with this...
         `Wait Time = 0, when roll = 0`
         `Wait Time = (8 - roll), when roll != 0`
        - The natural roll range is `[0,7]`, but like many other rolls Luck alters this slightly. For every point in Luck the highest bound of the roll is converted into the lower bound.
        - So with `1` Luck the roll becomes `[0,6]`, with `0` having a probability of 25% instead of 12.5%. Negative luck works the same, but in reverse.
        - `1` is the worst roll you can get, yet it is neither of the extremes. So, `-1` Luck is bad because it prevents you from bypassing the wait time, (rolling a `0`), but **if Luck must be negative, the lower the better**.
          - `Luck = "-1"`: Worst roll possible is a `1`, you will be waiting for 7 AI updates (or, if you prefer, 7⁄15ths of a second).
          - `Luck = "-7"`: Worst roll possible is a `7`, you will be waiting for 1 AI update (or, if you prefer, 1⁄15th of a second)!!
        - Positive Luck will always increase the likelihood of instantaneous pathing.
        - Note that this wait time is only applied to creature-to-creature pathing, and never to on-the-ground destinations.
        - Also, every creature rolls for their own delay when they go to target a creature.
    - name: OPCODE_cure_berserking
      detail: int OPCODE_cure_berserking = 4
      doc: |-
        [Cure: Berserking](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op4)
        Removes [opcode #3](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op3) effects and [STATE_BERSERK](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT1) from the targeted creature(s). Does not remove [opcode #245](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op245), [opcode #246](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op246) and [opcode #247](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op247) effects.
        This effect ignores durations attributed to it.
        Both parameters should be `0` (zero).
        At least in BG2 and EEs, this effect only affects player characters.
        At least in BG2 and EEs, this effect can remove [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) effects targeting an EFF with [opcode #3](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op3).
    - name: OPCODE_cure_blindness
      detail: int OPCODE_cure_blindness = 75
      doc: |-
        [Cure: Blindness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op75)
        Removes the [blindness effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op74) and the [STATE_BLIND](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT18) flag from the targeted creature(s).
        This effect ignores durations attributed to it.
        Both parameters should be `0` (zero).
    - name: OPCODE_cure_confusion
      detail: int OPCODE_cure_confusion = 242
      doc: |-
        [Cure: Confusion](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op242)
        Removes [STATE_CONFUSED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT31) and [opcode #128](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op128) effects from the targeted creature(s).
    - name: OPCODE_cure_deafness
      detail: int OPCODE_cure_deafness = 81
      doc: |-
        [Cure: Deafness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op81)
        Removes the [deafness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op80) effect from the targeted creature(s).
        This effect ignores durations attributed to it.
        Both parameters should be `0` (zero).
        PST: it is unclear if this effect exists or does anything!
    - name: OPCODE_cure_death_raise_dead
      detail: int OPCODE_cure_death_raise_dead = 32
      doc: |-
        [Cure: Death (Raise Dead)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op32)
        Raises the targeted creature(s) from the dead.
        Known values for `Restore creature animation?` are:
        - 0 ⟶ No
        - 1 ⟶ Yes
        This effect ignores durations attributed to it.
        The new animation is selected just as it would be at Character Generation.
        `Base Animation = 0x6000`
        - + Class:
          - `0x0000` (Cleric/Druid/Shaman/Default)
          - `0x0100` (Fighter/Paladin/Ranger)
          - `0x0200` (Mage/Sorcerer)
          - `0x0300` (Thief/Bard)
          - `0x0500` (Monk)
          - Mutliclasses prioritize (Warrior > Priest > Rogue > Wizard)
        - + Gender:
          - `0x0000` (Male/Default)
          - `0x0010` (Female)
        - + Race:
          - `0x0000` (Human/Default)
          - `0x0001` (Elf/Half-Elf/Tiefling)
          - `0x0002` (Dwarf)
          - `0x0003` (Halfling)
          - `0x0004` (Gnome)
          - `0x0005` (Halforc)
        - This opcode will only restore life to creatures with [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11). Frozen and Petrified creatures do not qualify until after they shatter (at which point you can no longer target them outside of scripts, so it doesn't really matter).
        - The animation reset is not dependent on the target's death state.
        The presence of this opcode in any of a spell's ability headers will force any Wild Surge of that spell to use the "Cast Normally" result.
    - name: OPCODE_cure_disease
      detail: int OPCODE_cure_disease = 79
      doc: |-
        [Cure: Disease](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op79)
        Removes the [disease](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op78) and [feeblemind](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op76) effects from the targeted creature(s).
        This effect ignores durations attributed to it. It also unsets the feeblemind state bit.
        Both parameters should be `0` (zero).
    - name: OPCODE_cure_dispellable_effects_dispel_magic
      detail: int OPCODE_cure_dispellable_effects_dispel_magic = 58
      doc: |-
        [Cure: Dispellable Effects (Dispel Magic)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op58)
        Dispels magic from the targeted creature(s) (excepting magical weapons eg. Spirtual Hammer). Depending on the value of the 'Type' field, the 'Level' field can be used to set the level of the effect.
        Known values for 'Type' are:
        - 0 ⟶ Always dispel
        - 1 ⟶ Use Caster Level
        - 2 ⟶ Use 'Level' field
        With 'Type' of 1 or 2, the base chance of successfully dispelling is 50%. This chance is modified by the relative levels of the dispeller to the caster. Each level below gives a -10% chance, each level above gives a +5% chance. There is always a 1% chance of success or failure.
    - name: OPCODE_cure_drunkeness
      detail: int OPCODE_cure_drunkeness = 164
      doc: |-
        [Cure: Drunkeness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op164)
        Clears the drunkeness stat (as modified by [opcode #94](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op94)).
    - name: OPCODE_cure_feeblemindedness
      detail: int OPCODE_cure_feeblemindedness = 77
      doc: |-
        [Cure: Feeblemindedness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op77)
        Removes the [feeblemind effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op76) and the [STATE_FEEBLEMINDED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT20) flag from the targeted creature(s).
        This effect ignores durations attributed to it.
        Both parameters should be `0` (zero).
    - name: OPCODE_cure_hold
      detail: int OPCODE_cure_hold = 162
      doc: |-
        [Cure: Hold](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op162)
        Removes the paralysis effect ([opcode #109](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op109) and [opcode #175](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op175)) from the targeted creature(s).
        This effect should be used with an instant timing mode.
    - name: OPCODE_cure_horror
      detail: int OPCODE_cure_horror = 161
      doc: |-
        [Cure: Horror](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op161)
        Removes the [horror](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op24) effect from the targeted creature(s).
        This effect ignores durations attributed to it.
    - name: OPCODE_cure_invisibility
      detail: int OPCODE_cure_invisibility = 47
      doc: |-
        [Cure: Invisibility](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op47)
        Removes the [invisibility effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op20) from the targeted creature(s) if they don't have STATE_NONDETECTION set. Also removes [STATE_INVISIBLE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT4) and [STATE_IMPROVEDINVISIBILITY](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT22).
        This effect ignores durations attributed to it.
        Both parameters should be `0` (zero).
    - name: OPCODE_cure_invisibility_2
      detail: int OPCODE_cure_invisibility_2 = 116
      doc: |-
        [State: Cure Invisibility](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op116)
        Removes invisibility from the targeted creature(s). Also removes [STATE_INVISIBLE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT4) and [STATE_IMPROVEDINVISIBILITY](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT22).
        This effect ignores durations attributed to it.
        Both parameters should be `0` (zero).
        - The only difference between this opcode and [opcode #47](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op47) is their index – you can block one with [opcode #101](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101) without blocking the other. That's it.
        - Both remove the same effects/`STATE`s, both are blocked by [opcode #69](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op69).
        - They might have been intended for identical function, different uses, similar to opcodes [#5](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op5)/[#241](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op241) (Charm), but it never happened.
        - [Opcode #116](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op116) is used extensively because the original BG1 used it, and didn't use [opcode #47](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op47) at all.
    - name: OPCODE_cure_level_drain_restoration
      detail: int OPCODE_cure_level_drain_restoration = 224
      doc: |-
        [Cure: Level Drain (Restoration)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op224)
        Applies the restoration effect to the targeted creature(s), resetting the level of the target.
        Removes [opcode #216](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op216) (Level drain) effects from the creature, will not remove [opcode #96](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op96) (Level change) effects.
    - name: OPCODE_cure_non_detection
      detail: int OPCODE_cure_non_detection = 70
      doc: |-
        [Cure: Non-Detection](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op70)
        Removes [opcode #69](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op69) and the [STATE_NONDETECTION](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT21) flag from the targeted creature(s).
        This effect ignores durations attributed to it.
    - name: OPCODE_cure_poison
      detail: int OPCODE_cure_poison = 11
      doc: |-
        [Cure: Poison](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op11)
        Removes [opcode #25](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op25) poison effects and [STATE_POISONED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT14) from the targeted creature(s).
        This effect ignores durations attributed to it.
        At least in EEs, this effect can remove [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) effects targeting an EFF with [opcode #25](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op25).
    - name: OPCODE_cure_silence_vocalize
      detail: int OPCODE_cure_silence_vocalize = 48
      doc: |-
        [Cure: Silence (Vocalize)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op48)
        Removes the [silence effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op38) and [STATE_SILENCED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT12) from the targeted creature(s).
        This effect ignores durations attributed to it.
    - name: OPCODE_cure_sleep
      detail: int OPCODE_cure_sleep = 2
      doc: |-
        [Cure: Sleep](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op2)
        Removes [opcode #39](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op39) effects and the [STATE_SLEEPING](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT0) flag from the targeted creature(s).
        This effect ignores durations attributed to it.
        Does not remove the [STATE_HELPLESS](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5) flag.
        At least in EEs, it can remove [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) effects targeting an EFF with [opcode #39](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op39). Does not always work when delayed.
    - name: OPCODE_cure_stone_to_flesh
      detail: int OPCODE_cure_stone_to_flesh = 43
      doc: |-
        [Cure: Stone to Flesh](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op43)
        Removes [STATE_STONE_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT7) from the targeted creatures and restores them to 1 HP. Does not affect creatures without [STATE_STONE_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT7).
        Both parameters should be 0 (zero).
        - Will not remove a currently delayed (untriggered) [Petrification](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op134) effect.
        - Nor will it remove the False Petrification mode of [opcode #109](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op109).
    - name: OPCODE_cure_stun_unstun
      detail: int OPCODE_cure_stun_unstun = 46
      doc: |-
        [Cure: Stun (Unstun)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op46)
        Unstuns the targeted creature(s) ([opcode #45](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op45) and [opcode #109](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op109)). Also removes [STATE_STUNNED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT3) from the creature.
        This effect ignores durations attributed to it.
    - name: OPCODE_cure_unpause_target
      detail: int OPCODE_cure_unpause_target = 270
      doc: |-
        [Cure: Unpause Target](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op270)
        Removes the [pause effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op165) from the targeted creature(s).
    - name: OPCODE_damage_mod
      detail: int OPCODE_damage_mod = 250
      doc: |-
        [Spell Effect: Damage Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op250)
        Applies the `Damage Modifier` value to the damage caused by the targetted creature(s). The effect works as a minimum damage value, i.e. at least `Damage Modifier` damage will always be caused (on a successful hit).
        The effect modifies [DAMAGELUCK](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#145).
        This opcode works in the same manner as [luck](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op22) (and stacks with it), except that it only affects base weapon damage. It can be positive or negative.
    - name: OPCODE_damage_vs_creature_type_mod
      detail: int OPCODE_damage_vs_creature_type_mod = 179
      doc: |-
        [Spell Effect: Damage vs. Creature Type Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op179)
        Alters the targeted creature(s) damage against the creature type specified by the `IDS Entry` field in the specified `IDS File`. The actual modifier value is placed in the `Parameter3` field in an external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) – dice values are ignored.
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE only; broken at least in 2.5)
        - It will affect all attacks, not just the weapon it's on, which would be incorrect when dual-wielding.
        - For two-handed/ranged weapons, it can be ideal if a base weapon damage bonus is desired.
        - Damage is multiplied by critical hits (and maybe backstabs).
        - Multiple [opcode #179](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op179) effects only allow additional targeting, they do not stack their damage bonus.
        This opcode uses a reverse stacking order: the "oldest" effect with matching IDS values for the target is used, not the most recent, and equipped effects take priority over non-equipped effects.
    - name: OPCODE_deafness
      detail: int OPCODE_deafness = 80
      doc: |-
        [State: Deafness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op80)
        Applies the Deafness effect on the targeted creature(s) – creatures suffer a casting failure rate of 50% (20% in bg1, unknown in iwd1). The casting failure rate refers to [`Wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1) and [`Priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2) spells only. This is cumulative with Miscast Magic.
        PST: it is unclear if this effect exist or does anything!
        Maintains [DEAFENED](https://gibberlings3.github.io/iesdp/files/ids/bgee/splstate.htm#38) on the target (EE only).
    - name: OPCODE_death_dependent_constitution_loss_familiar_bond
      detail: int OPCODE_death_dependent_constitution_loss_familiar_bond = 195
      doc: |-
        [Spell Effect: Death Dependent Constitution Loss (Familiar Bond)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op195)
        When this creature dies, the following is applied to `Master ID`:
        - Floats Text String [STRREF_GUI_MIXED_FAMILIARDIED](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#990).
        - [Opcode #10](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op10): `Statistic Modifier = -1`, `Type = 0`, `Timing Mode 1`.
        - [Opcode #18](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op18): `Statistic Modifier = Max HP Modifier`, `Type = 0`, `Timing Mode 1`.
          - [Opcode #192](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op192) sets `Max HP Modifier` to `-½ the familiar's Max HP`
        - [Opcode #12](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op12): `Damage Amount = 'this creature's Max HP'`, `Type = MAGIC`, `Timing Mode 1`, `Save Type = Bypass Mirror Image`.
          - Normally, Maximum HP of `Master ID` is lowered by `Max HP Modifier`, and Current HP is lowered by twice `Max HP Modifier` (since `Max Hp Modifier = ½ familiar's Max HP`).
         It won't be if the familiar's Max HP is increased (or decreased) permanently after it is summoned (temporary changes to Max HP will be removed by death before it deals damage, and so they won't affect the amount).
         Permanent changes to the familiar's Constitution, enough to alter the bonus HP it grants, will have similar results.
        Known values for `Master ID` are:
        - -1 ⟶ Not Party Member
        - 0 ⟶ Player1
        - 1 ⟶ Player2
        - 2 ⟶ Player3
        - 3 ⟶ Player4
        - 4 ⟶ Player5
        - 5 ⟶ Player6
        Needs `Timing Mode 9`, otherwise it will be removed (by death) before it fully triggers.
        `Parameter2` is possibly intended to be `Damage Type`. It uses the same format as [opcode #12](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op12) ([opcode #192](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op192) sets it to `0x400000 – MAGIC`), but changing it has no effect.
    - name: OPCODE_death_disintegrate
      detail: int OPCODE_death_disintegrate = 238
      doc: |-
        [Death: Disintegrate](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op238)
        Disintegrates the targeted creature(s), if the targeted creature(s) match the `IDS Entry` and in the specified `IDS File`, and if the targeted creature(s) hit-dice is less than those specified by the Dice Values.
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE-only)
    - name: OPCODE_death_instant_death
      detail: int OPCODE_death_instant_death = 13
      doc: |-
        [Death: Instant Death](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13)
        Instantly kills the targeted creature(s), in the style specified by the `Death Type` value.
        Known values for `Text Notification` are:
        - 0 ⟶ Show death message
        - 1 ⟶ Don't show death message
        Known values for `Death Type` are:
        - 0 ⟶ Acid death
          - Sets [STATE_ACID_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT10), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Kicked from party, drops inventory
        - 1 ⟶ Burning death
          - Sets [STATE_FLAME_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT9), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Character Tint Solid, character color ~[0x00404040] (Darkens avatar)
          - Kicked from party, drops inventory
        - 2 ⟶ Crushed death
          - Sets [STATE_EXPLODING_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT8), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Kicked from party, drops inventory
        - 4 ⟶ Normal death
          - Sets [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Drops inventory
        - 8 ⟶ Chunked death
          - Sets [STATE_EXPLODING_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT8), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Sets ANIMATE[0x230][EXPLODING_TORSO]
          - Plays sound ("GORE.WAV")/("GORE2.WAV")
          - Kicked from party, drops inventory, sets all color indexes to 70
        - 16 ⟶ Stoned death
          - Sets [STATE_STONE_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT7)
          - Any hostile action against the creature(s) applies an Exploding Stoned Death to them
          - Kicked from party, retains inventory, overlay's color index 72
        - 32 ⟶ Freezing death
          - Applies Exploding Freezing Death to the target with a (random) 0-5 second delay
          - Sets [STATE_FROZEN_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT6)
          - Any hostile action against the creature applies an Exploding Freezing Death to the target
          - Kicked from party, retains inventory, overlay's color index 71
        - 64 ⟶ Exploding stoned death/Level Drain death
          - Sets [STATE_EXPLODING_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT8), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Sets `ANIMATE[0x100][CHUNKS]`
          - Kicked from party, retains inventory, sets all color indexes to 72
        - 128 ⟶ Exploding freezing death
          - Sets [STATE_EXPLODING_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT8), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Sets `ANIMATE[0x100][CHUNKS]`
          - Kicked from party, retains inventory, sets all color indexes to 71
        - 256 ⟶ Electrified death
          - Sets [STATE_FLAME_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT9), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Character Tint Solid, character color ~[0x00404040] (Darkens avatar)
          - Kicked from party, drops inventory
        - 512 ⟶ Disintegration death
          - Sets [STATE_EXPLODING_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT8), [STATE_DEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT11)
          - Sets `ANIMATE[0x100][CHUNKS]`
          - Kicked from party, retains inventory, sets all color indexes to 72
        - 1024 ⟶ Destruction (in IWD2)
          - Sets STATE_EXPLODING_DEATH (0x00000100), STATE_DEAD (0x00000800)
          - Sets `ANIMATE[0x230][EXPLODING_TORSO]`
          - Plays sound ("GORE.WAV")/("GORE2.WAV")
          - Kicked from party, retains inventory, sets all color indexes to 70
        - Other
          - Removes all death states, but does not restore HP
          - Drops inventory
        - Any ⟶ Removes death states that they do not set (e.g, a normal Death will remove [STATE_FROZEN_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT6)).
    - name: OPCODE_death_kill_60hp
      detail: int OPCODE_death_kill_60hp = 209
      doc: |-
        [Death: Kill 60HP](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op209)
        Instantly kills the targeted creature(s), if the targeted creature(s) has less than 60 HP.
        More specifically, it functions by applying [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13) (`Death Type = 4 // Normal Death`).
        [Immunity](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101) to [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13) is not sufficient to block this effect unless it's granted through [`7EYES.2DA`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/7eyes.htm).
    - name: OPCODE_death_kill_creature_type
      detail: int OPCODE_death_kill_creature_type = 55
      doc: |-
        [Death: Kill Creature Type](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op55)
        Kills the targeted creature(s) with HD less than those specified by the Dice values, if the target(s) match the IDS mask.
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE only)
        `IDS Entry` is a value from the specified IDS file, indicating the specific creature type to affect.
    - name: OPCODE_defrost
      detail: int OPCODE_defrost = 14
      doc: |-
        [Graphics: Defrost](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op14)
        Removes [STATE_FROZEN_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT6) from the targeted creatures and restores them to 1 HP. Does not affect creatures without [STATE_FROZEN_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT6).
    - name: OPCODE_detect_alignment
      detail: int OPCODE_detect_alignment = 115
      doc: |-
        [Detect: Alignment](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op115)
        Detects the alignment specified by the `Alignment Mask` field.
        Known values for `Alignment Mask` are:
        - 0 ⟶ Evil (glow Red)
        - 1 ⟶ Neutral (glow Blue)
        - 2 ⟶ Good (glow Green)
    - name: OPCODE_detect_illusion_mod
      detail: int OPCODE_detect_illusion_mod = 276
      doc: |-
        [Stat: Detect Illusion Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op276)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Skill = Skill + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Skill = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Skill = (Skill * 'Statistic Modifier' value) / 100`
        At least in EEs, when `Type = 0` and `Timing Mode = 9`, it modifies [DETECTILLUSIONSMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#181). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm) capped to the range [0,255], before being included in the creature's Detect Illusions score.
    - name: OPCODE_dexterity_mod
      detail: int OPCODE_dexterity_mod = 15
      doc: |-
        [Stat: Dexterity Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op15)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Dexterity = Dexterity + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Dexterity = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Dexterity = (Dexterity * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Cat's Grace (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [DEX](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#40).
        All games but EEs:
        - With a Timing Modes of Permanent or Delayed, if `Type` is `0` and `Statistic Modifier` is positive, the statistic will alter and remain shown in white text, and a message 'Dexterity raised permanently' will be shown.
        - With a Timing Modes of Permanent or Delayed, if `Type` is `1` or `2`, or `Statistic Modifier` is negative, the statistic will alter and remain shown in white text, though no message is shown.
        - With all other Timing Modes, the statistic will alter and be shown in red text.
        On EEs:
        - There's no feedback message about stat being raised permanently in the EE's – it must be done separately with [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139).
        - The opcode itself provides no coloring anymore (it's been externalized through "UI.menu")
          - An effective value > base value ⟶ green.
          - An effective value < base value ⟶ red.
          - An effective value = base value ⟶ white/default.
        When `Type=3`:
        - `Statistic Modifier` is unused: it uses the value listed in [CLSSPLAB.2da](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/clssplab.htm) for the creature's base class, or defaults to `1` if the file isn't present (it only exists by default in IWDEE).
        - A single instance of this opcode (using `Type=3`) cannot raise Dexterity above 20 (hardcoded), but multiple instances of it can.
          - This is because it only checks the limit against the creature's base score, not its effective score.
        - Like the other modes, applying the effect with Timing Mode 1 will affect the creature's base stat, leaving no removable effect.
        - Once applied to a creature, `Statistic Modifier` will store the exact DEX increase granted (only useful for lookup/editing through EEkeeper/NI).
        - When you apply this effect in an External [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm), (via [op177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) / [op283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283)):
          - `Parameter1` in the EFF will determine the exact Dexterity increase (so it must be set manually, and ignores any limit).
        With `Timing Mode`s `1/4/7`, the creature's base [`Dexterity`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x23C) is altered, leaving behind no removable effect.
        Final values are capped to the bound range `(0,25)` in game (`40` in IWD2).
    - name: OPCODE_disable_permanent_death
      detail: int OPCODE_disable_permanent_death = 295
      doc: |-
        [Graphics: Disable Permanent Death](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op295)
        This targeted creature(s) will never suffer a permanent death (and will therefore always remain resurrectable) – exceptions include petrification and freeze-death.
        The effect modifies [NO_PERMANENT_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#186) to `Stat Value`.
        `Timing Mode` should be set to `9 (Permanent after Death)`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_disable_spell_casting_abilities
      detail: int OPCODE_disable_spell_casting_abilities = 145
      doc: |-
        [Spell: Disable Spell Casting Abilities](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op145)
        Disables spell casting abilities of the targeted creature(s), in the style specified by the `Spell Type` field.
        Known values for `Spell Type` are:
        - 0 ⟶ Disables [`wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1) spells with [`location`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2) (also applied by [polymorph](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op135))
        - 1 ⟶ Disables [`priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2) spells with [`location`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2) (also applied by [polymorph](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op135))
        - 2 ⟶ Disables all innate spells (really any [`type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C) except [`wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1)/[`priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2)), regardless of [`location`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2)
        - 3 ⟶ Disables only "magical" spells (those lacking [`Ignore dead/wild magic`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Flags_BIT14)), regardless of [`type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C) or [`location`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x2) (EEs)
        Known values for `Show message?` are:
        - 0 ⟶ Yes
        - 1 ⟶ No
    - name: OPCODE_disable_visual_effect
      detail: int OPCODE_disable_visual_effect = 291
      doc: |-
        [Graphics: Disable Visual Effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291)
        Blocks the hardcoded animations applied by the following opcodes: [201](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op201), [204](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op204), [205](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op205), [223](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op223), [226](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op226), [259](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op259), [197](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op197), [198](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op198), [200](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op200), [202](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op202), [203](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op203), [207](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op207), [227](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op227), [228](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op228), [299](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op299). These are the SPTURNI2 and SPMAGGLO BAM animations.
        The effect modifies [PREVENT_SPELL_PROTECTION_EFFECTS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#174) to `Stat Value`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_disease
      detail: int OPCODE_disease = 78
      doc: |-
        [State: Disease](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op78)
        Set the Damage parameter as the amount of damage, and the Disease Type parameter as how the disease functions.
        Known values for 'Type' are:
        0   1 HP per second
        1   1 HP per second
        2   'Damage' per Second
        3   Cause 1HP every 'Damage' seconds
        4   Strength Penalty
        5   Dexterity Penalty
        6   Constitution Penalty
        7   Intelligence Penalty
        8   Wisdom Penalty
        9   Charisma Penalty
        10  Slow Effect
        'Damage' can be positive (penalty) or negative (bonus).
        Permanent timing modes require a duration for this effect to work.
