    - name: OPCODE_passwall_dont_jump
      detail: int OPCODE_passwall_dont_jump = 184
      doc: |-
        [Graphics: Passwall (Don't Jump)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op184)
        Allows creatures to be placed in impassable areas, based on the value of the `Jump` field.
