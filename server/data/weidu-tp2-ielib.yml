    - name: EFF_dice_sides
      detail: dword offset EFF_dice_sides = 0x20
      doc: |-
        **[Dice Sides / Minimum Level](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm#effv1_Header_0x20)**
        - When this field is non-zero, all opcodes except for [opcode #12](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op12), [opcode #17](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op17), [opcode #18](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op18), [opcode #218](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op218) (only when `parameter2=1`), [opcode #331](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op331), and [opcode #333](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op333), treat it as `Minimum Level`, meaning that only creatures whose level attribute is greater than or equal to this value will be affected by the effect.
        When this field is used as `Minimum Level`:
        - A `7 ➔ 1` dual-class character qualifies as HD 7, even though the level 7 class is still inactive.
        - A `1/7/1` multi-class character qualifies as HD 7, not level 3 (average).
        - The [2nd](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x235)/[3rd](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x236) class levels are NOT included for single-classes.
          - A `1/30/1` single-class qualifies as HD 1.
