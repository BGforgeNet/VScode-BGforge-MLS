    - name: OPCODE_confusion
      detail: int OPCODE_confusion = 128
      doc: |-
        [State: Confusion](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op128)
        Applies the confusion effect to the targeted creature(s). The creature will run around uncontrollable, randomly attacking.
        `Timing Mode 1` will set [`STATE_CONFUSED`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT31) without leaving behind a removable effect.
        [STATE_CONFUSED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT31) specs:
        - Creature is unseletectable, Inventory is disabled.
        - The creature's AI scripts are disabled.
        - The creature will randomly execute actions [AttackReevaluate(NearestEnemyOf(Myself),15)](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#134), [RandomWalk()](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#85), or [NoAction()](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#0).
        - Disables Saving while affecting a Party Member (displayed message: "You do not control all your Party Members")
    - name: OPCODE_constitution_mod
      detail: int OPCODE_constitution_mod = 10
      doc: |-
        [Stat: Constitution Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op10)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Constitution = Constitution + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Constitution = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Constitution = (Constitution * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [CON](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#41).
        All games but EEs:
        - With a Timing Modes of Permanent or Delayed, if `Type = 0` and `Statistic Modifier` is positive, the statistic will alter and remain shown in white text, and a message 'Constitution raised permanently' will be shown.
        - With a Timing Modes of Permanent or Delayed, if `Type` is `1` or `2`, or `Statistic Modifier` is negative, the statistic will alter and remain shown in white text, though no message is shown.
        - With all other Timing Modes, the statistic will alter and be shown in red text.
        On EEs:
        - There's no feedback message about stat being raised permanently in the EE's – it must be done separately with [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139).
        - The opcode itself provides no coloring anymore (it's been externalized through "UI.menu")
          - An effective value > base value ⟶ green.
          - An effective value < base value ⟶ red.
          - An effective value = base value ⟶ white/default.
        With `Timing Mode`s `1/4/7`, the creature's base [`Constitution`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x23D) is altered, leaving behind no removable effect.
        Final values are capped to the bound range `(0,25)` in game (`40` in IWD2).
    - name: OPCODE_contingency_creation
      detail: int OPCODE_contingency_creation = 234
      doc: |-
        [Spell Effect: Contingency Creation](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op234)
        Creates a contingency.
        The 'Maximum Level' field indicates the maximum spell level that can be used in the contingency. The 'Amount/Type' field indicates the number of spells that can be used in the contingency, and the type of the contingency.
        Known values for the 'Amount/Type' field are:
        First word: Amount (1-3)
        Second word:
          0  Chain Contingency
          1  Contingency
          2  Broken Sequencer
        This opcode only works from party-members.
    - name: OPCODE_create_inventory_item
      detail: int OPCODE_create_inventory_item = 122
      doc: |-
        [Item: Create Inventory Item](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op122)
        Creates the item specified by the `resource` key. The number of items created is controlled by the `Charges` field. The number of secondary charge is determined by `Parameter3`. The number of tertiary charges is determined by `Parameter4` (external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm)s). The item is created in the Inventory.
        - (EE only) [`Resource 2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70) and [`Resource 3`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x78) (external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm)s): item to be created is randomly chosen from resource fields `1–3` that are not empty.
        - Applies a delayed [opcode #123](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op123) effect to remove the item (based on specified `duration`)
    - name: OPCODE_create_inventory_item_days
      detail: int OPCODE_create_inventory_item_days = 255
      doc: |-
        [Item: Create Inventory Item (days)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op255)
        Creates the item specified by the `resource` key. The number of items created is controlled by the `Charges` field. The number of secondary charge is determined by `Parameter3`. The number of tertiary charges is determined by `Parameter4` (external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm)s). The item is created in the Inventory, and has the `can not steal` bit set.
        The difference from [opcode #122](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op122) is that when used in an external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm), the `duration` (from the calling file) is specified in days.
