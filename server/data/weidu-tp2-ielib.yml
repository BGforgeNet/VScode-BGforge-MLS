        - 2 ⟶ Percentage Modifier: `Damage = (Damage * 'Statistic Modifier' value) / 100`
        The effect modifies [MELEE_DAMAGE_BONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#167).
    - name: OPCODE_mirror_image
      detail: int OPCODE_mirror_image = 119
      doc: |-
        [Spell Effect: Mirror Image](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op119)
        Applies the [Mirror Image effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op159) to the targeted creature(s). The number of images is dicated by the level of the caster.
        The exact formula is `'Parameter1' = 2 + ('Caster Level of the spell containing op119' / 3)`.
        - A Wizard spell with op119 will use the caster's Wizard Casting Level.
        - A Priest spell with op119 will use the caster's Priest Casting Level.
        - An Innate spell with op119 will use the caster's Innate Casting Level.
        A side note about non-spellcaster classes:
        A Mirror Image scroll used by a Thief with HLA Use Any Item will use the level `10` duration, but the level `1` Image count.
        The scroll casts the spell at level `10`, but the opcode checks the caster's Wizard Caster Level (which for a Thief is `1`).
    - name: OPCODE_mirror_image_exact_number
      detail: int OPCODE_mirror_image_exact_number = 159
      doc: |-
        [Spell Effect: Mirror Image (Exact Number)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op159)
        Applies the mirror image effect to the targeted creature(s), creating a number of images equal to the `Amount` value. Sets [STATE_MIRRORIMAGE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT30) to true.
        - [STATE_MIRRORIMAGE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT30) will maintain the effects of this opcode, once this opcode expires, but only until you save & reload.
        - If you set [STATE_MIRRORIMAGE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT30) on a [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file, it won't do anything by itself.
        - If you later apply [opcode #119](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op119)/[opcode #159](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op159) to the creature, once it expires, any remaining images will last until struck (absorbing attacks in the process), or until you save & reload.
    - name: OPCODE_miscast_magic
      detail: int OPCODE_miscast_magic = 60
      doc: |-
        [Stat: Miscast Magic](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op60)
        The targeted creature(s) will fail to cast the type of spell specified by the `Type` field, `Percent Chance` percent of the time.
        Known values for `Type` are:
        - 0 ⟶ Mage Spells
        - 1 ⟶ Cleric Spells
        - 2 ⟶ Innate Abilities
        - 3 ⟶ Mage Spells
        - 4 ⟶ Cleric Spells
        - 5 ⟶ Innate Abilities
        This opcode increments [`SPELLFAILUREMAGE`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#51), [`SPELLFAILUREPRIEST`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#52) and [`SPELL_FAILURE_INNATE`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#194), each of which is capped `0 — 100`.
        `Type` values of `0`,`1` or `2` display a message — "Spell Failed: casting failure" (on EE games, this string is specified by [`STRREF_FEEDBACK_SPELLFAILED_CASTFAILURE`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#178))
        `Type` values of `3`,`4` or `5` display a message — "Spell failed due to dead magic" (on EE games, this string is specified by [`STRREF_FEEDBACK_SPELLFAILED_CASTFAILUREDEAD`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#179))
        - Additionally, it sets [`DEAD_MAGIC`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#196) to `1`.
        - This opcode is cumulative with itself and the [Deafness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op80) effect.
        - Spells with [`Ignore Dead/Wild Magic`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Flags_BIT14) ignore the spell failure chance from this effect (regardless of using the `Dead Magic` mode).
    - name: OPCODE_missile_weapon_damage_mod
      detail: int OPCODE_missile_weapon_damage_mod = 286
      doc: |-
        [Stat: Missile Weapon Damage Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op286)
