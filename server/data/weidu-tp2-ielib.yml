        PST: This effect doesn't exist and always crashes the game.
    - name: OPCODE_pause_target
      detail: int OPCODE_pause_target = 165
      doc: |-
        [Spell Effect: Pause Target](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op165)
        Applies the pause effect to the targeted creature(s).
        In particular:
        - Their inventory is still access-able.
        - They are still select-able, and can be issued orders (for instance, activating modal abilities), though not all actions can be taken.
        - It does not interrupt/end modal abilities the creature is currently using.
        - They are not "helpless", an attack roll is still required to hit them.
        - Their scripts stop running.
        This effect sets [CasterHold](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#70) to `1`.
        Both parameters should be `0`.
    - name: OPCODE_petrification
      detail: int OPCODE_petrification = 134
      doc: |-
        [State: Petrification](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op134)
        Applies the petrification effect to the targeted creature(s). This effects kills & removes PC's from the party, and ends the game if used on the Protagonist (not in IWDs or PST).
        Both parameters should be `0` (zero).
        Does not remove any other death STATEs from the creature (as [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13) does).
        While the end result is otherwise the same as "Stoned Death" applied by [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13), this opcode does not actually utilize [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13) (internally or otherwise), unlike most (all?) other forms of death.
        [STATE_STONE_DEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT7) specs:
        - Creature is NOT helpless – they still require an attack roll to be hit.
        - Creature is unselectable, Inventory is disabled.
        - Disables the creature's `SPECIFIC` script.
        - Creature may only take actions listed in both [ACTSLEEP.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/actsleep.htm) and [INSTANT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/instant.htm).
        - Any hostile action against the creature(s) applies an Exploding Stoned Death to them.
        - Kicked from party, retains Inventory, Overlay's Color Index 72 on the entire creature.
