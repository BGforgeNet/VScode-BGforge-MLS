    - name: OPCODE_bounce_by_school_decrementing
      detail: int OPCODE_bounce_by_school_decrementing = 227
      doc: |-
        [Spell: Bounce (by School, decrementing)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op227)
        The targeted creature(s) will reflect a number of effects (specified by the `Total Amount` field) whose `Primary Type (School)` is equal to the one specified by the `School` field.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Primary Type (School)` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x25)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x17)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x4C) specify it manually.
        The `Power` level of the first effect to trigger any instance of this opcode's reflection will determine how much this opcode's `Total Amount` is decremented. Every instance of this opcode on the creature will be decremented by this amount.
        Known values for `School` are:
        - 0 ⟶ NONE
        - 1 ⟶ ABJURATION
        - 2 ⟶ CONJURATION
        - 3 ⟶ DIVINATION
        - 4 ⟶ ENCHANTMENT
        - 5 ⟶ ILLUSION
        - 6 ⟶ EVOCATION
        - 7 ⟶ NECROMANCY
        - 8 ⟶ ALTERATION
        - 9 ⟶ GENERALIST
        - 10 ⟶ WILDMAGE
        On EE games, `resource` field ⟶ Spell cast when this effect self-terminates, `default = Parent + "B"`.
        As of EE v2.6, spells can no longer be "chained" back and forth by reflection.
        If Caster and Target are both affected by this opcode, the spell from Caster will reflect off Target, but not reflect back off Caster. Previously, whoever had more reflection charges would end up victorious, now the initial target always ends up victorious.
        - CANNOT reflect effects of Secondary Type [`MagicAttack`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm#4).
          - [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their Secondary Type from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        - CAN reflect EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode can reflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT reflect effects from self.
        - Maintains portrait icon [`Spell Deflection`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#67) on the target (this is likely a bug).
        - Maintains animation `SPTURNI2` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Reflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is reflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
