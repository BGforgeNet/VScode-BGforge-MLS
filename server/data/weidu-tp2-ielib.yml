        - CAN block EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode can deflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT block effects from self.
        - Maintains portrait icon [`Spell Shield`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#73) on the target.
        - Maintains animation `SPMAGGLO` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Deflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is deflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_immunity_by_secondary_type_decrementing
      detail: int OPCODE_immunity_by_secondary_type_decrementing = 226
      doc: |-
        [Spell: Immunity (by Secondary Type, decrementing)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op226)
        The targeted creature(s) will absorb a number of effects (specified by the `Total Amount` field) whose `Secondary Type` is equal to the one specified by the `Secondary Type` field.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Secondary Type` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
