          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode can deflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
