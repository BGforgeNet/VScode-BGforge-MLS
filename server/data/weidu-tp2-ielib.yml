    - name: OPCODE_poison
      detail: int OPCODE_poison = 25
      doc: |-
        [State: Poison](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op25)
        Damages the target by the 'Damage Amount' value, in the style specified by the 'Type' field.  It sets the STATE_POISONED state.
        Known values for 'Type' are:
        0   Inflict 1HP per second (only if 'Damage Amount' is non-zero)
        1   Inflict 1HP per second (only if 'Damage Amount' is greater than 1)
        2   Inflict 'Damage Amount' per second
        3   Inflict 1HP every 'Damage Amount' seconds
        4   Inflict Param 3 Damage every Param 1 seconds
        5+  Crash
        The 'Damage Amount' parameter should be set to a positive value.
    - name: OPCODE_poison_resist_mod
      detail: int OPCODE_poison_resist_mod = 173
      doc: |-
        [Stat: Poison Resistance Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op173)
        Modifies the Poison Resistance of the target creature(s) to the value specified by `Statistic Modifier`.
        The effect modifies [RESISTPOISON](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#74).
        In EE v2.3 and prior, including the originals, this opcode always "Set" Poison Resistance; in v2.5 and later, it always "increments" Poison Resistance (it stacks).
        Also known as "Stat: Set Poison Resistance".
    - name: OPCODE_polymorph_into_specific
      detail: int OPCODE_polymorph_into_specific = 135
      doc: |-
        [Graphics: Polymorph into Specific](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op135)
        Polymorphs the targeted creature(s) into the creature specified by the `resource` key, in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Gain Resistances/statistics (spell-casting disabled)
        - 1 ⟶ Appearance only
        This effect sets `POLYMORPHED` to `1` but only if `Type=0`.
        If the `resource` key is empty, other Polymorph effects are removed, allowing for removal of permanent effects.
        - It will also remove any item in `SLOT_MISC19` (Magical Weapon Slot), whether or not it was supplying a Polymorph effect.
        At least on EE games, this opcode is bugged when you shapechange between two different non-natural forms. In particular:
        - All your equipment will be considered as "unequipped" (in particular, you will lose passive bonuses/maluses granted by your Rings, Amulet, Helmet and the like).
          - Having said that, a `timing=4,duration=0` delay between removing the old polymorph and applying the new will bypass this issue.
        When `Type` is `0`, this opcode sets
        - `Strength`
        - `Exceptional Strength`
        - `Dexterity`
        - Resistances
          - `Fire`
          - `Cold`
          - `Electricity`
          - `Acid`
          - `Magic`
          - `Magic Fire`
          - `Magic Cold`
          - `Slashing`
          - `Crushing`
          - `Piercing`
          - `Missile`
        - `Base AC`
        - Specific AC
          - `Crushing`
          - `Missile`
          - `Piercing`
          - `Slashing`
        - `Base APR`
        When the `resource` key is empty, and it subsequently clears other Polymorph effects, `Type` is used just like `param#1` of [opcode #337](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op337).
        As a result, it will clear all Polymorph effects if `Type = "-1"`, else it will only clear Polymorph effects that have a `param#2` that matches.
        - `Parameter3` (external EFF): Circle Size
        - `Parameter4` (external EFF): Animation (from ANIMATE.IDS)
        These two values are not functional (changing them does nothing), but they do get set on the effect.
        The creature you're polymorphing into cannot have STATE_SLEEPING, STATE_FROZEN_DEATH, STATE_STONE_DEATH, STATE_FLAME_DEATH, or STATE_DEAD set in its CRE file, or the game will crash.
    - name: OPCODE_portrait_change
      detail: int OPCODE_portrait_change = 107
      doc: |-
        [Portrait Change](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op107)
        Sets the portrait of the targeted creature(s) to that specified in the `resource` key, based on the `Type` value. This effect ignores durations attributed to it.
        Known values for `Type` are:
        - 0 ⟶ Small portrait
        - 1 ⟶ Large portrait
    - name: OPCODE_positive_chant
      detail: int OPCODE_positive_chant = 131
      doc: |-
        [State: Positive Chant](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op131)
        Applies the chant effect to the targeted creature(s).
        This opcode has the same effects as [opcode #22](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op22), but maintains its own separate [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT24).
        This opcode modifies [LUCK](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#32).
        Multiple chant effects are not cumulative.
        - While this opcode is "Non-Cumulative" (it sets values rather than increment), what it really does is stack in reverse standard order.
        - The base [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT24) set on the [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file will override any effect applied to them (defaulting to a value of zero).
        - The oldest equipped effect will override newer equipped effects, and any equipped effect will override a non-equipped effect.
        - The oldest non-equipped effect will override newer non-equipped effects.
        `Modifier` only reads the first byte for its value, the last 3 bytes are ignored.
    - name: OPCODE_prevent_special_effect_icon
      detail: int OPCODE_prevent_special_effect_icon = 169
      doc: |-
        [Graphics: Prevent Special Effect Icon](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op169)
        Prevents the icon specified by the `Icon` field from being displayed.
        All values are drawn directly from "STATES.BAM" in the "GUIBam.bif" starting at sequence `65`.
        Known values for `Icon` are: see [opcode #142](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142).
        Only blocks [opcode #142](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142) effects with a matching `param2` value. Cannot block portrait icons generated by any other mechanic.
        In EE games, can also block [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effects if their EFF file uses [opcode #142](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142) with a matching `param2` value.
    - name: OPCODE_priest_spell_slots_mod
      detail: int OPCODE_priest_spell_slots_mod = 62
      doc: |-
        [Spell: Priest Spell Slots Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op62)
        Alters the number of priest spell slots available to the targeted creature(s), as specified by the `Slot Amount Modifier` field, at the level specified by the `Spell Level` field.
        Known values for `Spell Level` are:
        - 0 ⟶ Double spells
          - The amount of spell slots is doubled for the level specified by the `Slot Amount Modifier` value and all levels below
        - BIT0 ⟶ Level 1
        - BIT1 ⟶ Level 2
        - BIT2 ⟶ Level 3
        - BIT3 ⟶ Level 4
        - BIT4 ⟶ Level 5
        - BIT5 ⟶ Level 6
        - BIT6 ⟶ Level 7
        - BIT9 ⟶ Double spells
          - The amount of spell slots is doubled exclusively for the level specified by `Slot Amount Modifier`
        The target creature(s) must have at least 1 slot at the selected level to have their slot count changed.
        Negative slots start at `65535 (-1)`, and go from there. Even though the spellbook has room to display only 12 slots at once, the slots are still there and usable.
        `Slot Amount Modifier` can be positive or negative.
        - If the number of current spell slots is 1:
          - applying a `-1` modifier will result in zero current slots and prevent further applications of this opcode from altering spell slots (until this effect terminates or is removed, or the base amount changes).
          - applying a `-2` modifier instead would bypass zero and result in `65535 (-1)`. Then applying a `+1` modifier would result in zero current slots and a repeat of the above.
        - Regardless of whether the value can be altered, the effect is still attached to the creature, rather than being discarded entirely. They can still take effect should the creature's base spell slots be altered (such as from leveling up).
        - Applying multiple effects in increments of `-1` will insure that spell slots do not go below zero (and thus will not wrap around to maximum).
    - name: OPCODE_proficiency_mod
      detail: int OPCODE_proficiency_mod = 233
      doc: |-
        [Stat: Proficiency Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op233)
        Sets the weapon proficiency points for the weapon type specified in the `Type` field, to the value specified by the `Amount` field, for the targeted creature(s).
        | `Type` value | BG2                                 | BG:EE / IWD:EE                        | BG2:EE                                |
        | ------------ | ----------------------------------- | ------------------------------------- | ------------------------------------- |
        | 89           | PROFICIENCYBASTARDSWORD             | PROFICIENCYBASTARDSWORD               | PROFICIENCYBASTARDSWORD               |
        | 90           | PROFICIENCYLONGSWORD                | PROFICIENCYLONGSWORD                  | PROFICIENCYLONGSWORD                  |
        | 91           | PROFICIENCYSHORTSWORD               | PROFICIENCYSHORTSWORD                 | PROFICIENCYSHORTSWORD                 |
        | 92           | PROFICIENCYAXE                      | PROFICIENCYAXE                        | PROFICIENCYAXE                        |
        | 93           | PROFICIENCYTWOHANDEDSWORD           | PROFICIENCYTWOHANDEDSWORD             | PROFICIENCYTWOHANDEDSWORD             |
        | 94           | PROFICIENCYKATANA                   | PROFICIENCYKATANA                     | PROFICIENCYKATANA                     |
        | 95           | PROFICIENCYSCIMITARWAKISASHININJATO | PROFICIENCYSCIMITARWAKISASHININJATO   | PROFICIENCYSCIMITARWAKISASHININJATO   |
        | 96           | PROFICIENCYDAGGER                   | PROFICIENCYDAGGER                     | PROFICIENCYDAGGER                     |
        | 97           | PROFICIENCYWARHAMMER                | PROFICIENCYWARHAMMER                  | PROFICIENCYWARHAMMER                  |
        | 98           | PROFICIENCYSPEAR                    | PROFICIENCYSPEAR                      | PROFICIENCYSPEAR                      |
        | 99           | PROFICIENCYHALBERD                  | PROFICIENCYHALBERD                    | PROFICIENCYHALBERD                    |
        | 100          | PROFICIENCYFLAILMORNINGSTAR         | PROFICIENCYFLAILMORNINGSTAR           | PROFICIENCYFLAILMORNINGSTAR           |
        | 101          | PROFICIENCYMACE                     | PROFICIENCYMACE                       | PROFICIENCYMACE                       |
        | 102          | PROFICIENCYQUARTERSTAFF             | PROFICIENCYQUARTERSTAFF               | PROFICIENCYQUARTERSTAFF               |
        | 103          | PROFICIENCYCROSSBOW                 | PROFICIENCYCROSSBOW                   | PROFICIENCYCROSSBOW                   |
        | 104          | PROFICIENCYLONGBOW                  | PROFICIENCYLONGBOW                    | PROFICIENCYLONGBOW                    |
        | 105          | PROFICIENCYSHORTBOW                 | PROFICIENCYSHORTBOW                   | PROFICIENCYSHORTBOW                   |
        | 106          | PROFICIENCYDART                     | PROFICIENCYDART                       | PROFICIENCYDART                       |
        | 107          | PROFICIENCYSLING                    | PROFICIENCYSLING                      | PROFICIENCYSLING                      |
        | 108          | PROFICIENCYBLACKJACK                | PROFICIENCYBLACKJACK                  | PROFICIENCYBLACKJACK                  |
        | 109          | PROFICIENCYGUN                      | WEAPON_ENCHANTMENT*                   | CLERIC_HALLOW*                        |
        | 110          | PROFICIENCYMARTIALARTS              | CLERIC_ARMOR_OF_FAITH*                | CLERIC_ARMOR_OF_FAITH*                |
        | 111          | PROFICIENCY2HANDED                  | PROFICIENCY2HANDED                    | PROFICIENCY2HANDED                    |
        | 112          | PROFICIENCYSWORDANDSHIELD           | PROFICIENCYSWORDANDSHIELD             | PROFICIENCYSWORDANDSHIELD             |
        | 113          | PROFICIENCYSINGLEWEAPON             | PROFICIENCYSINGLEWEAPON               | PROFICIENCYSINGLEWEAPON               |
        | 114          | PROFICIENCY2WEAPON                  | PROFICIENCY2WEAPON                    | PROFICIENCY2WEAPON                    |
        | 115          | EXTRAPROFICIENCY1                   | PROFICIENCYCLUB                       | PROFICIENCYCLUB                       |
        | 116          | EXTRAPROFICIENCY2                   | WIZARD_SPELL_DEFLECTION*              | WIZARD_SPELL_DEFLECTION*              |
        | 117          | EXTRAPROFICIENCY3                   | PROTECTION_FROM_EVIL*                 | PROTECTION_FROM_EVIL*                 |
        | 118          | EXTRAPROFICIENCY4                   | TRUE_SIGHT*                           | TRUE_SIGHT*                           |
        | 119          | EXTRAPROFICIENCY5                   | CLERIC_CHAOTIC_COMMANDS*              | CLERIC_CHAOTIC_COMMANDS*              |
        | 120          | EXTRAPROFICIENCY6                   | CLERIC_INSECT_PLAGUE*                 | CLERIC_INSECT_PLAGUE*                 |
        | 121          | EXTRAPROFICIENCY7                   | CLERIC_BLADE_BARRIER*                 | CLERIC_BLADE_BARRIER*                 |
        | 122          | EXTRAPROFICIENCY8                   | CLERIC_PHYSICAL_MIRROR*               | CLERIC_PHYSICAL_MIRROR*               |
        | 123          | EXTRAPROFICIENCY9                   | CLERIC_SHIELD_OF_THE_ARCHONS*         | CLERIC_SHIELD_OF_THE_ARCHONS*         |
        | 124          | EXTRAPROFICIENCY10                  | CLERIC_REGENERATION*                  | CLERIC_REGENERATION*                  |
        | 125          | EXTRAPROFICIENCY11                  | WIZARD_FIRE_SHIELD*                   | WIZARD_FIRE_SHIELD*                   |
        | 126          | EXTRAPROFICIENCY12                  | WIZARD_PROTECTION_FROM_MAGIC_ENERGY*  | WIZARD_PROTECTION_FROM_MAGIC_ENERGY*  |
        | 127          | EXTRAPROFICIENCY13                  | WIZARD_MISLEAD*                       | WIZARD_MISLEAD*                       |
        | 128          | EXTRAPROFICIENCY14                  | WIZARD_PROTECTION_FROM_MAGIC_WEAPONS* | WIZARD_PROTECTION_FROM_MAGIC_WEAPONS* |
        | 129          | EXTRAPROFICIENCY15                  | WIZARD_SPELL_TURNING*                 | WIZARD_SPELL_TURNING*                 |
        | 130          | EXTRAPROFICIENCY16                  | WIZARD_PROTECTION_FROM_THE_ELEMENTS*  | WIZARD_PROTECTION_FROM_THE_ELEMENTS*  |
        | 131          | EXTRAPROFICIENCY17                  | CLERIC_FREE_ACTION*                   | CLERIC_FREE_ACTION*                   |
        | 132          | EXTRAPROFICIENCY18                  | WIZARD_KHELBENS_WARDING_WHIP*         | WIZARD_KHELBENS_WARDING_WHIP*         |
        | 133          | EXTRAPROFICIENCY19                  | CLERIC_DEFENSIVE_HARMONY*             | CLERIC_DEFENSIVE_HARMONY*             |
        | 134          | EXTRAPROFICIENCY20                  | EXTRAPROFICIENCY20                    | EXTRAPROFICIENCY20                    |
        - Every `STAT` from `89` to `134` is a weapon proficiency, even the weapon styles.
        - Every one of those `STAT`s can be set as a weapon's proficiency and it will use that stat's value for proficiency bonuses.
          - This includes `STAT`s like `CLERIC_ARMOR_OF_FAITH*`, even though they're used for an alternative purpose.
            - The only thing stopping them from showing up during chargen/level-up proficiency selection is their entries (or lack there of) in [WEAPPROF.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/weapprof.htm). A `NAME_REF` column of `4294967296 (-1)` is hardcoded to hide the proficiency during chargen/level-up. Aside from that it just needs a non-zero maximum for the current class/kit.
        In EE games, `Type 99 – PROFICIENCYHALBERD` currently cannot use the `Increment` option without crashing.
        In EE games, the `Special` field must currently be `0`, due to an incomplete (bugged) feature added by Beamdog (it wasn't used before anyway, so there was no point in it not being `0`).
        The Proficiency Modifier effect cannot increment or decrement proficiency points, it can only SET them.
        This is however not true for EEs, where `param#2 ('Type')` is split into two word subfields. By setting the second (high) one to `1 (Increment)`, it's possible to increment/decrement the proficiency points of the targeted creature(s) by the value specified by the `Amount` parameter.
    - name: OPCODE_protection_backstab
      detail: int OPCODE_protection_backstab = 292
      doc: |-
        [Protection: Backstab](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op292)
        Makes the targeted creature(s) immune to backstabbing.
        The effect modifies [IMMUNITY_TO_BACKSTAB](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#175) to `Stat Value`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_protection_by_school
      detail: int OPCODE_protection_by_school = 204
      doc: |-
        [Spell: Protection (by School)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op204)
        Gives the targeted creature(s) immunity to effects from the school specified by the `School` field.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Primary Type (School)` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x25)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x17)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x4C) specify it manually.
        Known values for `School` are:
        - 0 ⟶ NONE
        - 1 ⟶ ABJURATION
        - 2 ⟶ CONJURATION
        - 3 ⟶ DIVINATION
        - 4 ⟶ ENCHANTMENT
        - 5 ⟶ ILLUSION
        - 6 ⟶ EVOCATION
        - 7 ⟶ NECROMANCY
        - 8 ⟶ ALTERATION
        - 9 ⟶ GENERALIST
        - 10 ⟶ WILDMAGE
        - CANNOT block effects of Secondary Type [`MagicAttack`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm#4).
          - [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their Secondary Type from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        - CAN block EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode can deflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT block effects from self.
        - Maintains animation `SPMAGGLO` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Deflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is deflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_protection_by_secondary_type
      detail: int OPCODE_protection_by_secondary_type = 205
      doc: |-
        [Spell: Protection (by Secondary Type)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op205)
        Gives the targeted creature(s) immunity to effects from the secondary type specified by the `Secondary Type` field.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Secondary Type` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        Known values for `Secondary Type` are:
        - 0 ⟶ NONE
        - 1 ⟶ SPELLPROTECTIONS
        - 2 ⟶ SPECIFICPROTECTIONS
        - 3 ⟶ ILLUSIONARYPROTECTIONS
        - 4 ⟶ MAGICATTACK
        - 5 ⟶ DIVINATIONATTACK
        - 6 ⟶ CONJURATION
        - 7 ⟶ COMBATPROTECTIONS
        - 8 ⟶ CONTINGENCY
        - 9 ⟶ BATTLEGROUND
        - 10 ⟶ OFFENSIVEDAMAGE
        - 11 ⟶ DISABLING
        - 12 ⟶ COMBINATION
        - 13 ⟶ NON-COMBAT
        - CANNOT block effects of Secondary Type [`MagicAttack`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm#4).
        - CAN block EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode can deflect effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT block effects from self.
        - Maintains animation `SPMAGGLO` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Deflection separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is deflected, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_protection_free_action
      detail: int OPCODE_protection_free_action = 163
      doc: |-
        [Protection: Free Action](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op163)
        Applies the free action effect to the targeted creature(s), restoring the creatures movement rate to its default value if the current movement rate value is below the default for the animation type.
        Also check out the EE description [here](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op163).
    - name: OPCODE_protection_freedom
      detail: int OPCODE_protection_freedom = 212
      doc: |-
        [Protection: Freedom](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op212)
        Applies the freedom effect to the targeted creature(s).
        Removes [Imprisonment](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op211) and [Maze](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op213), and [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files using those opcodes.
    - name: OPCODE_protection_from_creature_type
      detail: int OPCODE_protection_from_creature_type = 100
      doc: |-
        [Protection: from Creature Type](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op100)
        Gives the targeted creature(s) protection from the creature type specified by the `IDS File` and `IDS Entry` fields.
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE only; broken at least in 2.5)
        To be protected from any creature, leave `IDS Entry` at `0` (zero), and `IDS File` at `2`. Protection will grant the bearer immunity from being attacked, cast a spell at, or otherwise targeted by creatures with this type.
    - name: OPCODE_protection_from_detection_non_detection
      detail: int OPCODE_protection_from_detection_non_detection = 69
      doc: |-
        [Protection: From Detection (Non-Detection)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op69)
        Applies the non-detection effect to the targeted creature(s), setting [STATE_NONDETECTION](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT21) while active. This effect is negated by [opcode #70](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op70). While in the non-detection state, the creature is immune to [opcode #47](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op47) and [opcode #116](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op116), though they are affected by effects that remove illusionary protections by school or secondary type.
        `Timing Mode`s `1/4/7` will permanently set the creature's [`STATE_NONDETECTION`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT21) flag, leaving no removable effect. This flag is not cleared on death.
    - name: OPCODE_protection_from_opcode
      detail: int OPCODE_protection_from_opcode = 101
      doc: |-
        [Protection: from Opcode](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101)
        Gives the targeted creature(s) protection from the opcode specified by the `Opcode` field.
    - name: OPCODE_protection_from_projectile
      detail: int OPCODE_protection_from_projectile = 83
      doc: |-
        [Protection: From Projectile](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op83)
        Protects the targeted creatures(s) from any effect(s) delivered by the specified projectile.
        Values for `Projectile Index` are taken from [PROJECTL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/projectl.htm).
        [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles only impact through their [explosion](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x21A) and/or [secondary](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x214) projectiles, so they are what must be specified in `Projectile Index`.
        Cannot protect against the projectile used by Melee weapon attacks (this is contrast to [opcode #197](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op197), which CAN reflect them (by specifying projectile `#0|NONE`)).
    - name: OPCODE_protection_from_specific_animation
      detail: int OPCODE_protection_from_specific_animation = 296
      doc: |-
        [Graphics: Protection from Specific Animation](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op296)
        Provides the targeted creature(s) with immunity to [opcode #215](https://gibberlings3.github.io/iesdp/opcodes/op215.html) effects with a matching "Resource" specified by the `resource` key.
        It does not remove any [opcode #215](https://gibberlings3.github.io/iesdp/opcodes/op215.html) effect already present on the targeted creature.
        It cannot block animations from any other source.
    - name: OPCODE_protection_from_spell
      detail: int OPCODE_protection_from_spell = 206
      doc: |-
        [Spell: Protection from Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op206)
        Gives the targeted creature(s) immunity from the spell specified in the `resource` key. The strref specified by the `String Reference` field is displayed when the spell is absorbed.
        As of EE v2.6, `String Reference` is bound by
        // NOTE: strrefs [0xF00000—0xF00537] index into [enginest.2da](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm), with the row being "strref - 0xF00000"
        if (!pEffect->m_sourceRes.IsValid() || (pImmunitySpell->m_error != 0xf00074 && pImmunitySpell->m_error != 0xf00080))
        {
        	uint nNewFeedback = 0xffffffff;
        	if (pImmunitySpell->m_error == 0xf00074) {
        		nNewFeedback = 0xf00073;
        	}
        	pImmunitySpell->m_error = nNewFeedback;
        }
        Basically, `String Reference` has to be `0xF00074` ([`STRREF_FEEDBACK_EVADE_RESOURCE`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#116)) or `0xF00080` ([`STRREF_FEEDBACK_IMMUNE_RESOURCE`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#128)) for the engine to display it.
        **NOTE:** the engine only allows `0xF00074` / `0xF00080` — it doesn't care that [`STRREF_FEEDBACK_IMMUNE_RESOURCE`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/enginest.htm#128) (`99389` on BG2:EE) is what `0xF00080` eventually resolves to, it's not `0xF00080`. [opcode #206](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op206)'s `String Reference` should look like this in [Near Infinity](https://github.com/Argent77/NearInfinity) (right click ⇒ Edit as hex number):
        At least in EEs, this opcode can block [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files too.
        In order to do so, both the `Resource` field of [opcode #206](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op206) and the [`Parent Resource`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x94) field of the EFF file must be the same string (max. 8 character long); moreover, you must set the [`Resource Type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x90) field of the EFF file to [`Spell`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x90_1).
    - name: OPCODE_protection_from_timestop
      detail: int OPCODE_protection_from_timestop = 310
      doc: |-
        [Protection: from Timestop](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op310)
        The targeted creature(s) becomes immune to time-stop.
        The effect modifies [IMMUNE_TO_TIME_STOP](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#197) to `Stat Value`.
        The `Stat Value` parameter can take any value.
        If you set it to `0`, you will disable the effect (for its duration). For instance, a Time Stop spell that applies (to everyone) op#310 with `Stat Value = 0` for `18s` would trap those such as Demogorgon in the time stop.
        Creatures are naturally immune to their own Time Stop effects, without needing this effect or setting [IMMUNE_TO_TIME_STOP](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#197).
    - name: OPCODE_protection_from_tracking
      detail: int OPCODE_protection_from_tracking = 308
      doc: |-
        [Protection: From Tracking](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op308)
        Protects the targetted creature(s) from the Tracking arrows effect (has no affect on the area string displayed).
        The effect modifies stat 195 to the value of param type.
        The 'Stat Value' parameter can take any value. If you set it to 0, you will disable the effect (for its duration).
    - name: OPCODE_protection_from_weapons
      detail: int OPCODE_protection_from_weapons = 120
      doc: |-
        [Protection: from Weapons](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op120)
        Gives the targeted creature(s) immunity to weapons as specified by the `Type` field. The `Enchantment` field is used if `Type` is set to `0`.
        Known values for `Type` are:
        - 0 ⟶ Enchanted
        - 1 ⟶ Magical
        - 2 ⟶ Non-Magical
        - 3 ⟶ Silver
        - 4 ⟶ Non-Silver
        - 5 ⟶ Non-Silver / Non-Magical
        - 6 ⟶ Two-Handed
        - 7 ⟶ One-Handed
        - 8 ⟶ Cursed
        - 9 ⟶ Non-Cursed
        - 10 ⟶ Cold Iron
        - 11 ⟶ Non Cold Iron
        Keep in mind that:
        - Protected weapons will still trigger [HitBy()](https://gibberlings3.github.io/iesdp/scripting/triggers/bgeetriggers.htm#0x0020), but will not interact with Mirror Image or Stone skins.
        - Blocks weapon damage, on-hit effects of the weapon, [opcode #248](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op248) and [opcode #249](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op249), regardless of the effects target.
        - [`Area-effect`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles (f.i. Arrow of Detonation) only check for Weapon Immunity on the attacked target, and use that result for all caught within their area of effect.
    - name: OPCODE_protection_spell_trap_by_power_level_decrementing
      detail: int OPCODE_protection_spell_trap_by_power_level_decrementing = 259
      doc: |-
        [Protection: Spell Trap (by Power Level, decrementing)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op259)
        Applies the spell-trap effect to the targeted creature(s), absorbing a number of effects as specified by the `Total Amount` field, of the level specified by the `Power Level` field, and recalling previously cast spells.
        The `Power` level of the first effect to trigger any instance of this opcode's trap will determine how much this opcode's `Total Amount` is decremented. Every instance of this opcode on the creature will be decremented by this amount.
        On EE games, `resource` field ⟶ Spell cast when this effect self-terminates, `default = Parent + "B"`.
        - CANNOT trap effects of Secondary Type [`MagicAttack`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm#4).
          - [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their Secondary Type from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        - CANNOT trap EFF files with [`resist_dispel = BIT2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x5C_BIT2).
          - Keep in mind that this BIT is automatically set on any effect delivered by an [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) (Explosion) projectile, so this opcode cannot trap effects through [AoE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles.
        - CANNOT trap effects from self.
        - Maintains portrait icon [`Spell Trap`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#117) on the target.
        - Maintains animation `SPMAGGLO` on the target, can be suppressed by [opcode #291](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op291).
        - When it traps an effect, it applies [opcode #261](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op261) to the target.
          - `Parameter1` is the `Power` level of the trapped effect, `Parameter2` is always `0|Wizard`.
        [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files delivered by [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) will interact with Trapping separately from the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect that applies them, and only if that [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect already got through. If the [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effect is trapped, then the values in the [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file won't matter. Most vanilla [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files have these fields set to `empty/zero` to avoid interacting with this opcode.
    - name: OPCODE_protection_stoneskin
      detail: int OPCODE_protection_stoneskin = 218
      doc: |-
        [Protection: Stoneskin](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op218)
        Gives the targeted creature(s) a number of protections from physical attacks, as specified by the 'Amount' field.
    - name: OPCODE_puppet_id
      detail: int OPCODE_puppet_id = 237
      doc: |-
        [Spell Effect: Puppet ID](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op237)
        This effect stores information for images created by [opcode #236](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op236).
        Known values for `Master ID` are:
        - -1 ⟶ Not Party Member (Disables saving while in effect)
        - 0 ⟶ Player1
        - 1 ⟶ Player2
        - 2 ⟶ Player3
        - 3 ⟶ Player4
        - 4 ⟶ Player5
        - 5 ⟶ Player6
        Known values for `Image Type` are:
        - 0 ⟶ Clone
        - 1 ⟶ Mislead
          - Maintains [STATE_INVISIBLE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT4) on `Master ID`. This state is constantly reapplied whenever removed or terminated.
        - 2 ⟶ Project Image
          - Maintains [STATE_HELPLESS](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5) on `Master ID`. This state is constantly reapplied whenever removed or terminated.
          - If `Master ID` triggers [`HitBy([ANYONE],0)`](https://gibberlings3.github.io/iesdp/scripting/triggers/bgeetriggers.htm#0x0020), this creature is moved to area `"NO_AREA.ARE"`. This will delete non-global creatures from the game, unless such an area has been added to the game.
        - 3 ⟶ Simulacrum
        Modifies [PUPPETMASTERID](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#138) to the `Object ID` of a projected image's Master. `Object ID` is the 4 byte long number stored at offset `0x27c` of the [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file, and can change.
        Modifies [PUPPETMASTERTYPE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#139), to a value of `Parameter2`, on the creature specified by [PUPPETMASTERID](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#138):
        - Stores the image type (Mislead, Projection, Simulacrum) of a creature's most recently created clone.
        Modifies [PUPPETTYPE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#140), to a value of `Image Type`:
        - Stores the image type (Mislead, Projection, Simulacrum) of a such a creature.
        [PUPPETID](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#141) is likewise set on the `Master ID`, to the image's `Object ID` (likely whichever image is most recent, if they have multiple images).
    - name: OPCODE_raise_strength_constitution_dexterity_non_cumulative
      detail: int OPCODE_raise_strength_constitution_dexterity_non_cumulative = 132
      doc: |-
        [State: Raise Strength, Constitution, & Dexterity Non-Cumulative](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op132)
        Raises the strength, constitution and dexterity of the targeted creature(s) by the value specified by the `Statistic Modifier` field. A negative value of `Statistic Modifier` sets the Strength, Constitution and Dexterity of the targeted creature(s) to 25.
        - While this opcode is "Non-Cumulative" (it sets values rather than increment), what it really does is stack in reverse standard order.
        - The base [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT25) set on the [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file will override any effect applied to them (defaulting to a value of zero).
        - The oldest equipped effect will override newer equipped effects, and any equipped effect will override a non-equipped effect.
        - The oldest non-equipped effect will override newer non-equipped effects.
        `Statistic Modifier` only reads the first byte for its value, the last 3 bytes are ignored.
    - name: OPCODE_random_wish_spell
      detail: int OPCODE_random_wish_spell = 311
      doc: |-
        [Spell: Random Wish Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op311)
        This effect casts a wish spell (`SPWISH01 – SPWISH25`), selected based on the casting creatures Wisdom attribute, as outlined below.
        SPWISHxx    MinWis    MaxWis
        01          10        25
        02          10        25
        03          10        25
        04          10        25
        05          0         25
        06          10        25
        07          0         25
        08          15        25
        09          0         25
        10          0         25
        11          0         25
        12          0         25
        13          0         25
        14          0         25
        15          15        25
        16          0         25
        17          0         25
        18          0         17
        19          0         9
        20          0         17
        21          0         17
        22          0         9
        23          0         9
        24          0         9
        25          0         25
    - name: OPCODE_ranger_tracking_ability
      detail: int OPCODE_ranger_tracking_ability = 307
      doc: |-
        [Ranger Tracking Ability](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op307)
        Activates the Tracking Ability. A string from [TRACKING.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/tracking.htm) is shown, and arrows appear along the screen edge pointing to any creatures within range. The units of the range parameter are unknown.
        The arrow effect may be hardcoded to spell `"SPCL922.SPL"`.
        The file [TRACKING.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/tracking.htm) lists the string reference that shows what information is learned from using this effect for each area.
    - name: OPCODE_remove_creature
      detail: int OPCODE_remove_creature = 168
      doc: |-
        [Summon: Remove Creature](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op168)
        Moves the targeted creature(s) to area `".ARE"` (a non-existent area). Also known as [Script: Destroy Self](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#111).
        This deletes non-global creatures from the game (most common usage).
        For Global Creatures:
        - This effect removes the creature from the player's party (if they were in it).
        - The effect will keep the creature out of the party and any other Area for its duration, but does not re-instate the creature once it expires.
        - They can still be recovered through script actions once the effect expires.
        Both parameters should be `0` (zero).
    - name: OPCODE_remove_curse
      detail: int OPCODE_remove_curse = 26
      doc: |-
        [Item: Remove Curse](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op26)
        Removes [`Cursed`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#Header_Flags_BIT4) items in addition to all [opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effects from the targeted creature(s).
    - name: OPCODE_remove_infravision
      detail: int OPCODE_remove_infravision = 64
      doc: |-
        [State: Remove Infravision](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op64)
        Removes infravision from the targeted creature(s).
        This effect ignores durations attributed to it.
        This will not remove racial infravision.
        Both parameters should be `0` (zero).
    - name: OPCODE_remove_inventory_item
      detail: int OPCODE_remove_inventory_item = 123
      doc: |-
        [Item: Remove Inventory Item](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op123)
        Removes the item specified by the `resource` key from the targeted creature(s). This effect should be used to remove inventory items (use [opcode #112](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op112) for equipped items).
        In particular:
        - Removes all item(s) in the first slot containing the specified `resource` key from the targeted creature(s).
        - Items in container items (e.g. Bags of Holding) will not be removed.
        - Inventory slots are checked in numerical order from [SLOTS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm).
    - name: OPCODE_remove_item
      detail: int OPCODE_remove_item = 112
      doc: |-
        [Item: Remove Item](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op112)
        Removes a single instance (or stack) of the item specified by the `resource` key from the targeted creature(s). Items in container items (e.g. Bags of Holding) will not be removed. If a creature has multiple instances of the item, the one in the lowest slot number (see [SLOTS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm)) is removed. `"EFF_M02"` is hard-coded to play when an item is removed. This effect should be used to remove equipped items (use [opcode #123](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op123) for inventory items).
    - name: OPCODE_remove_map_marker
      detail: int OPCODE_remove_map_marker = 254
      doc: |-
        [Spell Effect: Remove Map Marker](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op254)
        Applies the remove map marker effect. This effect removes the map marker (if any) at the position the effect is cast. The `Target` of this effect should be set to `Pre-Target` to function correctly (actually, it can work with `Self`, might depend on how you are using it).
        The `String Reference` field should match [`opcode #253 StrRef`](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op253) to be removed. [Opcode #254](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op254) needs to be cast on exact coordinates as [opcode #253](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op253).
        This effect works in SoA but not ToB. Works fine in EE's.
    - name: OPCODE_remove_one_school
      detail: int OPCODE_remove_one_school = 229
      doc: |-
        [Removal: Remove One School](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op229)
        Removes a single spell effect of the school specified by the 'School Type' field up to the 'Max Level' value, from the targeted creature(s).
        Known values for 'School Type' are:
        1   Abjurer
        2   Conjurer
        3   Diviner
        4   Enchanter
        5   Illusionist
        6   Invoker
        7   Necromancer
        8   Transmuter
        9   Generalist
    - name: OPCODE_remove_one_secondary_type
      detail: int OPCODE_remove_one_secondary_type = 230
      doc: |-
        [Removal: Remove One Secondary Type](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op230)
        Removes one spell effect of the school specified by the 'School Type' field up to the 'Max Level' value, from the targeted creature(s).
        Known values for 'Secondary Type' are:
        1   Spell Protections
        2   Specific Protections
        3   Illusionary Protections
        4   Magic Attack
        5   Divination Attack
        6   Conjuration
        7   Combat Protections
        8   Contingency
        9   Battleground
        10  Offensive Damage
        11  Disabling
        12  Combination
        13  Non-Combat
    - name: OPCODE_remove_protection_from_spell
      detail: int OPCODE_remove_protection_from_spell = 266
      doc: |-
        [Spell: Remove Protection from Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op266)
        Removes [opcode #206](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op206) with matching `resource` keys.
        At least in BG2 and EEs, this effect can remove [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) when EFF file uses [opcode #206](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op206) and matching `resource`.
    - name: OPCODE_remove_sanctuary
      detail: int OPCODE_remove_sanctuary = 160
      doc: |-
        [Remove Sanctuary](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op160)
        Removes the [sanctuary](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op153) effect from the targeted creature(s).
        Both parameters should be `0` (zero).
    - name: OPCODE_remove_school
      detail: int OPCODE_remove_school = 220
      doc: |-
        [Removal: Remove School](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op220)
        For any effect that matches the specified `School`, and has a `0 <= Power Level <= Maximum Level`:
        - All effects from that effect's `Parent Resource` with a `Power Level <= Maximum Level` that do not use `Timing Mode 9` will be removed.
        - An effect using `Timing Mode 9` can be used to match the type and power level to trigger its resource's removal, but that effect itself will not be removed.
        - If removal is triggered, the relevant string from [`MSCHOOL.2DA`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/mschool.htm) is displayed in the combat log.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Primary Type (School)` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x25)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x17)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x4C) specify it manually.
        Known values for `School` are:
        - 0 ⟶ NONE
        - 1 ⟶ ABJURATION
        - 2 ⟶ CONJURATION
        - 3 ⟶ DIVINATION
        - 4 ⟶ ENCHANTMENT
        - 5 ⟶ ILLUSION
        - 6 ⟶ EVOCATION
        - 7 ⟶ NECROMANCY
        - 8 ⟶ ALTERATION
        - 9 ⟶ GENERALIST
        - 10 ⟶ WILDMAGE
    - name: OPCODE_remove_secondary_type
      detail: int OPCODE_remove_secondary_type = 221
      doc: |-
        [Removal: Remove Secondary Type](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op221)
        For any effect that matches the specified `Secondary Type`, and has a `0 <= Power Level <= Maximum Level`:
        - All effects from that effect's `Parent Resource` with a `Power Level <= Maximum Level` that do not use `Timing Mode 9` will be removed.
        - An effect using `Timing Mode 9` can be used to match the type and power level to trigger its resource's removal, but that effect itself will not be removed.
        - If removal is triggered, the relevant string from [`MSECTYPE.2DA`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/msectype.htm) is displayed in the combat log.
        [V1 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v1.htm) inherit their `Secondary Type` from the Header([SPL](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x27)) / Extended Header([ITM](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x19)), [V2 effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xD0) specify it manually.
        Known values for `Secondary Type` are:
        - 0 ⟶ NONE
        - 1 ⟶ SPELLPROTECTIONS
        - 2 ⟶ SPECIFICPROTECTIONS
        - 3 ⟶ ILLUSIONARYPROTECTIONS
        - 4 ⟶ MAGICATTACK
        - 5 ⟶ DIVINATIONATTACK
        - 6 ⟶ CONJURATION
        - 7 ⟶ COMBATPROTECTIONS
        - 8 ⟶ CONTINGENCY
        - 9 ⟶ BATTLEGROUND
        - 10 ⟶ OFFENSIVEDAMAGE
        - 11 ⟶ DISABLING
        - 12 ⟶ COMBINATION
        - 13 ⟶ NON-COMBAT
    - name: OPCODE_remove_special_effect_icon
      detail: int OPCODE_remove_special_effect_icon = 240
      doc: |-
        [Graphics: Remove Special Effect Icon](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op240)
        Removes the icon specified by the `Icon` field.
        Known values for `Icon` are: see [opcode #142](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142).
        Only removes [opcode #142](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142) effects, with a matching `param2` value. Cannot remove portrait icons generated by any other mechanic.
        In EE games, can also remove [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)/[opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) effects if their EFF file uses [opcode #142](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op142) with a matching `param2` value.
    - name: OPCODE_remove_specific_area_effect_zone_of_sweet_air
      detail: int OPCODE_remove_specific_area_effect_zone_of_sweet_air = 273
      doc: |-
        [Remove: Specific Area Effect(Zone of Sweet Air)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op273)
        Removes projectiles listed in [CLEARAIR.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/clearair.htm).
        At least in EEs, If the `resource` field is filled, it will use a custom [2DA](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/2da.htm) file to determine which projectiles to remove.
        The custom 2DA file must be structured as `"CLEARAIR.2DA"`.
    - name: OPCODE_remove_spell
      detail: int OPCODE_remove_spell = 172
      doc: |-
        [Spell: Remove Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op172)
        Removes the [`SPL`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm) specified by the `resource` key from the targeted creature(s) spellbook.
        If the key is not 8 characters long, all memorized copies will be removed.
         If the key is 8 characters, memorized copies will remain intact.
        Both parameters should be `0` (zero).
        Two 8 characters long keys that are identical up to the 7th character are indistinguishable!
    - name: OPCODE_replace_creature
      detail: int OPCODE_replace_creature = 151
      doc: |-
        [Summon: Replace Creature](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op151)
        Replaces the targeted creature(s) with creature specified by the `resource` key, in the style specified by the `Type` value.
        Known values for `Type` are:
        - 0 ⟶ Remove targeted creature via [opcode #168](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op168)
        - 1 ⟶ Kill targeted creature via [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13)`*p2=8` (Chunking death)
        - 2 ⟶ Kill targeted creature via [opcode #13](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op13)`*p2=4` (Normal death)
        - 3 ⟶ No effect on targeted creature – New creature (specified by the `resource` key) is spawned at target's location
        Experience is given as normal for a kill (the party still has to be the one applying the effect to earn experience).
    - name: OPCODE_reputation
      detail: int OPCODE_reputation = 108
      doc: |-
        [Stat: Reputation](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op108)
        Sets the individual reputation of the targeted creature(s) to the value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        This does not affect the main reputation of the Party, unless `Type 3-5` are used. Though it can affect ranger/paladinhood of any target.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Reputation = Reputation + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Reputation = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Reputation = (Reputation * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Increment Party Reputation by `10 * 'Statistic Modifier'`, cannot lower reputation below `100`, will raise reputation to `100` if already less (only in EEs)
        - 4 ⟶ Party Reputation = 'Statistic Modifier' value, cannot lower reputation below `100`, will raise reputation to `100` if already less (only in EEs)
        - 5 ⟶ Party Reputation = (Party Reputation * 'Statistic Modifier' value) / 100, cannot lower reputation below 100, will raise reputation to 100 if already less (only in EEs)
        The effect modifies [REPUTATION](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#48).
    - name: OPCODE_restore_lost_spells
      detail: int OPCODE_restore_lost_spells = 261
      doc: |-
        [Spell: Restore Lost Spells](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op261)
        Applies the restore lost spell effect to the targeted creature(s).
        This effect will restore 1 spell to memory, at the level specified by the `Spell Level` field, and of the type specified by the `Spell Type` field. If there is no free slot at the specified level, the effect restores a spell at the next lowest level possible.
        Known values for `Spell Type` are:
        - 0 ⟶ Wizard / Bard / Sorcerer
        - 1 ⟶ Cleric / Druid / Shaman
    - name: OPCODE_reveal_area
      detail: int OPCODE_reveal_area = 117
      doc: |-
        [Spell Effect: Reveal Area](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op117)
        Reveals the current area.
        It does not remove the fog of war.
    - name: OPCODE_reveal_magic
      detail: int OPCODE_reveal_magic = 225
      doc: |-
        [Spell: Reveal Magic](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op225)
        Highlights the targeted creature(s) if they are affected by dispellable magic. The effect appears to be without duration.
        More specifically, it functions by applying [opcode #50](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op50) to creature(s) with any dispellable effects. Color glow is red.
    - name: OPCODE_save_vs_breath_weapons_mod
      detail: int OPCODE_save_vs_breath_weapons_mod = 36
      doc: |-
        [Stat: Save vs. Breath Weapons Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op36)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Save = Save + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Save = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Save = (Save * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Increment Instantly: `Save = Save + 'Statistic Modifier' value` (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [SAVEVSBREATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#12).
        When `Type = 3`, this opcode processes before saving throws are checked for effects proceeding it in the same effect stack; when `Type = 0`, it processes after.
    - name: OPCODE_save_vs_death_mod
      detail: int OPCODE_save_vs_death_mod = 33
      doc: |-
        [Stat: Save vs. Death Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op33)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Save = Save + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Save = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Save = (Save * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Increment Instantly: `Save = Save + 'Statistic Modifier' value` (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [SAVEVSDEATH](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#9).
        When `Type = 3`, this opcode processes before saving throws are checked for effects proceeding it in the same effect stack; when `Type = 0`, it processes after.
        Since at least version 2.5, `Type = 3` modifies instantly SAVEVSWANDS instead of SAVEVSDEATH.
        As a result, saving throws for effects in the same effect stack and after this opcode are not processed as expected.
        Effects proceeded after the stack are treated normaly like `Type = 0`.
    - name: OPCODE_save_vs_petrification_polymorph_mod
      detail: int OPCODE_save_vs_petrification_polymorph_mod = 35
      doc: |-
        [Stat: Save vs. Petrification/Polymorph Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op35)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Save = Save + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Save = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Save = (Save * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Increment Instantly: `Save = Save + 'Statistic Modifier' value` (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [SAVEVSPOLY](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#11).
        When `Type = 3`, this opcode processes before saving throws are checked for effects proceeding it in the same effect stack; when `Type = 0`, it processes after.
    - name: OPCODE_save_vs_spells_mod
      detail: int OPCODE_save_vs_spells_mod = 37
      doc: |-
        [Stat: Save vs. Spells Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op37)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Save = Save + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Save = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Save = (Save * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Increment Instantly: `Save = Save + 'Statistic Modifier' value` (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [SAVEVSSPELL](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#13).
        When `Type = 3`, this opcode processes before saving throws are checked for effects proceeding it in the same effect stack; when `Type = 0`, it processes after.
    - name: OPCODE_save_vs_wands_mod
      detail: int OPCODE_save_vs_wands_mod = 34
      doc: |-
        [Stat: Save vs. Wands Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op34)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Save = Save + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Save = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Save = (Save * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Increment Instantly: `Save = Save + 'Statistic Modifier' value` (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [SAVEVSWANDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#10).
        When `Type = 3`, this opcode processes before saving throws are checked for effects proceeding it in the same effect stack; when `Type = 0`, it processes after.
    - name: OPCODE_script_enable_offscreen_ai
      detail: int OPCODE_script_enable_offscreen_ai = 293
      doc: |-
        [Script: Enable Offscreen AI](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op293)
        The targeted creature(s) will still run scripts when off-screen and out of combat.
        The effect modifies [PREVENT_AI_SLOWDOWN](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#183) to `Stat Value`.
        - Creatures in EE run scripts as long as they are in the current area, [opcode #293](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op293) does not alter this, nor allow their scripts to run while they are in different areas.
        - However, creatures without this opcode attached will run scripts at a considerably slower rate (about ⅓ or ¼ rate).
        - Moreover, it looks like off-screen creatures move only at halved speed (which might be true for other actions as well). With this opcode creatures seem to move and act at the same speed as on-screen.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_script_modify_global_variable
      detail: int OPCODE_script_modify_global_variable = 265
      doc: |-
        [Script: Modify Global Variable](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op265)
        Alters the global variable specified by the `resource` key, in the style specified by the `Type` field, by the value specified by the `Value` field.
        Known values for `Type` are:
        - 0 ⟶ Set Global (to `Value`)
        - 1 ⟶ Increment Global (by `Value`)
        - Since the `Resource` Key can only be 8 characters long maximum, you can not set a Global Variable with this effect that has a name longer than this amount.
          - You can use the [`VVC`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70) field of external EFF files for an additional 8 characters of variable name.
            - You can use the [`3rdresource`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x78) field of external EFF files for an additional 8 characters of variable name.
        All timing modes act as permanent for this effect.
        `Value` can store integers or coordinates. Coordinates are stored as first 2 bytes X, last 2 bytes Y (f.i.: `310 + (30 << 16)`).
        Make sure to set target. Target: Self (1) works well. If target is unset (0), the game will freeze.
    - name: OPCODE_script_modify_local_variable
      detail: int OPCODE_script_modify_local_variable = 309
      doc: |-
        [Script: Modify Local Variable](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op309)
        Modifies the local variable specified by the `resource` key to the value specified by the `Value` field.
        Known values for `Type` are:
        - 0 ⟶ Set Local (to `Value`)
        - 1 ⟶ Increment Local (by `Value`)
        - Since the `resource` key can only be 8 characters long maximum, you can not set a variable with this Effect that has a name longer than this amount.
          - You can use the [`Resource 2`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70) field of external EFF files for an additional 8 characters of variable name.
            - You can use the [`Resource 3`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x78) field of external EFF files for an additional 8 characters of variable name.
              - As a result, it cannot modify variables more than 24 characters long.
        This effect is always instantaneous (local variables are stored internally, not as effects, while the game is running). All local variables for a [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) are stored as [opcode #187](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op187) effects on that [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) whenever the game is saved, which will trigger as soon as the game is loaded.
        `Value` can store integers or coordinates. Coordinates are stored as first 2 bytes X, last 2 bytes Y (f.i.: `310 + (30 << 16)`).
    - name: OPCODE_script_movetoarea
      detail: int OPCODE_script_movetoarea = 186
      doc: |-
        [Script: MoveToArea](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op186)
        Marks the targetted creature(s) as travelling to the area specified by the `resource` key. The creature appears in the specified area after a delay (specified by the `Delay` field), with the orientation specified by the `Orientation` field.
        In particular:
        - Global Creatures ignore the delay.
        - If the creature is already in the specified area, it will ignore the delay.
        - Non-global creatures currently in a different area than specified will use the delay.
        - Delay is measured in 1⁄30 seconds, (½ tick), `600 = 20 seconds`.
        - On non-EE games, the creature appears at the point specified by the Target Point fields (external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files only).
          - On EE games, target(s) appear at Caster's Coordinates in new area (it does not seem to be possible to override through EFFs).
        - Creature is moved to the new area (instantly) and flagged [`Moving Between Areas`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_Flags_BIT14) until their delay expires (if it's used). It won't be active until the delay expires (it's hidden, cannot be affected by Area-effect, doesn't occupy space). It can still be targeted by the various `Everyone` targeting modes in the new area while it's still inactive, but similar to [maze](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op213)/[imprisonment](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op211), effects won't trigger (including [poison](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op25) and similar) on them until they become active.
        IWD2: there was a note to not use this effect in older IESDP.
        There is some confusion whether the Target (bg1, iwds) or the Caster point field is used.
        Avoid saving during the delay (can lead to lost NPCs or crashes if you load while NPC's are still in transition).
    - name: OPCODE_script_scripting_state_mod
      detail: int OPCODE_script_scripting_state_mod = 282
      doc: |-
        [Script: Scripting State Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op282)
        Modifies `Scripting State` to the given value. `Scripting State` range from `0` to `35`. The scripting state can be checked via scripts (see [STATS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm)) subtract `156` from the stat value to get the scripting state.
        - On non-EE games, this effect does not have proper bounds checking. It can therefore be used in unintended ways. For example scripting state `13` equals with the `NO_CIRCLE` attribute (`stat=169`), and scripting state `1139` ties to `PICKPOCKET` (`stat=29`).
        - EEs have proper bounds checking for this opcode, can only modify stats `#156 – #200`, except [SUMMON_DISABLE_ACTION](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#188), not all values are a straight "subtract `156` from their stat".
          - For best results, it should only be used for stats `#156 – #165`, as all others have dedicated opcodes and hardcoded effects.
    - name: OPCODE_script_store_local_variable
      detail: int OPCODE_script_store_local_variable = 187
      doc: |-
        [Script: Store Local Variable](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op187)
        This effect sets the variable specified by the [`Variable Name`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0xA8) field to the value specified by the `Value` field.
        This effect can only be used in an external effect ([CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Effects)/[EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) file).
        This effect is always instantaneous (local variables are stored internally, not as effects, while the game is running). All local variables for a [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) are stored as [opcode #187](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op187) effects on that [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) whenever the game is saved, which will trigger as soon as the game is loaded.
    - name: OPCODE_select_spell
      detail: int OPCODE_select_spell = 214
      doc: |-
        [Spell Effect: Select Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op214)
        Uses the 2da specified by the resource key to display multiple spell options, based on the 'Type' field.
        Known values for 'Type' are:
        1   Show only known spells
        To make your own 2DA file for, use the SPWI510.2DA as a base.
    - name: OPCODE_selection_circle_removal
      detail: int OPCODE_selection_circle_removal = 287
      doc: |-
        [Graphics: Selection Circle Removal](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op287)
        Removes the selection circle from the targeted creature(s).
        The effect modifies [DISABLE_CIRCLE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#169).
    - name: OPCODE_set_ai_script
      detail: int OPCODE_set_ai_script = 82
      doc: |-
        [Set AI Script](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op82)
        Sets the script type specified by the `Type` value to the contents of the `resource` key.
        Known values for `Type` are:
        - 0 ⟶ OVERRIDE
        - 1 ⟶ AREA
        - 2 ⟶ SPECIFICS
        - 4 ⟶ CLASS
        - 5 ⟶ RACE
        - 6 ⟶ GENERAL
        - 7 ⟶ DEFAULT
        This effect can unset scripts from a creature, which can break the game.
        - Effect is always instantaneous/delayed.
        - `AREA` and `SPECIFICS` can only be set on non-global creatures (not potential party members or familiars), and are lost upon saving & reload.
    - name: OPCODE_set_melee_effect
      detail: int OPCODE_set_melee_effect = 248
      doc: |-
        [Item: Set Melee Effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op248)
        Sets the effect specified by the `resource` key as a melee effect.
        The specified effect will be applied to the target of each successful melee attack.
        The `resource` key references a `EFF` not a `SPL`.
        `EFF` files applied by this opcode can be blocked by [opcode #101](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101).
        At least in EEs, setting `parameter2` to `4` (i.e., `BIT2`) results in restricting this effect to fists only. If you leave it at `0`, then all melee weapons are eligible (including fists).
        It will always apply to both main and offhand weapon.
        This opcode applies its effect inbetween base weapon damage and the on-hit effects of the weapon.
    - name: OPCODE_set_ranged_effect
      detail: int OPCODE_set_ranged_effect = 249
      doc: |-
        [Item: Set Ranged Effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op249)
        Sets the effect specified by the `resource` key as a ranged effect.
        The specified effect will be applied to the target of each successful ranged attack.
        The `resource` key references a `EFF` not a `SPL`.
        `EFF` files applied by this opcode can be blocked by [opcode #101](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101).
        At least in EEs, this opcode applies its effect after both the base weapon damage and the on-hit effects of the weapon.
    - name: OPCODE_set_stat_tobex
      detail: int OPCODE_set_stat_tobex = 318
      doc: |-
        [Stat: Set Stat (TobEx)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op318)
        Applies the modifier value specified by the 'Statistic Modifier' field in the style specified by the 'Type' field to the opcode specified by the 'Stat Opcode' field.
        Known values for 'Type' are:
        0 Cumulative Modifier -> Value = Value + 'Statistic Modifier' value
        1 Flat Value Modifier -> Value = 'Statistic Modifier' value
        2 Percentage Modifier -> Value = (Value * 'Statistic Modifier' value) / 100
        3 Multiplicative Modifier -> Value = Value * 'Statistic Modifier' value
        4 Divisive Modifier -> Value = Value / 'Statistic Modifier' value
        5 Modulus Modifier -> Value = Value % 'Statistic Modifier' value
        6 Logical AND Modifier -> Value = Value && 'Statistic Modifier' value
        7 Logical OR Modifier -> Value = Value || 'Statistic Modifier' value
        8 Bitwise AND Modifier -> Value = Value & 'Statistic Modifier' value
        9 Bitwise OR Modifier -> Value = Value | 'Statistic Modifier' value
        10 Inverse Modifier -> Value = !Value
        You cannot set any stats with opcode < 387 with this effect. New stats 202-400 are reserved for new hard-coded stats.
        ONLY available if TobEx is installed!
    - name: OPCODE_set_trap
      detail: int OPCODE_set_trap = 252
      doc: |-
        [Spell Effect: Set Trap](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op252)
        Attempts to set the spell specified by the resource key as a trap.
        This effect will fail if the targeted creature(s) does not have sufficient points in the 'Set Traps' skill.
    - name: OPCODE_set_traps_mod
      detail: int OPCODE_set_traps_mod = 277
      doc: |-
        [Stat: Set Traps Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op277)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Skill = Skill + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Skill = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Skill = (Skill * 'Statistic Modifier' value) / 100`
        At least in EEs, when `Type = 0` and `Timing Mode = 9`, it modifies [SETTRAPSMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#182). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm) capped to the range [0,255], before being included in the creature's Set Traps score.
    - name: OPCODE_shake_window
      detail: int OPCODE_shake_window = 269
      doc: |-
        [Spell Effect: Shake Window](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op269)
        Applies the shake windows effect, with an intensity specified by the `Strength` field.
    - name: OPCODE_silence
      detail: int OPCODE_silence = 38
      doc: |-
        [State: Silence](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op38)
        Applies the silence effect to the targeted creature(s). Sets [STATE_SILENCED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT12) to true.
        A silenced creature cannot cast spells / use special abilities (unless flagged as [`Castable when silenced`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Flags_BIT25)), bard song or initiate dialog.
        The engine is hard-coded to allow these spells to be cast by a silenced creature:
        - `"SPWI219"` (Vocalize)
        - `"SPIN649"` (Teleport to Pocket Plane) in BG2/BGEE
    - name: OPCODE_slashing_resist_mod
      detail: int OPCODE_slashing_resist_mod = 86
      doc: |-
        [Stat: Slashing Resistance Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op86)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Resistance = Resistance + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Resistance = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Resistance = (Resistance * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [RESISTSLASHING](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#21).
    - name: OPCODE_slow
      detail: int OPCODE_slow = 40
      doc: |-
        [State: Slow](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op40)
        Applies the slow effect to the targeted creature(s). It automatically grants the [`Slow`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#41) portrait icon.
        This effect will cancel out the [haste opcode](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op16).
        This effect doubles the [`Casting Time`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Extended_Header_0x12) of all spells. Not verified for IWD2.
        This opcode will set the [`STATE_SLOWED`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT16) flag and nothing else when applied with `Timing Mode 1`, and cannot be removed within the game by any means, only suppressed by [Haste](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op16).
    - name: OPCODE_sparkle
      detail: int OPCODE_sparkle = 41
      doc: |-
        [Graphics: Sparkle](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op41)
        Displays the sparkle effect specified by the `Type` field, in the colour specified by the `Colour` field. The colour field may be connected to [SPRKLCLR.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/sprklclr.htm).
        Known values for `Colour` are:
        - 0 ⟶ Crash
        - 1 ⟶ Black
        - 2 ⟶ Blue
        - 3 ⟶ Chromatic
        - 4 ⟶ Gold
        - 5 ⟶ Green
        - 6 ⟶ Purple
        - 7 ⟶ Red
        - 8 ⟶ White
        - 9 ⟶ Ice
        - 10 ⟶ Stone
        - 11 ⟶ Magenta
        - 12 ⟶ Orange
        - 13+ ⟶ Crash
        Known values for `Type` are:
        - 1 ⟶ Explosion
          - It is always instantaneous.
        - 2 ⟶ No effect?
        - 3 ⟶ Sparkle Shower
          - Will use the specified `duration`, but is not saved (lost upon reload).
        Both of these params use only the lower 16 bits (upper bits might have other function).
    - name: OPCODE_spell_sequencer_activation
      detail: int OPCODE_spell_sequencer_activation = 258
      doc: |-
        [Spell: Spell Sequencer Activation](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op258)
        Activates a spell sequencer.
        The resource key must be set to the filename of the spell which contains the Spell Sequencer Creation effect, which must be an innate ability.
        The spell which contains the Spell Sequencer Creation effect can have a maximum filename of 7 characters.
        The spell which contains the Spell Sequencer Activation effect must have the same filename, suffixed with the D character.
        eg:
          Spell Sequencer Creation filename = SPSS101
          Spell Sequencer Activation filename = SPSS101D
    - name: OPCODE_spell_sequencer_active
      detail: int OPCODE_spell_sequencer_active = 256
      doc: |-
        [Spell: Spell Sequencer Active](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op256)
        This effect stores the spell resources for an active spell sequencer. The three spell resources are stored in the resource key, VVC field, and eff 3rd parameter.
    - name: OPCODE_spell_sequencer_creation
      detail: int OPCODE_spell_sequencer_creation = 257
      doc: |-
        [Spell: Spell Sequencer Creation](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op257)
        Creates a spell sequencer.
        The 'Maximum Level' field indicates the maximum spell level that can be used in the sequencer. The 'Amount' field indicates the number of spells that can be used in the sequencer.
        The filename of a spell containing this effect should be no more than 7 characters.
    - name: OPCODE_stealth_mod
      detail: int OPCODE_stealth_mod = 59
      doc: |-
        [Stat: Stealth Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op59)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Stealth = Stealth + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Stealth = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Stealth = (Stealth * 'Statistic Modifier' value) / 100`
        In BG2 and EEs, this effect alters the Move Silently skill.
        `Timing Mode`s `1/4/7` permanently alter the creature's [`Move Silently`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x68) score, leaving no removable effect.
        (EE only) When `Type = 0` and `Timing Mode = 9`, it modifies [MOVESILENTLYMTPBONUS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#177). The final value for this stat is multiplied by its percentage entry in [THIEFSCL.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/thiefscl.htm), capped to the range `[0,255]`, before being included in the creature's [`Move Silently`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x68) score.
    - name: OPCODE_strength_mod
      detail: int OPCODE_strength_mod = 44
      doc: |-
        [Stat: Strength Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op44)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Strength = Strength + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Strength = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Strength = (Strength * 'Statistic Modifier' value) / 100`
        - 3 ⟶ Bull's Strength (EE only)
        `Statistic Modifier` can be positive or negative.
        The effect modifies [STR](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#36).
        All games but EEs:
        - With a Timing Modes of Permanent or Delayed, if `Type` is `0` and `Statistic Modifier` is positive, the statistic will alter and remain shown in white text, and a message 'Strength raised permanently' will be shown.
        - With a Timing Modes of Permanent or Delayed, if `Type` is `1` or `2`, or `Statistic Modifier` is negative, the statistic will alter and remain shown in white text, though no message is shown.
        - With all other Timing Modes, the statistic will alter and be shown in red text.
        On EEs:
        - There's no feedback message about stat being raised permanently in the EE's – it must be done separately with [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139).
        - The opcode itself provides no coloring anymore (it's been externalized through "UI.menu")
          - An effective value > base value ⟶ green.
          - An effective value < base value ⟶ red.
          - An effective value = base value ⟶ white/default.
        When `Type=3`:
        - `Statistic Modifier` is unused: it uses the value listed in [CLSSPLAB.2da](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/clssplab.htm) for the creature's base class, or defaults to `1` if the file isn't present (it only exists by default in IWDEE).
        - A single instance of this opcode (using `Type=3`) cannot raise Strength above 18 (hardcoded), but multiple instances of it can.
          - This is because it only checks the limit against the creature's base score, not its effective score.
            - A Cleric with 12 base STR could gain up to +6 from the effect each time. Two max roll effects would take them to 24 STR.
            - A Cleric with 16 base STR could only gain up to +2 from the effect each time.
          - Warrior classes also gain a % Strength score, their maximum is actually `18/100`. Every `/10` is counted as `+1` from their die roll. Warriors will not exceed `18/100` though, as once they hit `18`, the remaining dice roll converts to a % increase, preventing their score from exceeding `18/100` (`18/100 + /10` doesn't convert to `19`).
         For instance, if a PALADIN with `17` STR rolls, say, `5`, he will end up with `18/40` STR.
        - Like the other modes, applying the effect with Timing Mode 1 will affect the creature's base stat, leaving no removable effect.
        - Once applied to a creature, `Statistic Modifier` will store the exact STR increase granted, while the `Special` field will store any Exceptional STR increase granted (only useful for lookup/editing through EEkeeper/NI).
        - When you apply this effect in an External [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm), (via [op177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) / [op283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283)):
          - `Parameter1` in the EFF will determine the exact Strength increase (so it must be set manually, and ignores any limit).
          - If `Parameter1` is non-zero, Exceptional STR will still be rolled as normal (and only for appropriate Classes).
            - It will be equal to `10 * (Roll - (18 - Base))`, capped (0,100).
          - If `Parameter1` is zero, no Exceptional STR will be granted.
          - The actual increase for Exceptional STR will be stored in the `Special` field of [op177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) / [op283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) (after it's been applied to the creature).
          - Basically, it works exactly like `Type=0`, except that warriors will still gain a random Exceptional STR increase (of course it's only noticeable if their resulting STR is 18).
        With `Timing Mode`s `1/4/7`, the creature's base [`Strength`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x238) is altered, leaving behind no removable effect.
        Final values are capped to the bound range `(0,25)` in game (`40` in IWD2).
    - name: OPCODE_stun
      detail: int OPCODE_stun = 45
      doc: |-
        [State: Stun](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op45)
        Stuns the targeted creature(s) and sets HELD to 1. In particular:
        - Maintains Portrait Icon [`Stun`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#55) (EE only).
        - Immobilizes the creature, limiting it to instantaneous actions ([INSTANT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/instant.htm)).
        - Maintains [STATE_STUNNED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT3).
          - Renders the creature unselectable and disable the Inventory.
        - Maintains [STATE_HELPLESS](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5).
          - Renders the creature unselectable and disable the Inventory.
          - Causes all attacks against the creature to automatically hit, disabling Critical Hits and misses.
        Applied with `Timing Mode`s `1/4/7`: will set the creature's base [`STATE_STUNNED`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT3) flag, while still leaving behind a separate removable effect.
        - Should you remove the effect without removing the state (through means other than [opcode #46](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op46)), the creature will be fully functional, just not controllable by the player (if it was).
        - By itself, [STATE_STUNNED](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT3) does not disable any scripts or limit which actions the creature may take. It needs its opcode's immobilization effect as well as [STATE_HELPLESS](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5) to fully work.
    - name: OPCODE_stun_90hp
      detail: int OPCODE_stun_90hp = 210
      doc: |-
        [Spell Effect: Stun 90HP](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op210)
        Applies the stun effect to the targeted creature(s), if the targeted creature(s) has less than 90 HP.
        The `duration` of the effect is:
        - 1 to 29 HP ⟶ stunned for 4d4 rounds
        - 30 to 59 HP ⟶ stunned for 2d4 rounds
        - 60 to 89 HP ⟶ stunned for 1d4 rounds
        More specifically, it functions by applying [opcode #45](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op45).
        [Immunity](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101) to [opcode #45](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op45) is sufficient to block the stun effect, but without [immunity](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101) to [opcode #210](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op210) it will still generate an erroneous `~Stunned~` string display.
    - name: OPCODE_teleport_dimension_door
      detail: int OPCODE_teleport_dimension_door = 124
      doc: |-
        [Spell Effect: Teleport (Dimension Door)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op124)
        Teleports the targeted creature(s) in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Default
        - 1 ⟶ Source to Target
        - 2 ⟶ Return to Saved Location
        - 3 ⟶ Exchanged Source and Target
        `Return to Saved Location`: Teleport effect target to the coordinates stored by [SetHomeLocation(P:Point*)](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#261) for that creature. Defaults to `(0.0)` if not set.
    - name: OPCODE_teleport_field
      detail: int OPCODE_teleport_field = 222
      doc: |-
        [Spell Effect: Teleport Field](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op222)
        Applies the teleport field to the targeted creature(s).
        The `Max Range` field sets the maximum range of the teleporting effect. Teleport is random direction up to specified range, range measured same as projectile radius, i.e.: `16 = 1 ft`.
    - name: OPCODE_teleport_to_target
      detail: int OPCODE_teleport_to_target = 274
      doc: |-
        [Spell Effect: Teleport to Target](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op274)
        Teleports the affected creature(s) to a random enemy (i.e. party members would teleport to a red circled creature, red circled creatures teleport to the party). Enemy needs to be within visual range, but can be invisible.
    - name: OPCODE_text_change_name
      detail: int OPCODE_text_change_name = 103
      doc: |-
        [Text: Change Name](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op103)
        Alters the name of the targeted creature(s) to the strref specified by the `String Reference` field. When used with a duration timing, after the duration, the name will be set to a blank entry.
    - name: OPCODE_text_change_title
      detail: int OPCODE_text_change_title = 290
      doc: |-
        [Text: Change Title](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op290)
        Changes the title of the targeted creature(s), to the strref specified by the 'String Reference' field, at the location specified by the 'Position' field.
        Known values for 'Position' are:
        - 0 ⟶ Records Screen information section
        - 1 ⟶ Various character screens (eg. Inventory and Records Screen)
        The effect modifies stats 172 and 173.
    - name: OPCODE_text_display_string
      detail: int OPCODE_text_display_string = 139
      doc: |-
        [Text: Display String](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139)
        Displays the strref specified by the `String Reference` value.
        At least in EE games, it is possible to colorize the string. In order to do so, follow the instructions concerning the colorization of the name of your character during [Character Creation](https://gibberlings3.github.io/iesdp/appendices/charactercreation.htm).
    - name: OPCODE_text_protection_from_display_specific_string
      detail: int OPCODE_text_protection_from_display_specific_string = 267
      doc: |-
        [Text: Protection from Display Specific String](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op267)
        Prevents the strref specified by the `String Reference` field being displayed by the targeted creature(s).
        Only grants immunity to [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/op139.html) effects with a matching `String Reference` value.
        Cannot block string displays from any other mechanic.
    - name: OPCODE_thac0_mod
      detail: int OPCODE_thac0_mod = 54
      doc: |-
        [Stat: THAC0 Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op54)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `THAC0 = THAC0 + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `THAC0 = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `THAC0 = (THAC0 * 'Statistic Modifier' value) / 100`
        This effect adjusts the base stat, rather than modified THAC0.
    - name: OPCODE_thac0_mod_off_hand
      detail: int OPCODE_thac0_mod_off_hand = 305
      doc: |-
        [Stat: THAC0 Modifier (Off-Hand)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op305)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `THAC0 = THAC0 + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `THAC0 = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `THAC0 = (THAC0 * 'Statistic Modifier' value) / 100`
    - name: OPCODE_thac0_mod_on_hand
      detail: int OPCODE_thac0_mod_on_hand = 306
      doc: |-
        [Stat: THAC0 Modifier (On-Hand)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op306)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `THAC0 = THAC0 + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `THAC0 = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `THAC0 = (THAC0 * 'Statistic Modifier' value) / 100`
    - name: OPCODE_thac0_mod_with_missile_weapons
      detail: int OPCODE_thac0_mod_with_missile_weapons = 167
      doc: |-
        [Stat: THAC0 Modifier with Missile Weapons](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op167)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `THAC0 = THAC0 + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `THAC0 = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `THAC0 = (THAC0 * 'Statistic Modifier' value) / 100`
    - name: OPCODE_thac0_vs_creature_type_mod
      detail: int OPCODE_thac0_vs_creature_type_mod = 178
      doc: |-
        [Spell Effect: THAC0 vs. Creature Type Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op178)
        Alters the targeted creature(s) THAC0 against the creature type specified by the `IDS Entry` field in the specified `IDS File`.
        The actual modifier value is placed in the `Parameter3` field in an external effect.
        Known values for `IDS File` are:
        - 2 ⟶ [EA.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/ea.htm)
        - 3 ⟶ [GENERAL.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/general.htm)
        - 4 ⟶ [RACE.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/race.htm)
        - 5 ⟶ [CLASS.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/class.htm)
        - 6 ⟶ [SPECIFIC.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/specific.htm)
        - 7 ⟶ [GENDER.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/gender.htm)
        - 8 ⟶ [ALIGN.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/align.htm)
        - 9 ⟶ [KIT.IDS](https://gibberlings3.github.io/iesdp/files/ids/bgee/kit.htm) (EE only; broken at least in 2.5)
        - It will affect all attacks, not just the weapon it's on, which would be incorrect when dual-wielding.
        - Multiple [opcode #178](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op178) effects only allow additional targeting, they do not stack their THAC0 bonus.
        This opcode uses a reverse stacking order: the "oldest" effect with matching IDS values for the target is used, not the most recent, and equipped effects take priority over non-equipped effects.
    - name: OPCODE_time_stop
      detail: int OPCODE_time_stop = 231
      doc: |-
        [Spell Effect: Time Stop](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op231)
        Applies the time stop effect.
        The timestop effect lasts half as long as the `Duration` specified for the effect.
        In particular:
        - All creatures not immune to Time Stop will be rendered uncontrollable, can be hit automatically by attacks as if they were HELPLESS (but do not actually have [`STATE_HELPLESS`](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT5) set), and their frequency-based effects will not trigger ([poison](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op25)/[regeneration](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op98)), but their `duration` will run.
        - [Projectiles](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm) are suspended mid-flight until the Time Stop ends, at which point they will resume normal function.
        - [`Area Effect`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles are suppressed until the Time Stop ends, at which point they will resume normal function, though their duration will run during the Time Stop.
        - Projectiles that hit "instantly" (`#0` and `#1` for spells/items) are unaffected by Time Stop, which includes all melee weapons.
        Both parameters should be `0` (zero).
        Only one creature may have a Time Stop effect running at a time, applying a Time Stop effect during another will override the previous. The caster is always immune to their own Time Stop effect, they do not require [opcode #310](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op310), unless their own Time Stop is at risk of being overridden.
    - name: OPCODE_to_hit_mod
      detail: int OPCODE_to_hit_mod = 278
      doc: |-
        [Stat: To Hit Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op278)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `To-hit = To-hit + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `To-hit = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `To-hit = (To-hit * 'Statistic Modifier' value) / 100`
        This effect adjusts modified THAC0, rather than the base stat.
    - name: OPCODE_tracking_skill_mod
      detail: int OPCODE_tracking_skill_mod = 95
      doc: |-
        [Stat: Tracking Skill Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op95)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Skill = Skill + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Skill = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Skill = (Skill * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [TRACKING](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#33).
    - name: OPCODE_transparency_fade
      detail: int OPCODE_transparency_fade = 66
      doc: |-
        [Graphics: Transparency Fade](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op66)
        Fades the targeted creature(s) by the value in the amount specified by the `Fade Amount` field in the style specified by the `Visual Effect` field.
        Known values for `Fade Amount` are:
        - 0 ⟶ Fully visible
        - ...
        - 255 ⟶ Fully transparent
        A creature's [`TRANSLUCENT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#60) stat is stored in a single byte (`0-255`) on the [`CRE`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_translucency) file.
         This opcode only reads the first byte (out of four) of `Fade Amount`, so the value will always be `0-255`.
        Known values for `Visual Effect` are:
        - 0 ⟶ Draw instantly
        - 1 ⟶ Fade in
        - 2 ⟶ Fade out
        `Visual Effect = 0` sets the [`TRANSLUCENT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#60) stat directly, based on the `timing mode`.
         `Visual Effect = 1` and `Visual Effect = 2` call a hardcoded process that decreases/increases the [`TRANSLUCENT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#60) stat by `Fade Amount` every tick, until it reaches `0`/`255`.
        - Any transparency inherit in the [`animation`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/ini_anim.htm) (see for instance `7703.INI — SHADOW`) will stack with that of the [`TRANSLUCENT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#60) stat.
          - It's likely multiplied (so that `50% * 50% = 25%`), or something similar, but not additive.
        - On EE games, If you have the game option "Sprite Outlines" enabled, [`TRANSLUCENT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#60) values `1 - 127` are treated as `0`.
          - If you also have the game option "Highlight selected sprites" enabled, [`TRANSLUCENT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#60) values `1 - 127` will display correctly, but only while the mouse is over the creature.
    - name: OPCODE_unconsciousness
      detail: int OPCODE_unconsciousness = 39
      doc: |-
        [State: Unconsciousness](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op39)
        Applies the unconsciousness effect to the targeted creature(s).
        Known values for `Wake on Damage?` are (only in EEs or IWD):
        - 0 ⟶ Yes
        - 1 ⟶ No
        `Icon` defines the index from [STATDESC.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm) for custom portrait icons (EE only). Default value is [`Sleep`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/statdesc.htm#14). If it is set, also spell state [`PRONE`](https://gibberlings3.github.io/iesdp/files/ids/bgee/splstate.htm#249) will be set. Otherwise the creature will be moved to the backlist and become [untargettable by most scripts](https://www.gibberlings3.net/forums/topic/35548-ee-additional-op39-info/).
        This opcode sets the [`STATE_SLEEPING`](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT0) and [`STATE_HELPLESS`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT5) flag bits.
        In case of `Timing Mode`s `1/4/7` the bits cannot be removed in-game.
        Moreover, the [`STATE_SLEEPING`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT0) works as the `Wake on Hit` option. It's just not usable because of the unremovable [`STATE_HELPLESS`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT5).
        Immunity to this opcode does not prevent unconsciousness from [`stunning`](https://gibberlings3.github.io/iesdp/files/ids/bgee/damages.htm) damage done by normal fists.
    - name: OPCODE_unconsciousness_20hp
      detail: int OPCODE_unconsciousness_20hp = 217
      doc: |-
        [Spell Effect: Unconsciousness 20HP](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op217)
        Applies [opcode #39](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op39) using `Sleep (Wake on Hit)` mode to the targeted creature(s), if the targeted creature(s) has less than 20 HP. The effect always lasts 5 rounds, and ignores the `duration` field. When calling the sleep opcode, parameters 2 and special are copied over.
    - name: OPCODE_unlock_knock
      detail: int OPCODE_unlock_knock = 125
      doc: |-
        [Spell Effect: Unlock (Knock)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op125)
        Applies the knock effect to the targeted creature(s).
        Both parameters should be `0` (zero).
        It is automatically successful but only works on locks that can normally be picked with the Open Locks skill.
    - name: OPCODE_unsummon_creature
      detail: int OPCODE_unsummon_creature = 68
      doc: |-
        [Summon: Unsummon Creature](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op68)
        Unsummons a creature, with feedback controlled by `Text Notification`.
        Known values for `Text Notification` are:
        - 0 ⟶ No text notification
        - 1 ⟶ Show text notification
        At least in BG2 and EEs, the `Resource` key should be set to the filename of the
         animation to play when unsummoning the creature, and defaults to `"SPGFLSH1"` if left empty.
        - Has no effect on Party Members.
        - Moves the targeted creature(s) to area `".ARE"` (a non-existant area). This deletes non-global creatures from the game.
        - Global creatures can still be recovered through scripts actions, such as [MoveGlobalObject()](https://gibberlings3.github.io/iesdp/scripting/actions/bgeeactions.htm#291).
    - name: OPCODE_use_eff_file
      detail: int OPCODE_use_eff_file = 177
      doc: |-
        [Use EFF File](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177)
        Applies the `EFF` file specified by the
        `resource` key to
        the targeted creature(s), if the targeted creature(s) match the value specified by the `IDS Entry` field, in the
        specified `IDS File`.
        Known values for `IDS File` are:
        - 2 ⟶ `EA.IDS`
        - 3 ⟶ `GENERAL.IDS`
        - 4 ⟶ `RACE.IDS`
        - 5 ⟶ `CLASS.IDS`
        - 6 ⟶ `SPECIFIC.IDS`
        - 7 ⟶ `GENDER.IDS`
        - 8 ⟶ `ALIGN.IDS`
        When used in an external `EFF` file, a non-zero value for the
        `Bypass probability / immunities / saving throws` field causes the `EFF`
        file to be applied regardless of the rolls / immunities of the target(s).
        This effect doesn't add the opcode contained in the `EFF`
        file to the targeted creature(s). Instead, the `op177` instance itself stays on the target(s) via the usual duration rules, and
        internally decodes and executes the opcode contained in the `EFF` file every time the `op177` instance is ticked.
        When ticked, the `op177` instance copies fields to/from the `decoded effect` of the same tick:
        - **Every tick (before effect application)**, `op177` → `decoded effect`:
        | Field Name       | `EFF` Offset            |
        | ---------------- | ----------------------- |
        | Timing mode      | `[+0x24]`               |
        | Duration         | `[+0x28]`               |
        | Caster position  | `[+0x80]` and `[+0x84]` |
        | Target position  | `[+0x88]` and `[+0x8C]` |
        | First call flag  | `[+0xCC]`               |
        | Source ID        | `(internal field)`      |
        | Source target ID | `(internal field)`      |
        - **Every tick (after effect application)**, `decoded effect` → `op177`:
        | Field Name      | `EFF` Offset |
        | --------------- | ------------ |
        | First call flag | `[+0xCC]`    |
        The engine specially handles cases where effects are removed by opcode, ensuring it also matches the opcode in the
        `EFF` file of `op177` instances.
        `EFF` files applied by this opcode can be blocked by [opcode #101](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op101).
        This effect causes a crash if used by a container.
    - name: OPCODE_use_eff_file_cursed
      detail: int OPCODE_use_eff_file_cursed = 283
      doc: |-
        [Use EFF File (Cursed)](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283)
        Applies the eff file specified by the resource key to the targeted creature(s), if the targeted creature(s) match the 'IDS Entry' in the specified 'IDS File'. The eff can be removed via the Remove Curse opcode (in addition to other standard methods).
        Known values for 'IDS File' are:
        2   EA.ids
        3   General.ids
        4   Race.ids
        5   Class.ids
        6   Specific.ids
        7   Gender.ids
        8   Align.ids
    - name: OPCODE_visual_range
      detail: int OPCODE_visual_range = 262
      doc: |-
        [Stat: Visual Range](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op262)
        Applies the visual range effect to the targeted creature(s).
        This effect modifies the visual range of the targeted creature(s).
        The `Statistic Modifier` parameter seems to be in the `0–15` interval.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Visual Range = Visual Range + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Visual Range = 'Statistic Modifier' value`
        The effect modifies [VISUALRANGE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#147).
        With relation to this effect:
        - Each unit of visible range equals 2ft: `32px(horizontal)/24px(vertical)`
        - Default Visual Range = 14
        - Maximum visual range to reveal "Fog of War" = 23
    - name: OPCODE_web_effect
      detail: int OPCODE_web_effect = 157
      doc: |-
        [State: Web Effect](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op157)
        Applies the web effect to the targeted creature(s). The affected creature becomes immobile and its AI scripts stop running.
        This effect sets stats #58 (HELD) and #67 (WEB) to 1. It also sets the STATE_HELPLESS flag.
        Both parameters should be 0 (zero).
        It cannot be removed by any of the stun/held removal opcodes.
    - name: OPCODE_wild_magic
      detail: int OPCODE_wild_magic = 280
      doc: |-
        [Spell Effect: Wild Magic](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op280)
        Applies the wild magic effect to the targeted creature(s).
        This effect causes other spells to be subject to wild magic throws.
        Known values for `Type` are:
        - 1 ⟶ Affect next spell cast
        - 2 ⟶ Affect all spells cast for effect duration
        Can only force Wild Surges on spells that are normally valid for them.
        In particular, it doesn't work for `SPL`s whose [BIT14](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Flags_BIT14) is set to `1`, subspells, as well as certain script actions – mostly the "instant-cast" ones.
        Maintains [FORCESURGE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#153) to `Type`.
    - name: OPCODE_wild_magic_2
      detail: int OPCODE_wild_magic_2 = 281
      doc: |-
        [Stat: Wild Magic](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op281)
        This effect will alter the wild-surge roll, making the resultant effect either more or less beneficial.
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Chance = Chance + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Chance = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Chance = (Chance * 'Statistic Modifier' value) / 100`
        At least in EEs, the final value is added to the inherint level-based bonus of the Wild Mage.
    - name: OPCODE_wing_buffet
      detail: int OPCODE_wing_buffet = 235
      doc: |-
        [Spell Effect: Wing Buffet](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op235)
        Applies the wing buffet effect centred on the casting creature(s), buffeting the targeted creature(s) at the speed specified by the `Speed` field, in the direction specified by the `Direction` field. `Speed` ranges from `0` to `255`.
        Known values for `Direction` are:
        - 0/1 ⟶ Away from the destination point (specified in EFF file)
        - 2 ⟶ Away from the source
        - 3 ⟶ Towards the destination point (specified in EFF file)
        - 4 ⟶ Towards source
        The following animations are hardcoded to be immune to this effect:
        - `TANARRI`
        - `DRAGON_RED`
        - `DRAGON_BLACK`
        - `DRAGON_SILVER`
        - `DRAGON_GREEN`
        - `DRAGON_AQUA`
        - `DRAGON_BLUE`
        - `DRAGON_BROWN`
        - `DRAGON_MULTICOLOR`
        - `DRAGON_PURPLE`
        - `DEMOGORGON`
        - `ELEMENTAL_EARTH`
        - `SHAMBLING_MOUND`
        - `ELEMENTAL_FIRE`
        - `ELEMENTAL_FIRE_PURPLE`
        - `BURNING_MAN`
        - `ELEMENTAL_AIR`
        - `RAVER`
        - `SLAYER`
        - `SOLAR`
        - `DEVA_MONADIC`
        - `MELISSAN`
        - `GIANT_FIRE`
        - `GIANT_YAGA-SHURA`
        - `GOLEM_ICE`
        The opcode also has this weird block:
        		if (this->m_sourceRes.startsWith("SP")) {
        		this->m_effectAmount = (100 - pSprite->m_derivedStats.m_nResistMagic) / 100 * (float)this->m_effectAmount;
        		if (this->m_effectAmount == 0) {
        			return 0; // Terminate
        		}
        	}
        It's attempting to dampen the knockback speed with the target's `magic resistance`, but it fails at casting the first division to a float.
         If the `SPL` resref starts with `SP` (see for instance `"spin695.spl"` — Wing Buffet) any positive `magic resistance` will make the `Speed` parameter `0`, causing the opcode to immediately terminate.
         Having said that, you can bypass this issue by having the `SPL` file starting with `SP` apply a secondary `SPL` file (for instance via [opcode #146](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op146)), and then by having the secondary `SPL` file apply [opcode #235](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op235). Just make sure the secondary `SPL` resref does not start with `SP`.
        If used on creatures with the "pass-wall" effect applied, creatures can cross points marked as light obstacles on the search map.
        In EEs, this effect can push creatures through closed (and locked) doors (this does not require the "pass-wall" effect).
        `Direction` options `1` and `3` "can" be overriden in external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) files, but default to the ability target/location.
    - name: OPCODE_wisdom_mod
      detail: int OPCODE_wisdom_mod = 49
      doc: |-
        [Stat: Wisdom Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op49)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Wisdom = Wisdom + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Wisdom = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Wisdom = (Wisdom * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [WIS](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#39).
        All games but EEs:
        - With a Timing Modes of Permanent or Delayed, if `Type` is `0` and `Statistic Modifier` is positive, the statistic will alter and remain shown in white text, and a message 'Wisdom raised permanently' will be shown.
        - With a Timing Modes of Permanent or Delayed, if `Type` is `1` or `2`, or `Statistic Modifier` is negative, the statistic will alter and remain shown in white text, though no message is shown.
        - With all other Timing Modes, the statistic will alter and be shown in red text.
        On EEs:
        - There's no feedback message about stat being raised permanently in the EE's – it must be done separately with [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139).
        - The opcode itself provides no coloring anymore (it's been externalized through "UI.menu")
          - An effective value > base value ⟶ green.
          - An effective value < base value ⟶ red.
          - An effective value = base value ⟶ white/default.
        With `Timing Mode`s `1/4/7`, the creature's base [`Wisdom`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x23B) is altered, leaving behind no removable effect.
        Final values are capped to the bound range `(0,25)` in game (`40` in IWD2).
    - name: OPCODE_wizard_spell_slots_mod
      detail: int OPCODE_wizard_spell_slots_mod = 42
      doc: |-
        [Spell: Wizard Spell Slots Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op42)
        Alters the number of wizard spell slots available to the targeted creature(s), as specified by the `Slot Amount Modifier` field, at the level specified by the `Spell Level` field. Wizard spells are used by Bards, Sorcerers and Wizards in IWD2.
        Known values for `Spell Level` are:
        - 0 ⟶ Double spells
          - The amount of spell slots is doubled for the level specified by the `Slot Amount Modifier` value and all levels below
        - BIT0 ⟶ Level 1
        - BIT1 ⟶ Level 2
        - BIT2 ⟶ Level 3
        - BIT3 ⟶ Level 4
        - BIT4 ⟶ Level 5
        - BIT5 ⟶ Level 6
        - BIT6 ⟶ Level 7
        - BIT7 ⟶ Level 8
        - BIT8 ⟶ Level 9
        The target creature(s) must have at least 1 slot at the selected level to have their slot count changed.
        Negative slots start at `65535 (-1)`, and go from there. Even though the spellbook has room to display only 12 slots at once, the slots are still there and usable.
        `Slot Amount Modifier` can be positive or negative.
        - If the number of current spell slots is 1:
          - applying a `-1` modifier will result in zero current slots and prevent further applications of this opcode from altering spell slots (until this effect terminates or is removed, or the base amount changes).
          - applying a `-2` modifier instead would bypass zero and result in `65535 (-1)`. Then applying a `+1` modifier would result in zero current slots and a repeat of the above.
        - Regardless of whether the value can be altered, the effect is still attached to the creature, rather than being discarded entirely. They can still take effect should the creature's base spell slots be altered (such as from leveling up).
        - Applying multiple effects in increments of `-1` will insure that spell slots do not go below zero (and thus will not wrap around to maximum).
