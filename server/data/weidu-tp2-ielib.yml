    - name: OPCODE_play_damage_animation
      detail: int OPCODE_play_damage_animation = 170
      doc: |-
        [Graphics: Play Damage Animation](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op170)
        Plays the damage animation specified by the `Animation` field.
        It just plays a visual effect, like a far more limited version of [opcode #215](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op215), and is always instantaneous.
        Known values for `Animation` are:
        - 0 ⟶ Blood (behind)
          - (EEs) Doesn't display any animation.
        - 1 ⟶ `"BLOODS.BAM"` Blood (small)
        - 2 ⟶ `"BLOODM.BAM"` Blood (medium)
        - 3 ⟶ `"BLOODL.BAM"` Blood (large)
        - 4 ⟶ `"SPFIRIMP.BAM"` Fire 1
        - 5 ⟶ `"SPFIRIMP.BAM"` Fire 2
        - 6 ⟶ `"SPFIRIMP.BAM"` Fire 2
        - 7 ⟶ `"SPSHKIMP.BAM"` Electricity 1
        - 8 ⟶ `"SPSHKIMP.BAM"` Electricity 2
        - 9 ⟶ `"SPSHKIMP.BAM"` Electricity 3
        On EE games:
        - For `Animation=4/5/6` and `Animation=7/8/9`, this opcode actually pulls the animation from [DMGTYPES.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/dmgtypes.htm), each playing both `ANIMATION1` (those listed above) and `ANIMATION2`, for `FIRE` and `ELECTRICITY`, respectively. Does not play the `SOUND` associated with them though.
          - `ANIMATION1` is the initial animation, `ANIMATION2` is the lingering animation.
        - BGEE/BG2EE use the default `*` (hardcoded) entries for all damage types, but they can be overridden by setting entries in [DMGTYPES.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/dmgtypes.htm), as IWDEE does.
        - The animations for `Animation=1/2/3` are not pulled from [DMGTYPES.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/dmgtypes.htm), they're most likely fully hardcoded.
