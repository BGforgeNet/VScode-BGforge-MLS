    - name: OPCODE_immunity_to_turn_undead
      detail: int OPCODE_immunity_to_turn_undead = 297
      doc: |-
        [Spell Effect: Immunity to Turn Undead](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op297)
        Makes the targeted creature(s) immune to the Turn Undead effect.
        The effect modifies [IMMUNE_TO_TURN_UNDEAD](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#187) to `Stat Value`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_imprisonment
      detail: int OPCODE_imprisonment = 211
      doc: |-
        [Spell Effect: Imprisonment](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op211)
        Applies the imprisonment effect to the targeted creature(s).
        The field at `0xcc` can be used to prevent death related effects (e.g. removal from party) running on the targetted creature(s) – not verified on EE games (it is very likely that this was replaced by giving [Maze](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op213) a specified `duration` option).
        Aside from kicking from the party, or granting experience for a kill, the targeted creature(s) is suspended from the area:
        - They can not be targeted by [Area-Effect](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/pro_v1.htm#0x8_3) projectiles, only with effect targets `Party` or `Everyone` or similar.
        - They are not detectable by any script triggers, though they may still be targeted with actions directly by scriptname or partyslot.
        - Excluding Opcodes [#211](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op211)/[#212](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op212)/[#213](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op213):
          - All other effects on the creature are suppressed until this effect is removed.
        - Excluding [opcode #212](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op212):
          - Delayed effects that would trigger will be further delayed until this effect is removed.
          - Effects that would expire will not expire until this effect is removed.
    - name: OPCODE_infravision
      detail: int OPCODE_infravision = 63
      doc: |-
        [State: Infravision](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op63)
        Gives the targeted creature(s) infravision and sets [STATE_INFRAVISION](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT17).
        Both parameters should be `0` (zero).
        [STATE_INFRAVISION](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT17) specs:
        While a creature with Infravision is currently selected,
        - all visible creatures with `body heat` that are currently in a "shadowed" part of the area receive a "warm" (red-shifted) overlay
        - `body heat` is determined by a creature's animation (`INI` file) using `detected_by_infravision=1`, or by [opcode #342](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op342) (`p1=1` & `p2=1`)
        - "shadowed" is determined by each area's Light Map `"AR####LM.BMP"`
          - Some areas have a separate Light Map for "nighttime" hours, `"AR####LN.BMP"`
    - name: OPCODE_intelligence_mod
      detail: int OPCODE_intelligence_mod = 19
      doc: |-
        [Stat: Intelligence Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op19)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Intelligence = Intelligence + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Intelligence = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Intelligence = (Intelligence * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [INT](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#38).
        All games but EEs:
        - With a Timing Modes of Permanent or Delayed, if `Type` is `0` and `Statistic Modifier` is positive, the statistic will alter and remain shown in white text, and a message 'Intelligence raised permanently' will be shown.
        - With a Timing Modes of Permanent or Delayed, if `Type` is `1` or `2`, or `Statistic Modifier` is negative, the statistic will alter and remain shown in white text, though no message is shown.
        - With all other Timing Modes, the statistic will alter and be shown in red text.
        On EEs:
        - There's no feedback message about stat being raised permanently in the EE's – it must be done separately with [opcode #139](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op139).
        - The opcode itself provides no coloring anymore (it's been externalized through "UI.menu")
          - An effective value > base value ⟶ green.
          - An effective value < base value ⟶ red.
          - An effective value = base value ⟶ white/default.
        With `Timing Mode`s `1/4/7`, the creature's base [`Intelligence`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x23A) is altered, leaving behind no removable effect.
        Final values are capped to the bound range `(0,25)` in game (`40` in IWD2).
    - name: OPCODE_invisibility
      detail: int OPCODE_invisibility = 20
      doc: |-
        [State: Invisibility](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op20)
        Applies the invisibility effect, in the style specified by the `Type` value.
        Known values for `Type` are:
        - 0 ⟶ Normal Invisibility
          - Grants a `+4` bonus to melee attacks only.
          - Applying `Normal` Invisibility with `Timing Mode`s other than `1/4/7` in an external [EFF](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm) through [opcode #183](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op183) will NOT terminate early due to hostile/aggressive action (similar to the constant invisibility provided by Mislead). Applying the same through [opcode #177](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op177) or [opcode #283](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op283) DOES terminate due to hostile/aggressive action as normal.
          - Applying `Normal` Invisibility with `Timing Mode`s `1/4/7` will set the creature's base state [`STATE_INVISIBLE`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT4), while still leaving behind a removable (but irrelevant) effect. This state is not cleared on death, but it is still terminated by any hostile/aggressive action that would normally terminate invisibility.
        - 1 ⟶ Improved Invisibility
          - Affected creature stays invisible after attack.
          - Does not provide saving throw bonuses outside EEs, where it provides a bonus of `4` to all.
          - Lingers after the duration is spent and act as permanent if used as a 'While Equipped' effect.
          - Applying `Improved` Invisibility will cause the effect to be duplicated, with the duplicate using `Normal` invisibility. There's no reason to apply both `Normal` and `Improved` invisibility in the same spell/item (unless you want them to have different probabilities/hd limits).
          - Applying `Improved` Invisibility with `Timing Mode`s `1/4/7` will set the creature's base state [`STATE_IMPROVEDINVISIBILITY`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT22), and because it duplicates itself as `Normal` invisibility, [`STATE_INVISIBLE`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT4) as well, while still leaving behind a removable (but irrelevant) effect for each. These states are not cleared on death.
          - The effects that remain when setting the base `STATE`s are irrelevant, at least in-game, because everything that can remove the `STATE`s will also remove the effect. The `STATE`s can however be removed separately through NI or EEkeeper, at which point the effect will once again reapply its `STATE` immediately upon loading the game.
        - 2 ⟶ Weak Invisibility (EE only)
          - It's the same type of invisibility as `Improved` Invisibility after you take a hostile action and reveal yourself.
          - Applying "Weak" Invisibility with `Timing Mode`s `1/4/7` will function no differently than `Timing Mode 0`, aside from having no natural expiration timer.
          - Applying "Weak" Invisibility is otherwise the same as `Improved` Invisibility, except it doesn't duplicate itself with a `Normal` version, which is why it doesn't quality for backstabs.
        Any attack a character makes while invisible will ignore the target's AC dexterity bonus (see [`dexmod.2da`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/dexmod.htm))
        To be exact, the attack must follow these rules:
        - Attacker must have a backstab multiplier of `2` or higher (see [`backstab.2da`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/backstab.htm))
        - Attacker must be [`STATE_INVISIBLE`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x20_BIT4)
        - Attacker's weapon must not be [`RANGED`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_2)
        [`Class`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x273) / [`Kit`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x244) doesn't matter, [`sneakatt.2da`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/sneakatt.htm) doesn't matter (even though the backstab multiplier isn't used to calculate damage under "Game Option: 3E Sneak Attack", the creature still has its multiplier calculated / assigned), weapon backstab suitability doesn't matter.
        	In the following example:
        - Attacking character `THAC0 = 17`
        - Attacked character `AC = 0`, (dexterity contributing `-4` bonus)
        	The thief's attack only requires a total roll of `13` to hit, even though a roll of `17` is required normally:
        			Your browser does not support the video tag.
        	**However, this mechanic isn't implemented properly...**
        	If the attacked character has a penalty to AC due to dexterity, they will be harder to hit while being attacked under the above conditions.
        	In the following example:
        - Attacking character `THAC0 = 17`
        - Attacked character `AC = 9`, (dexterity contributing `+5` penalty)
        	The thief's attack should only require a total roll of `8` to hit, though a roll of `13` is now required:
        			Your browser does not support the video tag.
        The "Stealth" modal ability of Thieves/Rangers/Monks applies this effect with the following values:
        - `Parameter1 = 1` (unknown if any purpose)
        - `Parameter2 = 0`
        - `Duration = 20`
        Creatures attacking an invisible creature suffer a `-4` penalty to hit, unless they are affected by [opcode #193](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op193). Moreover, you cannot target an `improved`/`weak` invisible creature with spells unless you're affected by [opcode #193](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op193) or the spell [can target invisible creatures](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#Header_Flags_BIT24).
        This opcode itself just sets or maintains (with a duration) the relevant STATEs. Everything else is a feature of [STATE_INVISIBLE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT4) and/or [STATE_IMPROVEDINVISIBILITY](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT22).
    - name: OPCODE_invisible_detection_by_script
      detail: int OPCODE_invisible_detection_by_script = 193
      doc: |-
        [Spell Effect: Invisible Detection by Script](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op193)
        Allows invisible creatures to be attacked (via scripts) and makes it possible to target improved invisible creatures with spells.
        The effect modifies [SEEINVISIBLE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#81) to `Stat Value`.
        The `Stat Value` parameter can take any value. If you set it to `0`, you will disable the effect (for its duration).
    - name: OPCODE_learn_spell
      detail: int OPCODE_learn_spell = 147
      doc: |-
        [Spell: Learn Spell](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op147)
        The targeted creature(s) tries to learn the spell specified by the `resource` key.
        Learning is successful when `1D100 <= the INT-dependent LEARN_SPELL value` in [INTMOD.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/intmod.htm).
        The `LEARN_SPELL` value is modified for mage specialists, with `+15` for same school spells, and `-15` for non-same school spells.
        - [`Wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1) spell type uses [INTMOD.2DA](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/intmod.htm). Other [`Spell type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C)s automatically succeed, but report failure.
        - [`Wizard`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_1) spell type can be [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x34) `1–9` if learned.
        - [`Priest`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C_2) spell type can be [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x34) `1–7` if learned.
        - Other [`Spell type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x1C)s can be [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Header_0x34) `1–32767` if learned.
    - name: OPCODE_level_change
      detail: int OPCODE_level_change = 96
      doc: |-
        [Stat: Level Change](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op96)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Level = Level + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Level = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Level = (Level * 'Statistic Modifier' value) / 100`
        In IWD2 the class to receive the change is specified at 0x2C
        `Timing Mode`s `1/4/7` permanently alter the creature's [`level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x234), leaving no removable effect.
        Can only modify the [`first class level`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x234), it cannot modify [`second`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x235) or [`third`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x236) class levels.
    - name: OPCODE_level_drain
      detail: int OPCODE_level_drain = 216
      doc: |-
        [Spell Effect: Level Drain](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op216)
        Drains levels from the targeted creature(s) as specified by the 'Amount' field. 'Amount' can be positive or negative, negative values will alter level and spellbook slots, but not experience.
        Param3 is used internally to store recalculated max hp.
        Param4 is used internally to store recalculated max xp.
        This effect sets stat #200 (LEVELDRAIN) to param #1.
    - name: OPCODE_lighting_effects
      detail: int OPCODE_lighting_effects = 141
      doc: |-
        [Graphics: Lighting Effects](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op141)
        Shows the lighting effect (a .bam file) specified by the 'Type' value at the location specified by 'Target'. These effects are usually used for spell hits based on the spell school.
        Known values for 'Target' are:
        0      Current Location
        Non-0  Target Location
        Known values for 'Type' are:
        0   aqua SHAIR
        1   aqua SHEARTH
        2   aqua SHWATER
        3   *crash*
        4   blue SHAIR
        5   blue SHEARTH
        6   blue SHWATER
        7   *crash*
        8   gold SHAIR
        9   gold SHEARTH
        10  gold SHWATER
        11  *crash*
        12  green SHAIR
        13  green SHEARTH
        14  green SHWATER
        15  *crash*
        16  magenta SHAIR
        17  magenta SHEARTH
        18  magenta SHWATER
        19  *crash*
        20  purple SHAIR
        21  purple SHEARTH
        22  purple SHWATER
        23  *crash*
        24  red SHAIR
        25  red SHEARTH
        26  red SHWATER
        27  *crash*
        28  white SHAIR
        29  white SHEARTH
        30  white SHWATER
        31  *crash*
        32  red MUSHROOM
        33  grey MUSHROOM
        34  green MUSHROOM
        35  red PILLAR
        36  white PILLAR
        37  white SWIRL
        38  Shadow Door (SPDIMDR) (BGs)
        39  Finger of Death (SPFDEATH) (BG2)
        40+ *crash* (BG2)
    - name: OPCODE_lore_mod
      detail: int OPCODE_lore_mod = 21
      doc: |-
        [Stat: Lore Modifier](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op21)
        Applies the modifier value specified by the `Statistic Modifier` field in the style specified by the `Type` field.
        Known values for `Type` are:
        - 0 ⟶ Cumulative Modifier: `Lore = Lore + 'Statistic Modifier' value`
        - 1 ⟶ Flat Value Modifier: `Lore = 'Statistic Modifier' value`
        - 2 ⟶ Percentage Modifier: `Lore = (Lore * 'Statistic Modifier' value) / 100`
        `Statistic Modifier` can be positive or negative.
        The effect modifies [LORE](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#25).
        This effect does not work with `Timing Mode 1`.
    - name: OPCODE_luck_non_cumulative
      detail: int OPCODE_luck_non_cumulative = 133
      doc: |-
        [Spell Effect: Luck Non-Cumulative](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op133)
        Applies the luck effect to the targeted creature(s).
        This opcode has the same effects as [opcode #22](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op22), but maintains its own separate [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT26).
        This opcode modifies [LUCK](https://gibberlings3.github.io/iesdp/files/ids/bgee/stats.htm#32).
        - While this opcode is "Non-Cumulative" (it sets values rather than increment), what it really does is stack in reverse standard order.
        - The base [STATE](https://gibberlings3.github.io/iesdp/files/ids/bgee/state.htm#BIT26) set on the [CRE](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm) file will override any effect applied to them (defaulting to a value of zero).
        - The oldest equipped effect will override newer equipped effects, and any equipped effect will override a non-equipped effect.
        - The oldest non-equipped effect will override newer non-equipped effects.
        `Statistic Modifier` only reads the first byte for its value, the last 3 bytes are ignored.
