iesdp_resref:
  type: 21
  items:
    - name: EFF2_parent_resource
      detail: resref offset EFF2_parent_resource = 0x94
      doc: |-
        **[Parent resource](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x94)**
        This specific field always needs to be in **ALLCAPS**.
        Be careful checking it in [Near Infinity](https://github.com/Argent77/NearInfinity), it displays `resource` fields in ALLCAPS regardless of the actual characters. However, it also always saves those fields in ALLCAPS as well.
        - [Global/Casting effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm#splv1_Feature_Block) on [`SPL`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm) files have an empty/blank [`Parent resource`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x94) field, allowing them to safely ignore [opcode #206](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op206)/[opcode #318](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op318)/[opcode #324](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op324), as such effects are designed to affect the caster (or the global environment) even when the [`SPL`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/spl_v1.htm) fails.
        - When attaching passive kit bonuses (labeled as `AP_XXXXXXXX` in [`CLAB`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/clabxx00.htm) files) to joinable CRE files as [V2 Effects](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x33_1), this field should be set to the SPL applying such bonuses.
          - In so doing, such bonuses will not be applied a second time (due to [`CLAB`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/clabxx00.htm) processing) when those creatures join the Party.
          - So for instance, when applying +10％ [Crushing Resistance](https://gibberlings3.github.io/iesdp/opcodes/bgee.htm#op87) to a CRE file whose [`Kit`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/cre_v1.htm#CREV1_0_Header_0x244) is `BARBARIAN`, set this field to `"SPCL153"`.
    - name: EFF2_resource
      detail: resref offset EFF2_resource = 0x30
      doc: "**[Resource](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_Resource)**"
    - name: EFF2_resource2
      detail: resref offset EFF2_resource2 = 0x70
      doc: "**[Resource 2](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/eff_v2.htm#effv2_Body_0x70)** ([VVC](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/vvc_v1.htm) in many effects)"
    - name: EFF2_resource3
