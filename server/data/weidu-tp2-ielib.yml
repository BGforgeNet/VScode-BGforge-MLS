    - name: ITM_HEAD_projectile_type
      detail: byte offset ITM_HEAD_projectile_type = 0x10
      doc: |-
        **[Launcher required](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x10)**
        - 0 ⟶ None
        - 1 ⟶ **[Bow](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x10_1)**
          - Any [`Ranged`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_2) ability with this field set to this value will require a weapon with the corresponding [`ITEMCAT.IDS`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm#15) (Item category) in one of the [`mainhand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#35) weapon slots (not [`off-hand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#9), [`fist`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#10), or [`magical weapon`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34) slot).
        - 2 ⟶ **[Crossbow](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x10_2)**
          - Any [`Ranged`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_2) ability with this field set to this value will require a weapon with the corresponding [`ITEMCAT.IDS`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm#27) (Item category) in one of the [`mainhand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#35) weapon slots (not [`off-hand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#9), [`fist`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#10), or [`magical weapon`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34) slot).
        - 3 ⟶ **[Sling](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x10_3)**
          - Any [`Ranged`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_2) ability with this field set to this value will require a weapon with the corresponding [`ITEMCAT.IDS`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm#18) (Item category) in one of the [`mainhand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#35) weapon slots (not [`off-hand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#9), [`fist`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#10), or [`magical weapon`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34) slot).
        - 40 ⟶ Spear
        - 100 ⟶ Throwing Axe
        In particular:
        - It ONLY checks items for [`BOW`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm#15) / [`XBOW`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm#27) / [`SLING`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm#18) and will always use that item's first ability header – it doesn't matter what that ability's [`Type`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0) is ([`Melee`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_1)/[`Ranged`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_2)/[`Magical`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_3)/[`Launcher`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#itmv1_Extended_Header_0x0_4)).
          - This also means that you can't make an Arrow that requires being shot out of a Sword.
        - [`ITEMCAT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm) is offset [`0x1C`](https://gibberlings3.github.io/iesdp/file_formats/ie_formats/itm_v1.htm#Header_ItemType) of the ITM file (which is also linked to [`ITEMTYPE.2DA`](https://gibberlings3.github.io/iesdp/files/2da/2da_bgee/itemtype.htm)).
        - Only the [`Mainhand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#35), [`Ammo`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#11), and [`Magical Weapon`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#34) slots can utilize launchers. The [`off-hand`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#9) ignores this field, while the [`fist`](https://gibberlings3.github.io/iesdp/files/ids/bgee/slots.htm#10) slot uses it (only to crash).
        - Weapons of any [`ITEMCAT`](https://gibberlings3.github.io/iesdp/files/ids/bgee/itemcat.htm) can use this field, as long as it is equipped in one of the proper slots.
          - This also means that you can make a Sword that requires being shot out of a Bow.
        - Bows, Crossbows, and Slings with multiple abilities can even use themselves as their required launcher.
