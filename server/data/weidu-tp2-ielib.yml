        - 1 ⟶ ABJURATION
        - 2 ⟶ CONJURATION
        - 3 ⟶ DIVINATION
        - 4 ⟶ ENCHANTMENT
        - 5 ⟶ ILLUSION
        - 6 ⟶ EVOCATION
        - 7 ⟶ NECROMANCY
        - 8 ⟶ ALTERATION
