$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: BGforge MLS docstring
scopeName: source.bgforge-mls-docstring
patterns:
  - include: "#param"
  - include: "#ret"
  - include: "#typeTag"
  - include: "#deprecated"
  - include: "#comment"
repository:
  # Known JSDoc type alternation, used in brace-less patterns for disambiguation.
  # SYNC: server/src/shared/jsdoc-types.ts (canonical list, validated by type-sync.test.ts)
  # All types: array, any, bool, filename, float, ids, int, list, map, mixed, ObjectPtr, resref, string

  param:
    patterns:
      # @param {type} name - description
      # @param {type} name! - description (required)
      - match: '(@arg|@param)(\s+\{(\w+)\})\s+((\w+)(!)?)'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: comment.bgforge-mls-docstring
            patterns:
              - include: '#type'
          '4':
            name: variable.bgforge-mls-docstring
          '6':
            name: invalid
      # @param {type} [name=default] - description
      - match: '(@arg|@param)(\s+\{(\w+)\})\s+(\[(\w+)=([^\]]+)\])'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: comment.bgforge-mls-docstring
            patterns:
              - include: '#type'
          '4':
            name: keyword.bgforge-mls-docstring
          '5':
            name: variable.bgforge-mls-docstring
          '6':
            name: variable.bgforge-mls-docstring
      # @param {type} (no name, type only with braces)
      - match: '(@arg|@param)(\s+\{(\w+)\})'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: comment.bgforge-mls-docstring
            patterns:
              - include: '#type'
      # @param type name (without braces, type must be a known JSDoc type)
      - match: '(@arg|@param)\s+(array|any|bool|filename|float|ids|int|list|map|mixed|ObjectPtr|resref|string)\s+(\w+)(!)?'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: support.type.bgforge-mls-docstring
          '3':
            name: variable.bgforge-mls-docstring
          '4':
            name: invalid
      # @param type (without braces, no name, type must be a known JSDoc type)
      - match: '(@arg|@param)\s+(array|any|bool|filename|float|ids|int|list|map|mixed|ObjectPtr|resref|string)\b'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: support.type.bgforge-mls-docstring
      # Bare @arg/@param (fallback, no type or name)
      - match: '(@arg|@param)\b'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring

  ret:
    patterns:
      # @ret {type} name - description (named return, type before name, braced)
      - match: '(@ret|@return|@returns)(\s+\{(\w+)\})\s+((\w+))'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: comment.bgforge-mls-docstring
            patterns:
              - include: '#type'
          '5':
            name: variable.bgforge-mls-docstring
      # @ret {type} description (unnamed return, no name after type)
      - match: '(@ret|@return|@returns)(\s+\{(\w+)\})'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: comment.bgforge-mls-docstring
            patterns:
              - include: '#type'
      # @ret type name description (named return, type before name, braceless, type must be known)
      - match: '(@ret|@return|@returns)\s+(array|any|bool|filename|float|ids|int|list|map|mixed|ObjectPtr|resref|string)\s+(\w+)'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: support.type.bgforge-mls-docstring
          '3':
            name: variable.bgforge-mls-docstring
      # @ret type description (unnamed, without braces, type must be known)
      - match: '(@ret|@return|@returns)\s+(array|any|bool|filename|float|ids|int|list|map|mixed|ObjectPtr|resref|string)\b'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: support.type.bgforge-mls-docstring
      # Bare @ret (fallback, no type or name)
      - match: '(@ret|@return|@returns)\b'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring

  deprecated:
    patterns:
      - match: '(@deprecated)'
        name: support.function.bgforge-mls-docstring

  typeTag:
    patterns:
      - match: '(@type)(\s+{?(\w+)}?)?'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: support.type.bgforge-mls-docstring

  type:
    patterns:
      # All JSDoc types (Fallout + WeiDU + custom)
      # SYNC: server/src/shared/jsdoc-types.ts (canonical list, validated by type-sync.test.ts)
      - match: \b(array|any|bool|filename|float|ids|int|list|map|mixed|ObjectPtr|resref|string)\b
        name: support.type.bgforge-mls-docstring

  comment:
    patterns:
      - match: .
        name: comment.bgforge-mls-docstring
