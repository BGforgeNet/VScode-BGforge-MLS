$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: BGforge MLS docstring
scopeName: source.bgforge-mls-docstring
patterns:
  - include: "#arg"
  - include: "#typeTag"
  - include: "#deprecated"
  - include: "#comment"
repository:
  arg:
    patterns:
      - match: '(@arg|@param|@ret)(\s+{(\w+)})?((\s+(\w+)(!)?)|(\s+\[(\w+)=(.+)\]))?'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: comment.bgforge-mls-docstring
            patterns:
              - include: '#type'
          '4':
            name: variable.bgforge-mls-docstring
          '7':
            name: invalid
          '8':
            name: keyword.bgforge-mls-docstring
          '9':
            name: variable.bgforge-mls-docstring
          '10':
            name: variable.bgforge-mls-docstring

  deprecated:
    patterns:
      - match: '(@deprecated)'
        name: support.function.bgforge-mls-docstring

  typeTag:
    patterns:
      - match: '(@type)(\s+{?(\w+)}?)?'
        captures:
          '1':
            name: support.function.bgforge-mls-docstring
          '2':
            name: keyword.bgforge-mls-docstring
          '3':
            name: support.type.bgforge-mls-docstring

  type:
    patterns:
      # fallout types
      # SYNC: also in syntaxes/fallout-ssl-tooltip.tmLanguage.yml
      - match: \b(array|any|bool|int|mixed|float|ObjPtr|ObjectPtr|string)\b
        name: support.type.bgforge-mls-docstring
      # weidu types
      # SYNC: also in server/src/shared/weidu-types.ts (WEIDU_JSDOC_TYPES)
      # SYNC: also in syntaxes/weidu-tp2-tooltip.tmLanguage.yml (datatypes)
      - match: \b(ids|resref|filename)\b
        name: support.type.bgforge-mls-docstring
      # custom (not language-specific)
      # SYNC: also in server/src/shared/weidu-types.ts (WEIDU_JSDOC_TYPES)
      - match: \b(list|map)\b
        name: support.type.bgforge-mls-docstring

  comment:
    patterns:
      - match: .
        name: comment.bgforge-mls-docstring
