$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: Fallout Star-Trek Scripting Language tooltip
scopeName: source.fallout-ssl-tooltip
patterns:
  - include: "#full"
repository:
  full:
    name: meta.fallout-ssl-tooltip
    patterns:
      # Type + name at line start: "int game_time", "macro restock_fix(obj)", "void display_msg(string msg)"
      # SYNC: JSDoc subset in syntaxes/bgforge-mls-docstring.tmLanguage.yml (fallout types)
      - captures:
          "1":
            name: storage.type.fallout-ssl-tooltip
          "2":
            name: entity.name.function
        match: ^\b(?i)(array|any|bool|int|list|map|macro|mixed|float|ObjPtr|ObjectPtr|proc|string|void)\b[[:blank:]]+\b(\w+)\b
      # Standalone type in parameter lists: the "int" in "void foo(int x)", the "string" in "(string msg)"
      - captures:
          "1":
            name: storage.type.fallout-ssl-tooltip
        match: \b(?i)(array|any|bool|int|list|map|mixed|float|ObjPtr|ObjectPtr|proc|string|uint|void)\b
      # Fallback: delegate to main grammar for keywords (procedure, variable), identifiers, etc.
      - include: source.fallout-ssl
        match: .
