  function-declaration:
    patterns:
      - captures:
          '1':
            name: support.type.fallout-ssl.procedure
          '2':
            name: entity.name.function.fallout-ssl
          '3':
            patterns:
              - include: '#variable'
          '4':
            name: keyword.control.fallout-ssl
        match: \b(?i)(procedure)\b[[:blank:]]+(\w+)(\(.+\))?[[:blank:]]*(;)
  function-definition:
    patterns:
      - captures:
          '1':
            name: support.type.fallout-ssl.procedure
          '2':
            name: entity.name.function.fallout-ssl
          '3':
            patterns:
              - include: '#variable'
        match: \b(?i)(procedure)\b[[:blank:]]+(\w+)(\(.+\))?\b
  function-invocation:
    patterns:
      - match: \b(?i)(call)\b[[:blank:]]+(\w+)[[:blank:]]*(\(.*\))??(;)
        captures:
          '1':
            name: keyword.control.fallout-ssl
          '2':
            name: entity.name.function.fallout-ssl
          '3':
            patterns:
              - include: $self
          '4':
            name: keyword.control.fallout-ssl

      - include: '#fallout-base-functions'
      - include: '#sfall-functions'

      # General function call pattern (for expressions, not just statements)
      # Keywords are excluded by pattern priority (matched first in root patterns)
      - match: \b(\w+)\s*(?=\()
        name: entity.name.function.fallout-ssl

      - match: (?i)[[:blank:]]+(\w+)[[:blank:]]*(\(.*\))(;)
        captures:
          '1':
            name: entity.name.function.fallout-ssl
            patterns:
              - include: '#fallout-base-functions'
              - include: '#sfall-functions'
          '2':
            patterns:
              - include: $self
          '3':
            name: keyword.control.fallout-ssl

  defines:
    patterns:
      - match: (?i)(\#(define|ifdef|ifndef|undef))[[:blank:]]+(\w+)
        captures:
          '1':
            name: keyword.control.fallout-ssl
          '3':
            patterns:
              - match: \b([A-Z][A-Z0-9]*(_[\w]+)?)\b
                name: constant.language.fallout-ssl
              - match: .
                name: entity.other.attribute-name.fallout-ssl
      - match: (?i)(\#(if|endif|elif|else))\b
        name: keyword.control.fallout-ssl
  keywords:
    patterns:
      - match: (\#include)
        name: keyword.control.import.fallout-ssl
      - include: '#operators'
      - include: '#keywords-core'
  keywords-core:
    name: keyword.control.core.fallout-ssl
    patterns:
      - match: \b(?i)(begin)\b
      - match: \b(?i)(break)\b
      - match: \b(?i)(call)\b
      - match: \b(?i)(callstart)\b
      - match: \b(?i)(cancel)\b
      - match: \b(?i)(cancelall)\b
      - match: \b(?i)(case)\b
      - match: \b(?i)(continue)\b
      - match: \b(?i)(critical)\b
      - match: \b(?i)(default)\b
      - match: \b(?i)(detach)\b
      - match: \b(?i)(do)\b
      - match: \b(?i)(else)\b
      - match: \b(?i)(end)\b
      - match: \b(?i)(endcritical)\b
      - match: \b(?i)(exec)\b
      - match: \b(?i)(exit)\b
      - match: \b(?i)(export)\b
      - match: \b(?i)(for)\b
      - match: \b(?i)(foreach)\b
      - match: \b(?i)(fork)\b
      - match: \b(?i)(if)\b
      - match: \b(?i)(import)\b
      - match: \b(?i)(in)\b
