      - match: \b(?i)(wait)\b
      - match: \b(?i)(when)\b
      - match: \b(?i)(while)\b
  operators:
    patterns:
      - match: (\b(?i)(and|or|not|band|bwor|bnot|bwxor|bwand)\b)
        name: keyword.control.fallout-ssl
      - match: (=|:|>|<|\+\+|\-|\+|;|!|%)
        name: keyword.control.fallout-ssl
      - match: floor
        name: invalid.deprecated.bgforge
