$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: Fallout Star-Trek Scripting Language
scopeName: source.fallout-ssl
patterns:
  - include: '#docstring'
  - include: '#comments'
  - include: '#keywords'
  - include: '#function-invocation'
  - include: '#variable'
  - include: '#strings'
  - include: '#function-declaration'
  - include: '#function-definition'
  - include: '#types'
  - include: '#constants'
  - include: '#numbers'
  - include: '#hooks'
  - include: '#header-constants'
  - include: '#header-aliases'
  - include: '#header-variables'
  - include: '#header-procedures'
  - include: '#header-defines-with-vars'
  - include: '#local-vars'
  - include: '#defines'
repository:
  docstring:
    begin: (/\*\*)
    end: (\*/)
    beginCaptures:
      '1':
        name: comment.block.fallout-ssl
    endCaptures:
      '1':
        name: comment.block.fallout-ssl
    patterns:
      - include: source.bgforge-mls-docstring
  comments:
    patterns:
      - match: (//).*
        name: comment.line.fallout-ssl
      - begin: /\*
        end: \*/
        name: comment.block.fallout-ssl
  local-vars:
    patterns:
      - match: \b(LVAR_\w+)\b
        name: variable.language.local.fallout-ssl
  constants:
    patterns:
      - match: \b(?i)(true|false)\b
        name: constant.language.fallout-ssl
      - match: \b([A-Z][A-Z0-9]*(_[\w]+)?)\b
        name: constant.language.fallout-ssl
