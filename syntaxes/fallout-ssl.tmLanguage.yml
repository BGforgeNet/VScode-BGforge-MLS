  function-declaration:
    patterns:
      - begin: \b(?i)(procedure)\b[[:blank:]]+(\w+)[[:blank:]]*(\()
        beginCaptures:
          '1':
            name: support.type.fallout-ssl.procedure
          '2':
            name: entity.name.function.fallout-ssl
        end: (\))
        patterns:
          - include: '#procedure-params'
      - captures:
          '1':
            name: support.type.fallout-ssl.procedure
          '2':
            name: entity.name.function.fallout-ssl
          '3':
            name: keyword.control.fallout-ssl
        match: \b(?i)(procedure)\b[[:blank:]]+(\w+)[[:blank:]]*(;)
  function-definition:
    patterns:
      - begin: \b(?i)(procedure)\b[[:blank:]]+(\w+)[[:blank:]]*(\()
        beginCaptures:
          '1':
            name: support.type.fallout-ssl.procedure
          '2':
            name: entity.name.function.fallout-ssl
        end: (\))
        patterns:
          - include: '#procedure-params'
      - captures:
          '1':
            name: support.type.fallout-ssl.procedure
          '2':
            name: entity.name.function.fallout-ssl
        match: \b(?i)(procedure)\b[[:blank:]]+(\w+)\b
  function-invocation:
    patterns:
      - match: \b(?i)(call)\b[[:blank:]]+(\w+)[[:blank:]]*(\(.*\))??(;)
        captures:
          '1':
            name: keyword.control.fallout-ssl
          '2':
            name: entity.name.function.fallout-ssl
          '3':
            patterns:
              - include: $self
          '4':
            name: keyword.control.fallout-ssl

      - include: '#fallout-base-functions'
      - include: '#sfall-functions'

      # Token-paste function call segments: animate_##type##_to_tile(...)
      # Matches identifier parts immediately before or after ## so they get function
      # coloring. The ## itself is colored by the keyword.control pattern in #keywords.
      #
      # Rationale for two separate patterns instead of a single begin/end rule:
      # A begin/end rule anchored on the first identifier before ## would need a safe
      # end condition. Using end: (?=\() would break non-call uses like a##b in a
      # constant macro body; using end: (?=[^\w#]) would be correct but fragile.
      # Two lookahead/lookbehind patterns are simpler, stateless, and compose cleanly
      # with the existing general function call pattern below.
      #
      # Known false positive: in #define PASTE(a,b) a##b, the parameter 'a' gets
      # entity.name.function coloring rather than variable.parameter. This is a minor
      # visual inaccuracy — acceptable because ## never appears outside macro bodies
      # in valid SSL code, comments and strings are protected by their own begin/end
      # scopes, and a stricter lookahead (\b\w+(?=(?:##\w+)+\()) would fix only the
      # function-call case while breaking bare a##b expressions.
      - match: \b\w+(?=##)
        name: entity.name.function.fallout-ssl
      - match: (?<=##)\w+
        name: entity.name.function.fallout-ssl

      # General function call pattern (for expressions, not just statements)
      # Keywords are excluded by pattern priority (matched first in root patterns)
      - match: \b(\w+)\s*(?=\()
        name: entity.name.function.fallout-ssl

      - match: (?i)[[:blank:]]+(\w+)[[:blank:]]*(\(.*\))(;)
        captures:
          '1':
            name: entity.name.function.fallout-ssl
            patterns:
              - include: '#fallout-base-functions'
              - include: '#sfall-functions'
          '2':
            patterns:
              - include: $self
          '3':
            name: keyword.control.fallout-ssl

  defines:
    patterns:
      - begin: (?i)(\#define)[[:blank:]]+(\w+)(\()
        beginCaptures:
          '1':
            name: keyword.control.fallout-ssl
          '2':
            name: entity.name.function.fallout-ssl.macro
        end: (\))
        patterns:
          - include: '#macro-params'
      - match: (?i)(\#(define|ifdef|ifndef|undef))[[:blank:]]+(\w+)
        captures:
          '1':
            name: keyword.control.fallout-ssl
          '3':
            patterns:
              - match: \b([A-Z][A-Z0-9]*(_[\w]+)?)\b
                name: constant.language.fallout-ssl
              - match: .
                name: entity.other.attribute-name.fallout-ssl
      - match: (?i)(\#(if|endif|elif|else))\b
        name: keyword.control.fallout-ssl
  keywords:
    patterns:
      - match: (\#include)
        name: keyword.control.import.fallout-ssl
      - match: '##'
        name: keyword.control.fallout-ssl
      - include: '#operators'
      - include: '#keywords-core'
  procedure-params:
    patterns:
      - match: \b(?i)(variable)\b[[:blank:]]+(\w+)\b
        captures:
          '1':
            name: keyword.control.fallout-ssl
          '2':
            name: variable.parameter.fallout-ssl
  macro-params:
    patterns:
      - match: \b([A-Za-z_]\w*)\b
        name: variable.parameter.fallout-ssl
  keywords-core:
    name: keyword.control.core.fallout-ssl
    patterns:
      - match: \b(?i)(begin)\b
      - match: \b(?i)(break)\b
      - match: \b(?i)(call)\b
      - match: \b(?i)(callstart)\b
      - match: \b(?i)(cancel)\b
      - match: \b(?i)(cancelall)\b
      - match: \b(?i)(case)\b
      - match: \b(?i)(continue)\b
      - match: \b(?i)(critical)\b
      - match: \b(?i)(default)\b
      - match: \b(?i)(detach)\b
      - match: \b(?i)(do)\b
      - match: \b(?i)(else)\b
      - match: \b(?i)(end)\b
      - match: \b(?i)(endcritical)\b
      - match: \b(?i)(exec)\b
      - match: \b(?i)(exit)\b
