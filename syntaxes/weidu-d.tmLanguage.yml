$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: WeiDU dialog
scopeName: source.weidu-d

patterns:
  - include: '#condition'
  - include: '#action'
  - include: '#comments'
  - include: '#condition-abbreviated'
  - include: '#d-action'
  - include: '#action-when'
  - include: '#chain-epilogue'
  - include: '#state'
  - include: '#transition'
  - include: '#transfeature'
  - include: '#transnext'
  - include: '#reference'
  - include: '#numbers'
  - include: '#strings'
  - include: '#vars' # D can be COMPILE EVAL
  - include: '#sugar-operators'
  - include: '#sugar'

repository:
  comments:
    patterns:
      - match: (//).*
        name: comment.line.weidu-d
      - begin: /\*
        end: \*/
        name: comment.block.weidu-d

  numbers:
    patterns:
      - match: \b(([0-9]+)|(0x[0-9a-fA-F]+))\b
        name: "constant.numeric.weidu-d"

  d-action:
    # Auto-generated from weidu-d-base.yml — do not edit manually.
    name: support.function.weidu-baf.action
    patterns:
      - match: \b(ADD_STATE_TRIGGER)\b
      - match: \b(ADD_TRANS_ACTION)\b
      - match: \b(ADD_TRANS_TRIGGER)\b
      - match: \b(ALTER_TRANS)\b
      - match: \b(APPEND)\b
      - match: \b(APPEND_EARLY)\b
      - match: \b(BEGIN)\b
      - match: \b(CHAIN)\b
      - match: \b(EXTEND_BOTTOM)\b
      - match: \b(EXTEND_TOP)\b
      - match: \b(INTERJECT)\b
      - match: \b(INTERJECT_COPY_TRANS)\b
      - match: \b(INTERJECT_COPY_TRANS2)\b
      - match: \b(INTERJECT_COPY_TRANS3)\b
      - match: \b(INTERJECT_COPY_TRANS4)\b
      - match: \b(REPLACE)\b
      - match: \b(REPLACE_ACTION_TEXT)\b
      - match: \b(REPLACE_ACTION_TEXT_PROCESS)\b
      - match: \b(REPLACE_ACTION_TEXT_PROCESS_REGEXP)\b
      - match: \b(REPLACE_ACTION_TEXT_REGEXP)\b
      - match: \b(REPLACE_SAY)\b
      - match: \b(REPLACE_STATE_TRIGGER)\b
      - match: \b(REPLACE_TRANS_ACTION)\b
      - match: \b(REPLACE_TRANS_TRIGGER)\b
      - match: \b(REPLACE_TRIGGER_TEXT)\b
      - match: \b(REPLACE_TRIGGER_TEXT_REGEXP)\b
      - match: \b(R_A_T_P_R)\b
      - match: \b(SET_WEIGHT)\b

  action-when:
    # Auto-generated from weidu-d-base.yml — do not edit manually.
    name: keyword.other.weidu-d
    patterns:
      - match: \b(IF)\b
      - match: \b(UNLESS)\b

  chain-epilogue:
    # Auto-generated from weidu-d-base.yml — do not edit manually.
    name: keyword.other.weidu-d
    patterns:
      - match: \b(COPY_TRANS)\b
      - match: \b(COPY_TRANS_LATE)\b

  state:
    name: keyword.other.weidu-d
    patterns:
      - match: \b(APPENDI)\b
      - match: \b(CHAIN2)\b
      - match: \b(SAY)\b

  transition:
    name: keyword.other.weidu-d
    patterns:
      - match: \b(COPY_TRANS)\b
      - match: \b(COPY_TRANS_LATE)\b

  transfeature:
    # Auto-generated from weidu-d-base.yml — do not edit manually.
    name: keyword.other.weidu-d
    patterns:
      - match: \b(DO)\b
      - match: \b(FLAGS)\b
      - match: \b(JOURNAL)\b
      - match: \b(REPLY)\b
      - match: \b(SOLVED_JOURNAL)\b
      - match: \b(UNSOLVED_JOURNAL)\b

  transnext:
    # Auto-generated from weidu-d-base.yml — do not edit manually.
    name: keyword.other.weidu-d
    patterns:
      - match: \b(EXIT)\b
      - match: \b(EXTERN)\b
      - match: \b(GOTO)\b

  reference:
    patterns:
      - match: \s(@)([0-9]+)\s
        captures:
          '1':
            name: keyword.weidu-d.trastart
          '2':
            name: variable.parameter.tra.weidu-d
      - match: \s(#)([0-9]+)\s
        name: variable.parameter.weidu-tra
      - match: \s(\( AT "(\w+)"\))\s
        name: variable.parameter.weidu-tra

  condition:
    name: meta.weidu-d.condition
    begin: '\b(IF)\b\s+(~)'
    beginCaptures:
      "1":
        name: keyword.other.weidu-d
      "2":
        name: string.quoted.weidu-d.tilde
    end: '(~)'
    endCaptures:
      "1":
        name: string.quoted.weidu-d.tilde
    patterns:
      - include: source.weidu-baf#condition-body

  # this one should come later, when most of the text is taken
  condition-abbreviated:
    begin: '\s+(\+)\s*(~)'
    beginCaptures:
      "1":
        name: keyword.other.weidu-d
      "2":
        name: string.quoted.weidu-d.tilde
    end: '(~)'
    endCaptures:
      "1":
        name: string.quoted.weidu-d.tilde
    patterns:
      - include: source.weidu-baf#condition-body

  action:
    name: meta.weidu-d.action
    begin: '\b(DO)\b\s+(~)'
    beginCaptures:
      "1":
        name: keyword.other.weidu-d
      "2":
        name: string.quoted.tilde.weidu-d
    end: '(~)'
    endCaptures:
      "1":
        name: string.quoted.tilde.weidu-d
    patterns:
      - include: source.weidu-baf#action-body

  strings:
    patterns:
      - name: string.quoted.tilde.weidu-d
        begin: '~'
        end: '~'
        patterns:
          - include: '#vars'

  vars:
    name: variable.parameter.weidu-d
    patterns:
      - match: '(%[^%]+%)'

  # Non-word operators that can't use \b word boundaries — kept separate
  # from the auto-generated sugar stanza.
  sugar-operators:
    patterns:
      - name: keyword.weidu-d
        match: \+

  sugar:
    # Auto-generated from weidu-d-base.yml — do not edit manually.
    name: keyword.weidu-d
    patterns:
      - match: \b(BRANCH)\b
      - match: \b(END)\b
      - match: \b(GLOBAL)\b
      - match: \b(IF_FILE_EXISTS)\b
      - match: \b(LOCALS)\b
      - match: \b(MYAREA)\b
      - match: \b(OR)\b
      - match: \b(RESPONSE)\b
      - match: \b(SAFE)\b
      - match: \b(THEN)\b
      - match: \b(WEIGHT)\b
      - match: \b(nonPausing)\b
