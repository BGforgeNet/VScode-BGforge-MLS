$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: WeiDU TP2
scopeName: source.weidu-tp2

patterns:
  - include: '#macro-declaration-action'
  - include: '#macro-declaration-patch'
  - include: '#docstring'
  - include: '#comments'
  - include: '#inlined-d'
  - include: '#inlined-baf'
  - include: '#function-invocation-action'
  - include: '#function-invocation-patch'
  - include: '#macro-invocation-patch'
  - include: '#macro-invocation-action'
  - include: '#function-declaration-action'
  - include: '#function-declaration-patch'
  - include: '#weidu-vars'
  - include: '#strings'
  - include: '#weidu-tp2-file'
  - include: '#weidu-tp2-flag'
  - include: '#weidu-tp2-language'
  - include: '#weidu-tp2-component-flag'
  - include: '#set-sprint-constant-vars'
  - include: '#weidu-tp2-action'
  - include: '#weidu-tp2-optglob'
  - include: '#weidu-tp2-optcase'
  - include: '#weidu-tp2-optexact'
  - include: '#weidu-tp2-arrarindicessorttype'
  - include: '#weidu-tp2-caching'
  - include: '#weidu-tp2-patch'
  - include: '#weidu-tp2-macro'
  - include: '#weidu-tp2-patch-controls'
  - include: '#weidu-tp2-when'
  - include: '#weidu-tp2-values'
  - include: '#weidu-keywords'
  - include: '#weidu-tp2-action-flow'
  - include: '#numbers'
  - include: '#infinity-constants'
  - include: '#ielib-constants'
  - include: '#weidu-tp2-value-operators'
  - include: '#array-construct'
  - include: '#vars-declaration'
  - include: '#numbers'
  - include: '#ielib-functions'

repository:
  docstring:
    begin: (/\*\*)
    end: (\*/)
    beginCaptures:
      '1':
        name: comment.block.weidu-tp2
    endCaptures:
      '1':
        name: comment.block.weidu-tp2
    patterns:
      - include: source.bgforge-mls-docstring

  comments:
    patterns:
      - match: (//).*
        name: comment.line.weidu-tp2
      - begin: /\*
        end: \*/
        name: comment.block.weidu-tp2

  ielib-functions:
    # style known functions explicitly
    patterns:
      - include: '#ielib-action-functions'
      - include: '#ielib-patch-functions'

  action-functions:
    patterns:
      - include: '#ielib-functions'
      - match: \b(\w+)\b
        name: support.function.weidu-tp2.action_function # fallback: default style

  patch-functions:
    patterns:
      - include: '#ielib-functions'
      - match: \b(\w+)\b
        name: entity.name.class.ielib.patch_function

