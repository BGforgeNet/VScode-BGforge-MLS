  non-weidu-vars:
    name: variable.parameter.weidu-tp2
    patterns:
      - include: '#weidu-vars'
      - include: '#ielib-constants'
      - match: (%)((\w*)(%[#!\-\w]+%)(\w*))(%)
        captures:
          '1':
            name: keyword.control.double-eval.weidu-tp2
          '3':
            name: keyword.control.double-eval.weidu-tp2
          '5':
            name: keyword.control.double-eval.weidu-tp2
          '6':
            name: keyword.control.double-eval.weidu-tp2
      - match: (%[#!\-\w]+%)

  vars:
    patterns:
      - include: '#weidu-vars'
      - include: '#non-weidu-vars'

  numbers:
    patterns:
      - match: \b(([0-9]+)|(0x[0-9a-fA-F]+)|(0b[0-1]+))\b
        name: constant.numeric.weidu-tp2
      - match: \s(#?[0-9]+)\b
        name: constant.numeric.weidu-tp2

  macro-invocation-action:
    name: meta.macro.invocation.weidu-tp2
    begin: \b(LAM|LAUNCH_ACTION_MACRO)\b
    end: ((\w+)|(\S+))
    beginCaptures:
      '1':
        name: support.function.weidu-tp2.action
    endCaptures:
      '1':
        patterns:
          - include: '#function-name-action'

  macro-invocation-patch:
    name: meta.macro.invocation.weidu-tp2
    begin: \b(LPM|LAUNCH_PATCH_MACRO)\b
    end: ((\w+)|(\S+))
    beginCaptures:
      '1':
        name: entity.name.function.weidu-tp2.patch
    endCaptures:
      '1':
        patterns:
          - include: '#function-name-patch'

  function-invocation-action:
    name: meta.function.invocation.weidu-tp2
    begin: \b(LAF|LAUNCH_ACTION_FUNCTION)\b
    end: ((\w+)|(\S+))
    beginCaptures:
      '1':
        name: support.function.weidu-tp2.action
    endCaptures:
      '1':
        patterns:
          - include: '#function-name-action'

  function-invocation-patch:
    begin: \b(LPF|LAUNCH_PATCH_FUNCTION)\b
    end: ((\w+)|(\S+))
    beginCaptures:
      '1':
        name: entity.name.function.weidu-tp2.patch
    endCaptures:
      '1':
        patterns:
          - include: '#function-name-patch'

  function-name-action:
    patterns:
      - match: (~)(\S+)(~)
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            name: support.function.weidu-tp2.action-function-name
          '3':
            name: keyword.control.weidu-tp2
      - match: (")(\S+)(")
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            name: support.function.weidu-tp2.action-function-name
          '3':
            name: keyword.control.weidu-tp2
      - match: (\S+)
        name: support.function.weidu-tp2.action-function-name

  function-name-patch:
    patterns:
      - match: (~)(\S+)(~)
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            name: entity.name.function.weidu-tp2.patch-function-name
          '3':
            name: keyword.control.weidu-tp2
      - match: (")(\S+)(")
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            name: entity.name.function.weidu-tp2.patch-function-name
          '3':
            name: keyword.control.weidu-tp2
      - match: (\S+)
        name: entity.name.function.weidu-tp2.patch-function-name

  function-declaration-action:
    name: meta.function.declaration.weidu-tp2
    begin: \b(DEFINE_ACTION_FUNCTION|DEFINE_DIMORPHIC_FUNCTION)\s+(\S+)
    end: \b(BEGIN)\b
    beginCaptures:
      '1':
        name: support.function.weidu-tp2.action
      '2':
        patterns:
          - include: '#function-name-action'
    endCaptures:
      '1':
        name: keyword.control.weidu-tp2
    patterns:
      - match: \b(STR_VAR|INT_VAR|RET|RET_ARRAY)\b
        name: keyword.control.weidu-tp2
      - include: '#func-params-declaration'
      - include: '#comments'
      - include: '#numbers'
      - include: '#strings'

  function-declaration-patch:
    name: meta.function.declaration.weidu-tp2
    begin: \b(DEFINE_PATCH_FUNCTION)\s+(\S+)
    end: \b(BEGIN)\b
    beginCaptures:
      '1':
        name: keyword.control.weidu-tp2
      '2':
        patterns:
          - include: '#function-name-patch'
    endCaptures:
      '1':
        name: keyword.control.weidu-tp2
    patterns:
      - match: \b(STR_VAR|INT_VAR|RET|RET_ARRAY)\b
        name: keyword.control.weidu-tp2
      - include: '#func-params-declaration'
      - include: '#comments'
      - include: '#numbers'
      - include: '#strings'

  macro-declaration-patch:
    patterns:
      - match: \b(DEFINE_PATCH_MACRO)\s+(\S+)
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            patterns:
              - include: '#function-name-patch'

  macro-declaration-action:
    patterns:
      - match: \b(DEFINE_ACTION_MACRO)\s+(\S+)
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            patterns:
              - include: '#function-name-action'

  # Parameter declarations inside function signatures (INT_VAR param = 0).
  # Colors parameter names as variable.parameter, unlike vars-declaration which
  # only colors uppercase-first names as constants.
  func-params-declaration:
    patterns:
      - match: \b([-\w]+)\s*(=)\s*((EVAL|GLOBAL)\s+)?
        captures:
          '1':
            name: variable.parameter.weidu-tp2
          '2':
            name: keyword.control.weidu-tp2
          '3':
            name: keyword.control.weidu-tp2

  vars-declaration:
    name: variable.complex.weidu-tp2
    patterns:
      # UPPERCASE direct assignment: COLOR_INDEX = 123
      - match: \b([A-Z][A-Z0-9]+(?:_\w+)*)\s*(=)\s*(EVAL\s+)?
        captures:
          '1':
            name: constant.language.weidu-tp2
          '2':
            name: keyword.control.weidu-tp2
          '3':
            name: keyword.control.weidu-tp2
      - match: \b[-\w]+\s*(=)\s*(EVAL\s+)?
        captures:
          '1':
            name: keyword.control.weidu-tp2
          '2':
            name: keyword.control.weidu-tp2

