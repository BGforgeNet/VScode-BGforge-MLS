  - include: '#infinity-constants'
  - include: '#upper-case-constants'
  - include: '#weidu-tp2-value-operators'
  - include: '#array-construct'
  - include: '#vars-declaration'
  - include: '#numbers'

repository:
  docstring:
    begin: (/\*\*)
    end: (\*/)
    beginCaptures:
      '1':
        name: comment.block.weidu-tp2
    endCaptures:
      '1':
        name: comment.block.weidu-tp2
    patterns:
      - include: source.bgforge-mls-docstring

  comments:
    patterns:
      - match: (//).*
        name: comment.line.weidu-tp2
      - begin: /\*
        end: \*/
        name: comment.block.weidu-tp2

  action-functions:
    patterns:
      - match: \b(\w+)\b
        name: support.function.weidu-tp2.action_function

  patch-functions:
    patterns:
      - match: \b(\w+)\b
        name: entity.name.class.weidu-tp2.patch-function-name

  # Auto-generated from weidu-tp2-base.yml — do not edit manually.
  weidu-tp2-file:
    name: keyword.other.weidu-tp2
    patterns:
      - match: \b(AUTHOR)\b
      - match: \b(BACKUP)\b
      - match: \b(SUPPORT)\b

  # Auto-generated from weidu-tp2-base.yml — do not edit manually.
  weidu-tp2-flag:
    name: keyword.other.weidu-tp2
    patterns:
      - match: \b(ALLOW_MISSING)\b
      - match: \b(ALWAYS)\b
      - match: \b(ASK_EVERY_COMPONENT)\b
      - match: \b(AUTO_EVAL_STRINGS)\b
      - match: \b(AUTO_TRA)\b
      - match: \b(MODDER)\b
      - match: \b(NO_IF_EVAL_BUG)\b
      - match: \b(QUICK_MENU)\b
      - match: \b(README)\b
      - match: \b(SCRIPT_STYLE)\b
      - match: \b(UNINSTALL_ORDER)\b
