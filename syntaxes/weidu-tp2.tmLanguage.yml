      - match: \b(MNL)\b
      - match: \b(LNL)\b
      - match: \b(TAB)\b

      - match: \b(REGISTRY_BG1_PATH)\b
      - match: \b(REGISTRY_BG2_PATH)\b
      - match: \b(REGISTRY_PST_PATH)\b
      - match: \b(REGISTRY_IWD1_PATH)\b
      - match: \b(REGISTRY_IWD2_PATH)\b

      - match: \b(USER_DIRECTORY)\b
      - match: \b(SAVE_DIRECTORY)\b
      - match: \b(MPSAVE_DIRECTORY)\b
      - match: \b(EE_LANGUAGE)\b

  # Catch-all for constant-like identifiers in value position.
  # Matches names where the first word (before _) is fully uppercase: OPCODE_foo, MAX_LEVEL, CLERIC_BLESS.
  # Same heuristic as tree-utils.ts:looksLikeConstant.
  # Requires underscore — single-word all-caps identifiers (e.g., BEGIN, END) are typically WeiDU
  # keywords already matched by higher-priority rules.
  # This replaced the old hardcoded ielib-opcodes/ielib-int/ielib-resref patterns.
  # If this is too broad or too narrow, consider moving to semantic tokens (the server
  # already knows which identifiers are constants via the symbol index).
  upper-case-constants:
    match: \b([A-Z][A-Z0-9]+_\w+)\b
    name: constant.language.weidu-tp2

  inlined-d:
    name: meta.weidu-tp2.inlined.d
    begin: (<<<<<<<<)\s+(\S+\.d)\b
    beginCaptures:
      '1':
        name: keyword.other.weidu-tp2
      '2':
        name: variable.language.inlined-file.weidu-tp2
    end: (>>>>>>>>)
    endCaptures:
      '1':
        name: keyword.other.weidu-tp2
    patterns:
      - include: source.weidu-d

  inlined-baf:
    name: meta.weidu-tp2.inlined.baf
    begin: (<<<<<<<<)\s+(\S+\.baf)\b
    beginCaptures:
      '1':
        name: keyword.other.weidu-tp2
      '2':
        name: variable.language.inlined-file.weidu-tp2
    end: (>>>>>>>>)
    endCaptures:
      '1':
        name: keyword.other.weidu-tp2
    patterns:
      - include: source.weidu-baf
